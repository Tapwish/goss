<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MAJESTIC · AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --neon-red: #cc0033;
            --dark-bg: #0a0a0a;
            --dark-card: #111111;
            --dark-border: #1a1a1a;
            --text-primary: #ffffff;
            --text-dim: #888888;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 4px;
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 2px;
        }

        .header {
            background: var(--dark-card);
            border-bottom: 1px solid var(--dark-border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neon-red);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .user-badge img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--neon-red);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            min-height: 40px;
        }

        .btn:hover:not(:disabled) {
            background: var(--neon-red);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-logout {
            border-color: var(--text-dim);
        }

        .btn-logout:hover {
            border-color: var(--neon-red);
            background: var(--neon-red);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 2px;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', sans-serif;
        }

        .message.user {
            background: var(--neon-red);
            color: var(--text-primary);
            align-self: flex-end;
        }

        .message.bot {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            align-self: flex-start;
            color: var(--text-dim);
        }

        .input-area {
            padding: 12px 20px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            gap: 10px;
            background: var(--dark-card);
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            border-radius: 2px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            min-height: 48px;
        }

        .input-area input:focus {
            border-color: var(--neon-red);
        }

        .input-area input:disabled {
            opacity: 0.3;
        }

        .limit-bar {
            background: rgba(204, 0, 51, 0.05);
            padding: 6px 16px;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid var(--dark-border);
            color: var(--text-dim);
            flex-shrink: 0;
            font-family: 'Inter', sans-serif;
        }

        .limit-bar strong {
            color: var(--neon-red);
        }

        @media (max-width: 600px) {
            .header {
                padding: 10px 12px;
            }
            .header h1 {
                font-size: 0.9rem;
            }
            .chat-messages {
                padding: 12px;
            }
            .input-area {
                padding: 10px 12px;
            }
            .message {
                max-width: 92%;
                font-size: 0.85rem;
                padding: 10px 14px;
            }
            .btn {
                font-size: 0.5rem;
                padding: 6px 12px;
                min-height: 36px;
            }
            .user-badge {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 0.7rem;
            }
            .btn {
                font-size: 0.45rem;
                padding: 4px 10px;
                min-height: 32px;
            }
            .message {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
            .input-area input {
                font-size: 0.8rem;
                padding: 8px 12px;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚡ MAJESTIC · AI</h1>
        <div class="header-right" id="headerRight">
            <div id="authButtons">
                <button class="btn" id="loginBtn">Войти через Discord</button>
            </div>
            <div id="userInfo" style="display:none;" class="user-badge">
                <img id="userAvatar" src="" alt="">
                <span id="userName"></span>
                <button class="btn btn-logout" id="logoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">🔐 Авторизуйтесь через Discord, чтобы начать диалог.</div>
    </div>

    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Ваш вопрос..." disabled>
        <button class="btn" id="sendBtn" disabled>Отправить</button>
    </div>

    <div class="limit-bar" id="limitBar">📨 0 / 100 сегодня</div>

    <script>
        // ============================================================
        // НАСТРОЙКИ
        // ============================================================
        const DISCORD_CLIENT_ID = '1516071810477592707';

        // 🔑 НОВЫЙ API-КЛЮЧ (ОБНОВЛЁННЫЙ)
        const GROQ_API_KEY = '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';

        // ⚡ ПРЯМОЙ URL GROQ API (БЕЗ ПРОКСИ)
        const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';

        const MODEL = 'llama-3.3-70b-versatile';
        const DAILY_LIMIT = 100;

        // Законы SA (системный промпт)
        const LAWS = `УК SA Статья 6.2 ч1 Убийство 4 года тюрьмы
        ДК SA Статья 2 Отказ остановиться штраф 5000$
        АдмКодекс SA Статья 11.1 Оскорбление штраф 5000-20000$
        ПК SA Статья 16 Основания задержания: следы, видео, ордер
        Конституция SA Статья 1.5 Презумпция невиновности`;

        // ============================================================
        // СОСТОЯНИЕ
        // ============================================================
        let currentUser = null;
        let messages = [];
        let waiting = false;
        let dailyCount = 0;

        // ============================================================
        // DOM
        // ============================================================
        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authButtons = document.getElementById('authButtons');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userAvatar = document.getElementById('userAvatar');
        const limitBar = document.getElementById('limitBar');

        // ============================================================
        // ЛИМИТЫ
        // ============================================================
        function getTodayKey() {
            const today = new Date().toISOString().split('T')[0];
            return `hyuga_daily_${today}`;
        }

        function loadDailyCount() {
            const key = getTodayKey();
            const stored = localStorage.getItem(key);
            return stored ? parseInt(stored, 10) : 0;
        }

        function incrementDailyCount() {
            const key = getTodayKey();
            const current = loadDailyCount();
            const next = current + 1;
            localStorage.setItem(key, String(next));
            dailyCount = next;
            updateLimitBar();
        }

        function updateLimitBar() {
            const used = loadDailyCount();
            const remaining = Math.max(0, DAILY_LIMIT - used);
            limitBar.innerHTML = `📨 ${used} / ${DAILY_LIMIT} сегодня (осталось ${remaining})`;
            if (used >= DAILY_LIMIT) {
                limitBar.innerHTML += ' ⚠️ Лимит исчерпан!';
                questionInput.disabled = true;
                sendBtn.disabled = true;
            } else {
                if (currentUser) {
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                }
            }
        }

        // ============================================================
        // DISCORD AUTH
        // ============================================================
        function loginWithDiscord() {
            const redirectUri = window.location.href.split('#')[0];
            const url =
                `https://discord.com/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('hyuga_user');
            messages = [];
            renderMessages();
            updateUIForUnauth();
            updateLimitBar();
        }

        function updateUIForAuth() {
            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            userName.textContent = currentUser.username;
            userAvatar.src = currentUser.avatar;
            questionInput.disabled = false;
            sendBtn.disabled = false;
        }

        function updateUIForUnauth() {
            authButtons.style.display = 'flex';
            userInfo.style.display = 'none';
            questionInput.disabled = true;
            sendBtn.disabled = true;
        }

        function fetchDiscordUser(token) {
            fetch('https://discord.com/api/users/@me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.id) {
                    currentUser = {
                        id: user.id,
                        username: user.username,
                        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` :
                            'https://cdn.discordapp.com/embed/avatars/0.png'
                    };
                    localStorage.setItem('hyuga_user', JSON.stringify(currentUser));
                    dailyCount = loadDailyCount();
                    updateUIForAuth();
                    updateLimitBar();
                    chatMessages.innerHTML = '<div class="message bot">✨ Добро пожаловать! Задайте вопрос по законам SA.</div>';
                    messages = [];
                }
            })
            .catch(() => updateUIForUnauth());
        }

        function checkAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                fetchDiscordUser(token);
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            const saved = localStorage.getItem('hyuga_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                dailyCount = loadDailyCount();
                updateUIForAuth();
                updateLimitBar();
                chatMessages.innerHTML = '<div class="message bot">✨ Продолжаем диалог. Задайте вопрос по законам SA.</div>';
                messages = [];
            } else {
                updateUIForUnauth();
                updateLimitBar();
            }
        }

        // ============================================================
        // ОТОБРАЖЕНИЕ СООБЩЕНИЙ
        // ============================================================
        function renderMessages() {
            if (messages.length === 0) {
                chatMessages.innerHTML = currentUser ?
                    '<div class="message bot">✨ Задайте вопрос по законам SA.</div>' :
                    '<div class="message bot">🔐 Авторизуйтесь через Discord, чтобы начать диалог.</div>';
                return;
            }
            chatMessages.innerHTML = messages.map(msg =>
                `<div class="message ${msg.role === 'user' ? 'user' : 'bot'}">${msg.content.replace(/\n/g, '<br>')}</div>`
            ).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============================================================
        // AI ЗАПРОС (ПРЯМОЙ)
        // ============================================================
        async function askGroq(question) {
            const history = messages.map(m => ({ role: m.role, content: m.content }));

            const payload = {
                model: MODEL,
                messages: [
                    { role: 'system', content: `Ты юрист. Отвечай только на основе законов SA. Законы: ${LAWS}. На русском, кратко, по делу.` },
                    ...history,
                    { role: 'user', content: question }
                ],
                temperature: 0.3,
                max_tokens: 800
            };

            const response = await fetch(GROQ_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ============================================================
        // ОТПРАВКА СООБЩЕНИЯ
        // ============================================================
        async function sendMessage() {
            if (!currentUser) return;
            if (waiting) return;
            const used = loadDailyCount();
            if (used >= DAILY_LIMIT) {
                updateLimitBar();
                return;
            }

            const question = questionInput.value.trim();
            if (!question) return;
            questionInput.value = '';
            questionInput.disabled = true;
            sendBtn.disabled = true;

            messages.push({ role: 'user', content: question });
            renderMessages();
            incrementDailyCount();
            updateLimitBar();

            waiting = true;
            const thinkingIndex = messages.length;
            messages.push({ role: 'assistant', content: '🤔 Думаю...' });
            renderMessages();

            try {
                const reply = await askGroq(question);
                messages[thinkingIndex] = { role: 'assistant', content: reply };
                renderMessages();
            } catch (err) {
                messages[thinkingIndex] = { role: 'assistant', content: `❌ Ошибка: ${err.message}` };
                renderMessages();
            } finally {
                waiting = false;
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
                updateLimitBar();
            }
        }

        // ============================================================
        // ЗАПУСК
        // ============================================================
        loginBtn.addEventListener('click', loginWithDiscord);
        logoutBtn.addEventListener('click', logout);
        sendBtn.addEventListener('click', sendMessage);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(() => {
            const newCount = loadDailyCount();
            if (newCount !== dailyCount) {
                dailyCount = newCount;
                updateLimitBar();
            }
        }, 60000);

        checkAuth();
    </script>
</body>
</html>
