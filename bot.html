ч. 4 Никто не может нести административную ответственность дважды за одно и то же административное правонарушение.​


Статья 4.2. Замена административного наказания предупреждением

ч. 1 За впервые совершенное административное правонарушение административный штраф подлежит замене на предупреждение при наличии обстоятельств, предусмотренных частью 2 статьи 3.4 настоящего Кодекса.​

ч. 2 Замена предупреждением является правом, а не обязанностью уполномоченного лица.​


Статья 4.3. Смягчение наказания

ч. 1 Обстоятельствами, смягчающими административную ответственность, признаются:​

а) раскаяние лица;​
б) добровольное прекращение противоправного поведения;​
в) добровольное сообщение о правонарушении;​
г) содействие органу, осуществляющему производство;​
д) предотвращение вредных последствий;​
е) добровольное возмещение ущерба.​

ч. 2 Суд может признать смягчающими и иные обстоятельства.​


Статья 4.4. Отягчение наказания

ч. 1 Обстоятельствами, отягчающими административную ответственность, признаются:​

а) продолжение противоправного поведения;​
б) совершение правонарушения группой лиц;​
в) совершение правонарушения в чрезвычайных условиях;​
г) совершение правонарушения в состоянии опьянения.​


ГЛАВА 5. ПРАВОНАРУШЕНИЯ, ПОСЯГАЮЩИЕ НА ОБЩЕСТВЕННЫЙ ПОРЯДОК И БЕЗОПАСНОСТЬ​

Статья 5.1. Мелкое хулиганство, то есть нарушение общественного порядка, выражающее явное неуважение к обществу,

ч. 1 Действия, которые могут быть расценены хулиганскими :​

а) в общем порядке:​
– Оскорбительное приставание к гражданам;​
– Действия, несущие угрозу обществу (размахивания кулаками, ногами);​
​
б) в местах большого скопления людей, помещениях государственных учреждений и прилегающих к ним территориях, парках, скверах, пляжи, а также скопление людей от 7-ми человек:​
– Нецензурная брань;​
– Неприличные жесты;​
​
в) в помещениях государственных организациях и прилегающих к ним территориях:​
– Заниматься спортом, выполнять спортивные упражнения, танцевать; ​
– Катать на спине, ползать, неоднократно свистеть, кричать;​
– Использование устройств, воспроизводящих музыку или другие звуки.​
​
Исключение: территории EMS, WN.​
​
г) иное поведение человека, противоречащие общепринятым нормам морали и нравственности.​
​
Примечание: общественные места – места большого скопления людей, а равно госучреждения, скверы, парки, пляжи, прилегающие территории гос организации. ​
Наказание: штраф в размере от 3.000$ до 7.000$​

ч. 2 Повторное совершение административного правонарушения, предусмотренного частью 1 настоящей статьи влечет,​
Наказание: штраф в размере от 5.000$ до 10.000$​

Статья 5.2. Использование любых видов транспорта (мопед, автомобиль, мотоцикл, велосипеды и т.п.) внутри помещений государственных учреждений,
Наказание: штраф в размере 20.000$.​

Статья 5.3. Нахождение в общественном месте в неприемлемом виде, а также в состоянии алкогольного или наркотического опьянения,

ч. 1 Нахождение без любого из элементов верхней одежды в местах большого скопления людей, а также в помещениях государственных организаций и прилегающим к ним территориям.​
Исключение: нахождение без любого из элементов верхней одежды допустимо в случае нахождения на территории пляжей, иных водоемов, магазинах одежды и почты, а так же в случае допустимости отсутствия таковых элементов​
Наказание: штраф в размере от 5.000$ до 20.000$.​

ч. 2 Потребление (распитие) алкогольной продукции либо наркотических средств или психотропных веществ, новых потенциально опасных психоактивных веществ или одурманивающих веществ в местах большого скопления людей, равно как появление в алкогольном или наркотическом опьянении.​
Исключение: развлекательные, увеселительные учреждения.​
Наказание: штраф в размере от 5.000$ до 20.000$.​
​
ч. 3 Нахождение мужчин в беговых шортах/трусах/купальниках, женщин в купальниках/трусах на территории государственных организаций. ​
Исключение: Здания EMS и прилегающая территория. ​
Наказание: штраф в размере от 5.000$ до 20.000$.​

Статья 5.4. Обнажение или использование оружия в не отведенных для этого местах,
​
ч. 1 Обнажение оружия гражданским лицом,​
Наказание: штраф в размере от 15.000$ до 20.000$ с конфискацией оружия.​
​
ч. 2 Обнажение государственным служащим (LSPD,LSCSD,FIB,SANG,USSS, иных госструктур) служебного оружия при отсутствии законных оснований,​
Наказание: штраф в размере от 5.000$ до 15.000$.​
​
Исключение: применение оружия в целях самообороны или в служебных целях.​
Примечание: Сотрудникам государственных правоохранительных структур разрешено обнажать оружие в складских помещениях, предназначенных для выдачи, сдачи и хранения государственного оружия, боеприпасов и спецсредств.​

Статья 5.5. Ношение в открытом виде или использование не по назначению холодного оружия, инструментов и спортивного инвентаря в людном месте,
Наказание: штраф в размере 20.000$.​

Статья 5.6 Нарушение установленного порядка организации либо проведения собрания или митинга.
ч. 1 Нарушение организатором/участником публичного мероприятия установленного порядка организации либо проведения собрания или митинга,​
Наказание: штраф в размере 20.000$.​

Статья 5.7. Водителю запрещено совершать безрассудное вождение

ч. 1 Деяние, предусмотренное соответствующей статьей Дорожного кодекса, совершение иных действий, которые в случаях опасного вождения угрожают жизни или здоровью окружающим людям.​
Наказание: штраф в размере до 20.000$ с лишением водительской лицензии.​

Статья 5.8 Заведомо ложный вызов специализированных служб

ч. 1 Заведомо ложный вызов полиции, скорой медицинской помощи или иных специализированных служб, ​
Наказание: влечет наложение административного штрафа в размере от 10.000$ до 20.000$.​

Статья 5.9* Неуважение к Сенату штата San-Andreas, в том числе оскорбление участников сената,
Наказание: штраф в размере от 15.000$ до 100.000$ ​

ГЛАВА 6. ПРАВОНАРУШЕНИЯ, ПОСЯГАЮЩИЕ НА ПРАВА ГРАЖДАН И ИХ ИМУЩЕСТВО​

Статья 6.1. Дискриминация

ч. 1 Дискриминация, то есть нарушение прав, свобод и законных интересов человека и гражданина в зависимости от его пола, расы, цвета кожи, национальности, языка, происхождения, имущественного, семейного, социального и должностного положения, возраста, места жительства, отношения к религии, убеждений. Принадлежности или непринадлежности к общественным объединениям или каким-либо группам или меньшинствам,​
Наказание: штраф в размере от 10.000$ до 20.000$.​

Статья 6.1.1* Дискриминация в сфере труда

ч. 1 Никто не может быть ограничен в трудовых правах и свободах или получать какие-либо преимущества в зависимости от пола, расы, цвета кожи, национальности, языка, происхождения, имущественного, семейного, социального и должностного положения, возраста, места жительства, отношения к религии, убеждений, принадлежности или непринадлежности к общественным объединениям или каким-либо социальным группам, а также от других обстоятельств, не связанных с деловыми качествами работника,​
Наказание: штраф работодателю в размере 150.000$.​
​
Комментарий: Не являются дискриминацией установление различий, исключений, предпочтений, а также ограничение прав работников, которые определяются свойственными данному виду труда требованиями, либо в целях обеспечения национальной безопасности, поддержания оптимального баланса трудовых ресурсов, содействия в приоритетном порядке трудоустройству граждан и в целях решения иных задач внутренней и внешней политики государства.​

Статья 6.1.2* Нарушение государственных нормативных требований охраны труда, содержащихся в законах и иных нормативных правовых актах,
Наказание: штраф в размере от 20.000 до 50.000$, юридическим лицам - от 50.000 до 100.000 $​

Статья 6.2 Курение в общественных местах

ч. 1 Запрещено курение с использованием специальных приспособлений или без них табака, никотин содержащей продукции или кальянов, на территории общественных мест вне специально отведенных территорий, государственных организаций, на расстоянии до 10 метров от любого из входов и выходов, органах государственной власти,​
Наказание: штраф в размере от 5.000$ до 20.000$​
Исключение: объекты, находящиеся в частной собственности, клубы, пляжи и улицы.​

Статья 6.3 Нанесение повреждений чужому имуществу.

Дорожный кодекс штата San-Andreas​

​
Данный Кодекс был написан с целью предотвращения правонарушений на дороге и обеспечения безопасности дорожного движения в штате Сан Андреас.

Сотрудники правоохранительных служб вправе, на своё усмотрение, взыскивать наказания в рамках текущего кодекса.
Правоохранительная деятельность в рамках текущего кодекса должна иметь предупредительных характер, а не карательный. Если водитель, совершивший нарушение Дорожного Кодекса, сотрудничает и кооперируется с сотрудником правоохранительной службы, то такой сотрудник имеет право выписать предупреждение водителю и не наказывать его материально, за незначительностью нарушения.​

​
Глава I. Обязанности водителя

​
Статья 1. Водитель должен предъявить и передать по первому требованию сотрудника правоохранительных органов свою лицензию на управление транспортным средством с соответствующей категорией, а также документ удостоверяющий личность.
​
Наказание: штраф до $5.000.​


Статья 2. Водитель обязан остановиться по требованию сотрудника правоохранительных органов и покинуть транспортное средство.
​
Наказание: штраф до $5.000.​


Статья 3. Время на уплату штрафной квитанции ограничено временным промежутком в 15 секунд с момента передачи штрафной квитанции правомочным лицом.


Статья 4. При аварии, водитель обязан остановиться и не трогаться с места. Также водитель не должен трогать и перемещать предметы связанные с происшествием
​
Наказание: штраф до $10.000.​


Статья 5. При аварии в которой погибли или ранены люди, водитель обязан оказать первую помощь и вызвать скорую помощь EMS.
​
Наказание: штраф до $20.000.​


Статья 6. Владельцу транспортного средства запрещено передавать управление лицам, не имеющим право на вождение автомобиля (лицу без лицензии, под алкогольным или наркотическим опьянении, находящемуся в утомленном состоянии).
​
Наказание: штраф до $10.000 для владельца Т/С и управляющего транспортным средством.​


Статья 7. Водителю запрещено пересекать и занимать место в организованных колоннах или кортежах.
​
Наказание: штраф до $20.000.​


Статья 8. Водителю запрещается пользоваться во время движения телефоном.
​
Наказание: штраф до $5.000.​


Статья 9. Водителю запрещено совершать безрассудное вождение, которое выражается в:
​
а) невыполнение требования уступить дорогу во время перестроения (подрезание);​
б) несоблюдении безопасной дистанции;​
в) резком торможении, если такое торможение не требуется для предотвращения аварии;​
г) препятствовании обгону;​

​
Наказание: штраф до $7.000.​


Статья 14. Если два или более спец. транспорта с включенными проблесковыми маячками встретились на дороге, приоритет имеет транспорт медицинских служб скорой помощи EMS с включенным проблесковым маячком и включенной сиреной.
​
Наказание: штраф до $10.000 с водителя спец. транспорта не пропустившего автомобиль скорой помощи EMS.​


Статья 15. Приближаясь к стоящему транспортному средству с включенным проблесковым маячком синего или красного цвета, водитель должен снизить скорость, чтобы иметь возможность немедленно остановиться в случае необходимости.
​
Наказание: штраф до $7.000.​


​
Глава IV. Обязанности пешехода​

​
Пешеходный переход — специальная область на проезжей части дороги, выделенная для перехода пешеходов на другую сторону улицы или дороги, либо искусственное сооружение над или под проезжей частью для тех же целей.​


Статья 16. Пешеходы должны двигаться по тротуару или обочине. Движение по проезжей части пешеходами запрещено.
​
Наказание: штраф до $7.000.​
​
Исключение: В районе, прилегающем к территории EMS, сотрудники правоохранительных органов обязаны:​
​
а) В случае обнаружения пешехода, находящегося на проезжей части, сначала устно предупредить гражданина о необходимости покинуть проезжую часть и направиться на тротуар или обочину.​
б) Предоставить гражданину разумное время для выполнения данного требования.​
в) Если гражданин после предупреждения продолжает нарушать правила и находиться на проезжей части, сотрудники имеют право наложить штраф в размере, установленном статьей 16.​


Статья 17. При приближении транспортных средств с включенным проблесковым маячком синего или красного цвета пешеходы обязаны воздержаться от перехода дороги, а пешеходы, находящиеся на проезжей части, должны незамедлительно освободить проезжую часть.
​
Наказание: штраф до $8.000.​

​
Глава V. Маневрирование​


Статья 18. При выезде на дорогу с прилегающей территории водитель должен уступить дорогу транспортным средствам и пешеходам, движущимся по ней, а при съезде с дороги - пешеходам и велосипедистам, путь движения которых он пересекает.
​
Наказание: штраф до $8.000.​


Статья 19. При перестроении водитель должен уступить дорогу транспортным средствам, движущимся попутно без изменения направления движения.
​
Наказание: штраф до $8.000.​


Статья 20. Запрещается создавать помехи движению военно-транспортной колонны
Наказание: штраф в размере до 20.000$ с лишением прав на управление соответствующим транспортным средством (в зависимости от типа транспортного средства, на котором совершено нарушение, в том числе: CDL B класс - Грузовой, CLD A класс - Тяжёлый транспорт, CLD M класc - На мотоцикл, CLD D класс - управление легковым автомобилем).


Статья 21. Перед поворотом направо водитель должен заранее занять крайнее правое положение. Перед поворотом налево или разворотом водитель должен заранее занять крайнее левое положение. Также поворот может быть произведен не с крайней полосы, если имеется соответствующая разметка.
​
Наказание: штраф до $4.000.​


Статья 22. При развороте или повороте налево вне перекрестка, водитель должен пропустить встречные транспортные средства.
​
Наказание: штраф до $6.000.​


Статья 23. На нерегулируемых перекрестках, дорогу должен уступить водитель, к которому, транспортное средство приближается справа.
​
Наказание: штраф до $5.000​


Статья 24. Разворот запрещается:
​
а) На пешеходных переходах;​
б) В тоннелях;​
в) На мостах;​
г) На железнодорожных переездах;​
д) В местах с видимостью менее 100 метров.​
​
Наказание: штраф до $8.000​


Глава VI. Расположение транспортного средства на проезжей части​


Статья 25. Движение в штате является правосторонним. Транспортное средство должно двигаться по правой стороне дороги, если нет разметки.
​
Наказание: штраф до $8.000.​


Статья 26. На дорогах с двусторонним движением запрещается двигаться по полосе встречного движения
​
Наказание: штраф до $15.000.​


Статья 27. Транспортные средства которые не могут двигаться со скоростью более чем 60 км/ч должны двигаться по правой полосе, кроме случаев перестроения в полосу для совершения левого поворота или разворота.
​
Наказание: штраф до $8.000.​


Статья 28. Запрещается двигаться транспортным средством по обочинам, тротуарам, пешеходным и велодорожкам.
​
Наказание: штраф до $15.000.​

​
Глава VII. Скоростные лимиты

​
Статья 29. Скоростной лимит настоящим Кодексом установлен для всех водителей транспортных средств:a) В населенных пунктах движение транспортных средств разрешается со скоростью не более 100 км/ч.б) На автодорогах за пределами населенных пунктов разрешается ехать 120 км/ч.в) Если дорога за городом имеет разделительную полосу – 160 км/чг) На автомагистралях допустимая скорость – 200 км/ч
Примечание: Штрафы могут выписываться при помощи видеонаблюдения, а также сотрудниками LSPD, LSCSD, FIB.
​
Наказание: штраф до $15.000.​


Статья 30. Транспортным средствам, производящим буксировку разрешается двигаться со скоростью не более 50 км/ч.
​
Наказание: штраф до $5.000.​


Статья 31. Водителю запрещается создавать помехи другим транспортным средствам, двигаясь без необходимости со слишком малой скоростью.
​
Наказание: штраф до $5.000.​


Глава VIII. Обгон и опережение

​
Статья 32. Перед обгоном водитель должен убедиться в безопасности маневра.
​
Наказание: штраф до $8.000​


Статья 33. Обгон запрещен:
​
а) когда обгоняемое транспортное средство совершает поворот налево;​
б) на пешеходных переходах;​
в) на железнодорожных переездах и ближе чем за 100 метров перед ними;​
г) на мостах и под ними, а также в тоннелях;​
д) в конце подъема, на опасных поворотах и на других участках с ограниченной видимостью.​

​
Наказание: штраф до $8.000



Статья 34. Водитель должен пропустить автобус, который выезжает с автобусной остановки.
​
Наказание: штраф до $5.000.​

​
Глава IX. Остановка и парковка​


Статья 35. Остановка и парковка разрешаются на правой стороне дороги, вплотную к бордюру, кроме дорог с односторонним движением и дорог с двумя полосами движения (по 1 на каждое направление).

Статья 36. Ставить транспортное средство разрешается в один ряд параллельно краю проезжей части. Двухколесные транспортные средства допускается ставить в два ряда.

Статья 37. Остановка и парковка запрещается:
​
а) параллельно красному бордюру;​
​
Исключение: Водители автобусов во время остановок.​
​
б) на пешеходных переходах и тротуаре;​
в) на ж/д переездах, трамвайных путях, мостах, в тоннелях;​
г) на крутых и опасных поворотах;​
д) на перекрестках;​
е) на служебных стоянках государственных учреждений.​
Исключение: Сотрудник государственной структуры на автомобиле с государственными номерами. К данным парковкам относятся парковки при государственных учреждений общего доступа (Передняя парковка LSPD, Передняя парковка Капитолия и т.д)​
ж) в помещениях государственных учреждений;​
з) в случае нарушения иных требований настоящего Дорожного Кодекса, а также несоблюдения дорожной и парковочной разметки.​
и) в иных местах, где парковка и остановка запрещены в соответствии с положениями настоящего Дорожного Кодекса.​
​
Наказание: штраф до $5.000 и эвакуация транспортного средства на штрафстоянку.​


Статья 38. Остановка запрещена на автомагистралях (хайвеях), а также дорогах общего пользования, кроме случаев чрезвычайной остановки.
​
Наказание: штраф до $9.000 и эвакуация транспортного средства на штрафстоянку.​
​

Глава X. Движение по автомагистралям​


Статья 39. На автомагистралях запрещается:
​
а) движение пешеходов, мопедов, велосипедов, тракторов, иных транспортных средств скорость которых по техническим характеристикам менее 40 км/ч;​
б) движение задним ходом;​
в) движение грузовиков вне крайней правой полосы;​
г) разворот и выезд на разделительную полосу.​
​
Наказание: штраф до $9.000 и эвакуация транспортного средства на штрафстоянку.​
​

Глава XI. Пользование фарами и звуковыми сигналами​


Статья 40. В темное время суток или в условиях плохой погоды, а также в тоннелях транспортные средства должны использовать ближний или дальний свет фар.​
​
​
Наказание: штраф до $3.000.



Статья 41. В населенных пунктах где дорога освещена, дальний свет должен быть переключен на ближний​
​
​
Наказание: штраф до $3.000.



Статья 42. Звуковой сигнал разрешается подавать для предупреждения других водителей о намерении обгона вне населенных пунктов, а также в других случаях, когда это необходимо только для предотвращение дорожной аварии.​
​
​
Наказание: штраф до $5.000.​



Глава XII. Дорожная разметка и знаки

​
Статья 43. Пересекать желтую двойную сплошную линию для совершения обгона запрещено. Пересекать такую разметку разрешается для разворота или въезда/выезда с прилегающей территории или дворов, убедившись в безопасности такого маневра.​
​
​
Наказание: штраф до $10.000.



Статья 44. Одиночная желтая сплошная линия предупреждает о встречном движении, совершать обгон запрещено. Совершать разворот и поворот для въезда/выезда с прилегающей территории или дворов - разрешается, убедившись в безопасности такого маневра. Обгон можно совершать пересекая только пунктирную разметку на дороге.​
​
​
Наказание: штраф до $10.000.



Статья 45. Белая сплошная линия у правого края дороги обозначает край проезжей части и начало обочины – пересекать такую разметку разрешено.​
​
​
Примечание: в тоже время белая сплошная линия нанесенная в пределах проезжей части, обозначает границы полос движения в опасных местах на дороге, такую разметку не рекомендуется пересекать для перестроения.​

​
​
Наказание: штраф до $8.000. (если пересекая линию разметки, водитель создал опасные условия для других транспортных средств)



Статья 46. Стрелки нанесенные на дорогу для каждой полосы, указывают направления движения по полосам, с какой полосы можно совершать тот или иной маневр.​
​
​
Наказание: штраф до $3.000.



Статья 47. Разметка в виде стрелок налево (направо) под углом указывает о сужении проезжей части, водитель должен будет пропустить транспорт чтобы выехать на главную полосу.​
​
​
Наказание: штраф до $5.000. (если водитель не пропустил транспорт при перестроении из сужающейся полосы)



Статья 48. Стоп-линия указывает место где нужно остановиться для того чтобы пропустить движущийся транспорт на перекрестке, если транспорта нет, то следует снизить скорость и притормозить.​
​
​
Примечание: может использоваться надпись STOP на дороге без самой линии. Также данная разметка может действовать совместно со знаком STOP (в данном случае нарушения не суммируются).​

​
​
Наказание: штраф до $4.000.



Статья 49. Требуется останавливаться перед пешеходным переходом, если пешеходы пересекают дорогу:​
​
​
а) Пешеходный переход обозначается двумя продольными параллельными линиями в пределах которых пешеходы совершают переход дороги;​

​
б) Пешеходный переход обозначается разметкой-зеброй по которой пешеходы совершают переход дороги.​

​
​
Наказание: штраф до $5.000.



Статья 50. Двойная сплошная линия переходящая в сплошную линию с пунктирной, разрешает пересекать ее для обгона только со стороны пунктирной линии.​
​
​
Наказание: штраф до $10.000.



Статья 51. Разметка Bus Lane обозначает специальную полосу для автобусов. Водители “не автобусов” могут двигаться по этой полосе, если не создают помеху автобусам, в тоже время водители автобусов обязаны двигаться только по этой полосе, если такая имеется.​
​
​
Наказание: штраф до $5.000.



Статья 52. Разметка надписями No Parking и Keep Clear запрещает постановку любого транспорта в пределах разметки,
кроме транспорта экстренных служб.​
​
​
Примечание: Цвет разметки может быть как желтый, так и белой.​


​
Наказание: штраф до $9.000.



Статья 53. Разделительная полоса. Может выделятся конструктивно: бордюром и зелеными насаждениями, а также может выделяется желтой сплошной линией по контуру. Пересекать и двигаться по разделительной полосе запрещено.​
​
​
Примечание: разделительная полоса может выделяться одинарной желтой сплошной, двойной желтой сплошной и белой сплошной линиями.​

​
​
Наказание: штраф до $8.000.



Статья 54. Табличка "Wrong Way" запрещает дальнейшее движение, предупреждая о том, что впереди вы будете двигаться по полосе встречного движения.


Статья 55. Утратила силу.​



Глава XIII. Регистрация транспортного средства

Каждое транспортное средство штата San-Andreas должно иметь собственный идентификационный знак (Государственный номер) и должно пройти процедуру Государственного учета.
Приобретение номеров и процесс Государственного учета транспортного средства проходит в Департаменте LSPD в городе Los-Santos.​


Статья 56. Запрещается использование транспортного средства не прошедшее процедуру Государственного учета (актуальную регистрацию).
​
​
Наказание: штраф до 20.000$, лишение прав на управление соответствующим транспортным средством (в зависимости от типа транспортного средства, на котором совершено нарушение, в том числе: CDL B класс - Грузовой, CLD A класс - Тяжёлый транспорт, CLD M класc - На мотоцикл, CLD D класс - управление легковым автомобилем).



Статья 57. Управление транспортным средством без государственного регистрационного знака (номерного знака).

Примечание: Управление транспортным средством без установленного государственного регистрационного знака (номерного знака), а равно с нечитаемыми, скрытыми или установленными с нарушением требований законодательства номерными знаками.

Наказание: штраф в размере от 10.000$ до 20.000$ с лишением прав на управление соответствующим транспортным средством (в зависимости от типа транспортного средства, на котором совершено нарушение, в том числе: CDL B класс - Грузовой, CLD A класс - Тяжёлый транспорт, CLD M класc - На мотоцикл, CLD D класс - управление легковым автомобилем).
​
Глава XIV. Задержание транспортного средства

​
Статья 58. В целях пресечения нарушений правил дорожного движения, в том числе нарушение предусмотренных в части несоблюдения требований, предписанных дорожными знаками или разметкой, запрещающими остановку или стоянку транспортных средств, правил эксплуатации, использования транспортного средства и управления транспортным средством соответствующего вида, предусмотренных Главой IX, Главой XII, Главой XIII и другими главами настоящего Кодекса, применяется задержание(эвакуация) транспортного средства, то есть исключение транспортного средства из процесса перевозки людей и грузов путем перемещения его при помощи другого транспортного средства и помещения на ближайшую свободную парковку общего пользования.


Статья 59. В случае, если транспортное средство, будет создавать препятствия для движения других транспортных средств или пешеходов, оно до начала задержания может быть перемещено путем управления транспортным средством его водителем либо лицами, уполномоченными составлять протоколы об административных правонарушениях, в ближайшее место, где данное транспортное средство таких препятствий создавать не будет.


Статья 60. Задержание транспортного средства прекращается непосредственно на месте задержания транспортного средства в присутствии лица, которое может управлять данным транспортным средством, если причина задержания транспортного средства устранена до начала движения транспортного средства или выплачен штраф.


Статья 61. Решение о задержании транспортного средства соответствующего вида, о прекращении указанного задержания или о возврате транспортного средства принимается должностными лицами, уполномоченными составлять протоколы о соответствующих административных правонарушениях.


Статья 62. Задержание транспортного средства может проходить без присутствия владельца, представителя владельца или лиц, имеющих при себе документы, необходимые для управления данным транспортным средством.


Статья 63. Транспортные средства с номерами государственного образца не подлежат эвакуации.


Статья 64. Владелец (водитель) транспортного средства обязан своевременно оплачивать все имеющиеся штрафы, наложенные в соответствии с действующим законодательством.

В случае, если количество неуплаченных штрафов превышает десять (10) единиц, транспортное средство подлежит эвакуации на специализированную штрафную стоянку до момента полной оплаты задолженности.


Статья 65. Обязанность владельца (водителя) транспортного средства соблюдать требования Главы XIII настоящего Кодекса​
​
​
1. Владелец (водитель) транспортного средства обязан соблюдать положения Главы XIII настоящего Кодекса, касающиеся регистрации и иных обязательных требований к эксплуатации транспортного средства.​

​
​
2. В случае нахождения транспортного средства вне зоны регистрации или специализированной штрафной стоянки, оно подлежит эвакуации уполномоченными органами в установленном порядке.

Статья 66. Водителю запрещено управлять транспортным средством в неисправном состоянии.​
​
​
Наказание: штраф до $4.000 и эвакуация транспортного средства на штрафстоянку.
        `;

        // ============================================================
        // 🤖 СИСТЕМНЫЙ ПРОМПТ (не удаляй, только добавляй законы выше)
        // ============================================================
        const SYSTEM_PROMPT = `Ты — эксперт по законодательству США и штата Orlando.

        В ПЕРВУЮ ОЧЕРЕДЬ ты должен искать ответ на вопрос в предоставленных законах штата Orlando (они указаны ниже). Если в этих законах есть точный ответ — дай его и укажи конкретную статью.

        ЕСЛИ В ПРЕДОСТАВЛЕННЫХ ЗАКОНАХ НЕТ ТОЧНОЙ ИНФОРМАЦИИ ПО ВОПРОСУ:
        1. Скажи: "В законодательстве штата Orlando нет прямого регулирования этого вопроса."
        2. Затем добавь: "Однако, основываясь на общих принципах права США, судебной практике и логике, можно предположить следующее: ..."
        3. Используй свои знания о праве США (федеральные законы, Конституция, прецеденты Верховного суда, доктрины common law).

        ВОТ ПРЕДОСТАВЛЕННЫЕ ЗАКОНЫ ШТАТА ORLANDO (используй их в первую очередь):
        ${LAWS}

        КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО:
        - Упоминать законы, кодексы, суды или правовые нормы любых других стран (России, Украины, Казахстана, Беларуси, Германии, Франции, Великобритании и т.д.).
        - Давать ответы, основанные на правовых системах других государств.
        - Делать любые отсылки к УК РФ, ГК РФ, КоАП РФ и т.п.

        ОТВЕЧАЙ ТОЛЬКО НА РУССКОМ ЯЗЫКЕ, но все юридические термины и ссылки должны быть только на право США.

        Если вопрос не связан с правом США — скажи: "Извините, я специализируюсь исключительно на законодательстве США. Пожалуйста, спросите о законах, правах или юридических процедурах США."`;

        let currentUser = null;
        let messages = [];
        let waiting = false;
        let dailyCount = 0;
        let currentConversationId = null;
        let isSidebarOpen = false;
        
        let userLimits = {};
        const STORAGE_KEY = 'hyuga_user_limits';

        function loadUserLimits() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    userLimits = JSON.parse(stored);
                } catch (e) {
                    userLimits = {};
                }
            } else {
                userLimits = {};
            }
        }

        function saveUserLimits() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userLimits));
        }

        function getTodayKey() {
            const today = new Date().toISOString().split('T')[0];
            return today;
        }

        function getUserLimit() {
            if (!currentUser) return DAILY_LIMIT;
            if (VIP_LIMITS[currentUser.id]) {
                return VIP_LIMITS[currentUser.id];
            }
            return DAILY_LIMIT;
        }

        function loadDailyCount() {
            if (!currentUser) return { used: 0, limit: DAILY_LIMIT };
            const today = getTodayKey();
            const userId = currentUser.id;
            const key = `${userId}_${today}`;
            const used = userLimits[key] || 0;
            const limit = getUserLimit();
            return { used, limit };
        }

        function incrementDailyCount() {
            if (!currentUser) return;
            const today = getTodayKey();
            const userId = currentUser.id;
            const key = `${userId}_${today}`;
            const current = userLimits[key] || 0;
            userLimits[key] = current + 1;
            saveUserLimits();
            dailyCount = userLimits[key];
            updateLimitBar();
        }

        function updateLimitBar() {
            const { used, limit } = loadDailyCount();
            const remaining = Math.max(0, limit - used);
            
            if (limit >= 999999) {
                limitBar.innerHTML = `📨 ${used} / ∞ (VIP)`;
            } else {
                limitBar.innerHTML = `📨 ${used} / ${limit} сегодня (осталось ${remaining})`;
            }
            
            if (used >= limit) {
                limitBar.innerHTML += ' ⚠️ Лимит!';
                questionInput.disabled = true;
                sendBtn.disabled = true;
            } else {
                if (currentUser) {
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                }
            }
        }

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');

        const convListSide = document.getElementById('convListSide');
        const sideNewChatBtn = document.getElementById('sideNewChatBtn');
        const sideUserInfo = document.getElementById('sideUserInfo');
        const sideUnauth = document.getElementById('sideUnauth');
        const sideAvatar = document.getElementById('sideAvatar');
        const sideUserName = document.getElementById('sideUserName');
        const sideLogoutBtn = document.getElementById('sideLogoutBtn');
        const sideLoginBtn = document.getElementById('sideLoginBtn');

        const headerUserInfo = document.getElementById('headerUserInfo');
        const headerAvatar = document.getElementById('headerAvatar');
        const headerUserName = document.getElementById('headerUserName');
        const headerLogoutBtn = document.getElementById('headerLogoutBtn');
        const headerLoginBtn = document.getElementById('headerLoginBtn');

        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const limitBar = document.getElementById('limitBar');

        function toggleSidebar(open) {
            isSidebarOpen = open !== undefined ? open : !isSidebarOpen;
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open', isSidebarOpen);
                overlay.classList.toggle('show', isSidebarOpen);
            } else {
                sidebar.classList.toggle('closed', !isSidebarOpen);
            }
        }

        menuToggle.addEventListener('click', () => toggleSidebar());
        sidebarCloseBtn.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                overlay.classList.remove('show');
                sidebar.classList.remove('open');
                sidebar.classList.toggle('closed', !isSidebarOpen);
            }
        });

        function getConversationsKey() {
            return `hyuga_conv_${currentUser ? currentUser.id : 'guest'}`;
        }

        function loadConversations() {
            if (!currentUser) return [];
            try {
                const data = localStorage.getItem(getConversationsKey());
                return data ? JSON.parse(data) : [];
            } catch { return []; }
        }

        function saveConversations(convs) {
            if (!currentUser) return;
            localStorage.setItem(getConversationsKey(), JSON.stringify(convs));
        }

        function getCurrentConversation() {
            const convs = loadConversations();
            if (convs.length === 0) {
                const newConv = { id: Date.now().toString(), title: 'Новый диалог', messages: [] };
                convs.push(newConv);
                saveConversations(convs);
                return newConv;
            }
            if (currentConversationId) {
                const found = convs.find(c => c.id === currentConversationId);
                if (found) return found;
            }
            return convs[convs.length - 1];
        }

        function saveCurrentConversation(messagesList) {
            const convs = loadConversations();
            const conv = getCurrentConversation();
            conv.messages = messagesList;
            if (messagesList.length > 0 && messagesList[0].role === 'user' && conv.title === 'Новый диалог') {
                const title = messagesList[0].content.substring(0, 30);
                conv.title = title + (messagesList[0].content.length > 30 ? '...' : '');
            }
            const index = convs.findIndex(c => c.id === conv.id);
            if (index !== -1) {
                convs[index] = conv;
            } else {
                convs.push(conv);
            }
            saveConversations(convs);
            renderConvList();
        }

        function deleteConversation(id) {
            let convs = loadConversations();
            convs = convs.filter(c => c.id !== id);
            saveConversations(convs);
            if (currentConversationId === id) {
                if (convs.length > 0) {
                    currentConversationId = convs[convs.length - 1].id;
                    const conv = convs[convs.length - 1];
                    messages = conv.messages || [];
                } else {
                    currentConversationId = null;
                    messages = [];
                }
                renderMessages();
            }
            renderConvList();
            updateLimitBar();
        }

        function renderConvList() {
            const convs = loadConversations();
            convListSide.innerHTML = '';
            if (convs.length === 0) {
                convListSide.innerHTML = '<div style="padding:16px 12px; color:var(--text-dim); font-size:0.8rem; text-align:center;">Нет диалогов<br>Создайте новый</div>';
                return;
            }
            convs.forEach(c => {
                const isActive = c.id === currentConversationId;
                const div = document.createElement('div');
                div.className = `conv-item-side ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="conv-title">${c.title}</span>
                    <button class="conv-del" data-id="${c.id}">✕</button>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        switchConversation(c.id);
                    }
                });
                const delBtn = div.querySelector('.conv-del');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(c.id);
                });
                convListSide.appendChild(div);
            });
        }

        function switchConversation(id) {
            const convs = loadConversations();
            const found = convs.find(c => c.id === id);
            if (found) {
                currentConversationId = id;
                messages = found.messages || [];
                renderMessages();
                renderConvList();
                updateLimitBar();
                if (window.innerWidth <= 768) toggleSidebar(false);
            }
        }

        function createNewConversation() {
            if (!currentUser) return;
            
            if (!VIP_LIMITS[currentUser?.id]) {
                const convs = loadConversations();
                const activeConvs = convs.filter(c => c.messages && c.messages.length > 0);
                if (activeConvs.length >= 1) {
                    alert('❌ У вас уже есть активный диалог. Закончите его (15 вопросов), чтобы создать новый.');
                    return;
                }
            }
            
            const convs = loadConversations();
            const newConv = { id: Date.now().toString(), title: 'Новый диалог', messages: [] };
            convs.push(newConv);
            saveConversations(convs);
            currentConversationId = newConv.id;
            messages = [];
            renderMessages();
            renderConvList();
            updateLimitBar();
            if (window.innerWidth <= 768) toggleSidebar(false);
        }

        function loginWithDiscord() {
            const redirectUri = window.location.href.split('#')[0];
            const url =
                `https://discord.com/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('hyuga_user');
            messages = [];
            currentConversationId = null;
            renderMessages();
            updateUIForUnauth();
            updateLimitBar();
            renderConvList();
        }

        function updateUIForAuth() {
            sideUserInfo.style.display = 'flex';
            sideUnauth.style.display = 'none';
            sideAvatar.src = currentUser.avatar;
            sideUserName.textContent = currentUser.username;
            sideNewChatBtn.disabled = false;

            headerUserInfo.style.display = 'flex';
            headerLoginBtn.style.display = 'none';
            headerLogoutBtn.style.display = 'block';
            headerAvatar.src = currentUser.avatar;
            headerUserName.textContent = currentUser.username;

            questionInput.disabled = false;
            sendBtn.disabled = false;

            const convs = loadConversations();
            if (convs.length > 0) {
                const last = convs[convs.length - 1];
                currentConversationId = last.id;
                messages = last.messages || [];
                renderMessages();
            } else {
                messages = [];
                renderMessages();
            }
            renderConvList();
            updateLimitBar();
        }

        function updateUIForUnauth() {
            sideUserInfo.style.display = 'none';
            sideUnauth.style.display = 'block';
            sideNewChatBtn.disabled = true;

            headerUserInfo.style.display = 'none';
            headerLoginBtn.style.display = 'block';
            headerLogoutBtn.style.display = 'none';

            questionInput.disabled = true;
            sendBtn.disabled = true;
            messages = [];
            currentConversationId = null;
            renderMessages();
            renderConvList();
            updateLimitBar();
        }

        function fetchDiscordUser(token) {
            fetch('https://discord.com/api/users/@me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.id) {
                    currentUser = {
                        id: user.id,
                        username: user.username,
                        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` :
                            'https://cdn.discordapp.com/embed/avatars/0.png'
                    };
                    localStorage.setItem('hyuga_user', JSON.stringify(currentUser));
                    loadUserLimits();
                    updateUIForAuth();
                }
            })
            .catch(() => updateUIForUnauth());
        }

        function checkAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                fetchDiscordUser(token);
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            const saved = localStorage.getItem('hyuga_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                loadUserLimits();
                updateUIForAuth();
            } else {
                updateUIForUnauth();
                updateLimitBar();
            }
        }

        function renderMessages() {
            if (messages.length === 0) {
                chatMessages.innerHTML = currentUser ?
                    '<div class="message bot">⚖️ Задайте вопрос по законодательству США.</div>' :
                    '<div class="message bot">🔐 Авторизуйтесь через Discord, чтобы начать диалог.</div>';
                return;
            }
            chatMessages.innerHTML = messages.map(msg => {
                let content = msg.content.replace(/\n/g, '<br>');
                if (msg.role === 'bot' && msg.showCreateBtn) {
                    content += `<br><button class="create-new-btn" onclick="createNewConversation()">➕ Создать новый диалог</button>`;
                }
                return `<div class="message ${msg.role === 'user' ? 'user' : 'bot'}">${content}</div>`;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function askGroq(question) {
            const history = messages.map(m => ({ role: m.role, content: m.content }));

            const payload = {
                model: MODEL,
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...history,
                    { role: 'user', content: question }
                ],
                temperature: 0.3,
                max_tokens: 2000
            };

            const response = await fetch(GROQ_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function sendMessage() {
            if (!currentUser) return;
            if (waiting) return;
            const { used, limit } = loadDailyCount();
            if (used >= limit) {
                updateLimitBar();
                return;
            }

            const userMessages = messages.filter(m => m.role === 'user').length;
            if (userMessages >= MAX_MESSAGES_PER_CONV) {
                const reply = '⚠️ В этом диалоге достигнут лимит в 15 вопросов. Создайте новый диалог, чтобы продолжить.';
                const msgObj = { role: 'assistant', content: reply, showCreateBtn: true };
                messages.push(msgObj);
                renderMessages();
                saveCurrentConversation(messages);
                return;
            }

            const question = questionInput.value.trim();
            if (!question) return;
            questionInput.value = '';
            questionInput.disabled = true;
            sendBtn.disabled = true;

            messages.push({ role: 'user', content: question });
            renderMessages();
            saveCurrentConversation(messages);
            incrementDailyCount();
            updateLimitBar();

            waiting = true;
            const thinkingIndex = messages.length;
            messages.push({ role: 'assistant', content: '🤔 Думаю...' });
            renderMessages();

            try {
                const reply = await askGroq(question);
                messages[thinkingIndex] = { role: 'assistant', content: reply };
                renderMessages();
                saveCurrentConversation(messages);
                renderConvList();
            } catch (err) {
                messages[thinkingIndex] = { role: 'assistant', content: `❌ Ошибка: ${err.message}` };
                renderMessages();
            } finally {
                waiting = false;
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
                updateLimitBar();
            }
        }

        sideLogoutBtn.addEventListener('click', logout);
        headerLogoutBtn.addEventListener('click', logout);
        sideLoginBtn.addEventListener('click', loginWithDiscord);
        headerLoginBtn.addEventListener('click', loginWithDiscord);
        sideNewChatBtn.addEventListener('click', createNewConversation);
        sendBtn.addEventListener('click', sendMessage);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(() => {
            if (currentUser) {
                const { used } = loadDailyCount();
                if (used !== dailyCount) {
                    dailyCount = used;
                    updateLimitBar();
                }
            }
        }, 60000);

        loadUserLimits();
        checkAuth();

        if (window.innerWidth > 768) {
            isSidebarOpen = false;
            sidebar.classList.add('closed');
        } else {
            isSidebarOpen = false;
            sidebar.classList.add('open');
        }
    </script>
