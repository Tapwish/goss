Глава I. Задачи и принципы Уголовного кодекса Штата San-Andreas
​

Статья 1. Уголовное законодательство Штата San-Andreas

ч. 1 Уголовное законодательство Штата San-Andreas состоит из настоящего Кодекса. Новые законы, предусматривающие уголовную ответственность, подлежат включению в настоящий Кодекс.​

ч. 2 Настоящий Кодекс основывается на Конституции Штата San-Andreas и общепризнанных принципах и нормах международного права.​

Статья 1.1 Задачи Уголовного кодекса Штата San-Andreas

ч. 1 Задачами настоящего Кодекса являются: охрана прав и свобод человека и гражданина, собственности, общественного порядка и общественной безопасности, окружающей среды, конституционного строя Штата San-Andreas от преступных посягательств, обеспечение мира и безопасности человечества, а также предупреждение преступлений.​
​
ч. 2 Для осуществления этих задач настоящий Кодекс устанавливает основание и принципы уголовной ответственности, определяет, какие опасные для личности, общества или государства деяния признаются преступлениями, и устанавливает виды наказаний и иные меры уголовно-правового характера за совершение преступлений.​

Статья 1.2 Принцип законности

ч. 1 Преступность деяния, а также его наказуемость и иные уголовно-правовые последствия определяются только настоящим Кодексом.​
​
ч. 2 Применение уголовного закона по аналогии не допускается.​

Статья 1.3 Принцип равенства граждан перед законом.

ч. 1 Лица, совершившие преступления, равны перед законом и подлежат уголовной ответственности независимо от пола, расы, национальности, языка, происхождения, имущественного и должностного положения, места жительства, отношения к религии, убеждений, принадлежности к общественным объединениям, а также других обстоятельств.​

Статья 1.4 Принцип вины

ч. 1 Лицо подлежит уголовной ответственности только за те общественно опасные действия (бездействие) и наступившие общественно опасные последствия, в отношении которых установлена его вина.​

ч. 2 Объективное вменение, то есть уголовная ответственность за невиновное причинение вреда, не допускается.​

Статья 1.5 Принцип справедливости

​
ч. 2 Никто не может нести уголовную ответственность дважды за одно и то же преступление.​

ч. 2 Наказание и иные меры уголовно-правового характера, применяемые к лицу, совершившему преступление, не могут иметь своей целью причинение физических страданий или унижение человеческого достоинства.​

Статья 1.7 Основание уголовной ответственности

ч. 1 Основанием уголовной ответственности является совершение деяния, содержащего все признаки состава преступления, предусмотренного настоящим Кодексом.​

Статья 1.8 Состав преступления

ч. 1 Состав преступления представляет собой совокупность объективных и субъективных признаков, которые в сумме определяют общественно опасное деяние как преступление. Признаки состава преступления закрепляются в нормах действующего законодательства. Их можно условно разделить на четыре подсистемы: признаки объекта, субъекта, объективной и субъективной стороны преступления.​
​
Признак объекта - уголовно-правовая категория, которая используется для обозначения общественных порядков, которым причиняется ущерб вследствие совершения преступления​
Признак субъекта - лицо, осуществляющее воздействие на объект уголовно-правовой охраны и способное нести за это ответственность.​
Признак объективной стороны преступления - один из элементов состава преступления, включающий в себя признаки, характеризующие внешнее проявление преступления в реальной действительности, доступное для наблюдения и изучения.​
Признак субъективной стороны преступления - это внутреннее психическое отношение лица к совершаемому им общественно опасному деянию.​
Примечание: Наличие в деянии всех признаков некоего состава преступления является основанием для признания его преступным; отсутствие хотя бы одного из них означает, что отсутствует и состав преступления в целом, а деяние при этом признается не преступным и не противоправным в том числе.​
​
ч. 2 Виды составов преступления. Настоящим кодексом выделяется 3 вида состава преступления.​
​
а) Материальные составы - составы преступления, объективная сторона которых включает в себя наличие общественно опасных последствий.​
б) Формальные составы – составы преступления, объективная сторона которых включает только признаки, характеризующие общественно опасные деяния и не предусматривает наличие общественно опасных последствий.​
б.1) Усеченные составы - составы преступления, в которых момент их окончания перенесен на более раннюю стадию.​
Пример: Покушение на совершение преступления, приготовление к преступлению.​

Статья 1.9 Судимость

ч. 1 Судимость - правовой статус лица, обусловленный фактом осуждения и назначения ему наказания за совершенное преступление и влекущее при повторном совершении этим лицом преступления установленные уголовным законодательством правовые последствия. ​
​
ч. 2 Лицо, которому назначена мера наказания за совершение преступления, считается судимым со дня назначения наказания до момента погашения или снятия судимости в порядке, установленном Конституцией и законами штата.​
​
ч. 3 При назначении меры наказания в виде уголовного штрафа, судимость у лица, которому была назначена такая мера, не возникает.​
​
ч. 4 Правовое состояние судимости запрещает лицу находится на государственной службе.​

Статья 1.10 Действие уголовного закона во времени

ч. 1. Преступность и наказуемость деяния определяются уголовным законом, действовавшим во время совершения этого деяния. ​
​
ч. 2. Временем совершения преступления признается время совершения общественно опасного действия (бездействия) независимо от времени наступления последствий.​

Статья 1.11 Обратная сила уголовного закона.

ч. 1. Уголовный закон, устраняющий преступность деяния, смягчающий наказание или иным образом улучшающий положение лица, совершившего преступление, имеет обратную силу, то есть распространяется на лиц, совершивших соответствующие деяния до вступления такого закона в силу, в том числе на лиц, отбывающих наказание или отбывших наказание, но имеющих судимость. Уголовный закон, устанавливающий преступность деяния, усиливающий наказание или иным образом ухудшающий положение лица, обратной силы не имеет. ​
​
ч. 2. Если новый уголовный закон смягчает наказание за деяние, которое отбывается лицом, то это наказание подлежит сокращению в пределах, предусмотренных новым уголовным законом.​


РАЗДЕЛ II. Преступление
ГЛАВА II. Понятие преступления, виды преступлений и вина​

Статья 2. Понятие преступления

ч. 1 Преступлением признается виновно совершенное общественно опасное деяние, запрещенное настоящим Кодексом под угрозой наказания.​
​
ч. 2 Не является преступлением действие (бездействие), хотя формально и содержащее признаки какого-либо деяния, предусмотренного настоящим Кодексом, но в силу малозначительности не представляющее общественной опасности.​

Статья 2.1 Рецидив преступлений

ч. 1 Рецидивом преступлений признается совершение умышленного преступления лицом, имеющим судимость за ранее совершенное умышленное преступление.​
​
ч. 2 Рецидив преступлений влечет более строгое наказание на основании и в пределах, предусмотренных настоящим Кодексом, а также иные последствия, предусмотренные законодательством Штата San-Andreas.​

Статья 2.2 Формы вины

ч. 1 Виновным в преступлении признается лицо, совершившее деяние умышленно или по неосторожности.​
​
ч. 2 Деяние, совершенное только по неосторожности, признается преступлением лишь в случае, когда это специально предусмотрено статьей настоящего Кодекса.​

Статья 2.3 Преступление, совершенное умышленно

ч. 1 Преступлением, совершенным умышленно, признается деяние, совершенное с прямым или косвенным умыслом.​
​
ч. 2 Преступление признается совершенным с прямым умыслом, если лицо осознавало общественную опасность своих действий (бездействия), предвидело возможность или неизбежность наступления общественно опасных последствий и желало их наступления.​
​
ч. 3 Преступление признается совершенным с косвенным умыслом, если лицо осознавало общественную опасность своих действий (бездействия), предвидело возможность наступления общественно опасных последствий, не желало, но сознательно допускало эти последствия либо относилось к ним безразлично.​

Статья 2.4 Преступление, совершенное по неосторожности
​
ч. 1 Преступлением, совершенным по неосторожности, признается деяние, совершенное по легкомыслию или небрежности.​
​
ч. 2 Преступление признается совершенным по легкомыслию, если лицо предвидело возможность наступления общественно опасных последствий своих действий (бездействия), но без достаточных к тому оснований самонадеянно рассчитывало на предотвращение этих последствий.​
​
ч. 3 Преступление признается совершенным по небрежности, если лицо не предвидело возможности наступления общественно опасных последствий своих действий (бездействия), хотя при необходимой внимательности и предусмотрительности должно было и могло предвидеть эти последствия.​

Статья 2.5 Невиновное причинение вреда

ч. 1 Деяние признается совершенным невиновно, если лицо, его совершившее, не осознавало и по обстоятельствам дела не могло осознавать общественной опасности своих действий (бездействия) либо не предвидело возможности наступления общественно опасных последствий и по обстоятельствам дела не должно было или не могло их предвидеть.​
​
ч. 2 Деяние признается также совершенным невиновно, если лицо, его совершившее, хотя и предвидело возможность наступления общественно опасных последствий своих действий (бездействия), но не могло предотвратить эти последствия в силу несоответствия своих психофизиологических качеств требованиям экстремальных условий или нервно-психическим перегрузкам.​

Статья 2.6 Ответственность за преступление, совершенное с двумя формами вины
​
ч. 1 Если в результате совершения умышленного преступления причиняются тяжкие последствия, которые по закону влекут более строгое наказание и которые не охватывались умыслом лица, уголовная ответственность за такие последствия наступает только в случае, если лицо предвидело возможность их наступления, но без достаточных к тому оснований самонадеянно рассчитывало на их предотвращение, или в случае, если лицо не предвидело, но должно было и могло предвидеть возможность наступления этих последствий. В целом такое преступление признается совершенным умышленно.​


ГЛАВА III. Неоконченное преступление и соучастие в преступлении​


Статья 3. Оконченное и неоконченное преступления

ч. 1 Преступление признается оконченным, если в совершенном лицом деянии содержатся все признаки состава преступления, предусмотренного настоящим Кодексом.​
​
ч. 2 Неоконченным преступлением признаются приготовление к преступлению и покушение на преступление.​
​
ч. 3 Уголовная ответственность за неоконченное преступление наступает по статье настоящего Кодекса, предусматривающей ответственность за оконченное преступление, со ссылкой на статью 3.1 настоящего Кодекса.​

Статья 3.1 Приготовление к преступлению и покушение на преступление

ч. 1 Приготовлением к преступлению признаются приискание, изготовление или приспособление лицом средств или орудий совершения преступления, приискание соучастников преступления, сговор на совершение преступления либо иное умышленное создание условий для совершения преступления, если при этом преступление не было доведено до конца по не зависящим от этого лица обстоятельствам.​
​
ч. 2 Покушением на преступление признаются умышленные действия (бездействие) лица, непосредственно направленные на совершение преступления, если при этом преступление не было доведено до конца по не зависящим от этого лица обстоятельствам. ​

Статья 3.2 Добровольный отказ от преступления

ч. 1 Добровольным отказом от преступления признается прекращение лицом приготовления к преступлению либо прекращение действий (бездействия), непосредственно направленных на совершение преступления, если лицо осознавало возможность доведения преступления до конца.​
​
ч. 2 Лицо не подлежит уголовной ответственности за преступление, если оно добровольно и окончательно отказалось от доведения этого преступления до конца.​
​
ч. 3 Лицо, добровольно отказавшееся от доведения преступления до конца, подлежит уголовной ответственности в том случае, если фактически совершенное им деяние содержит иной состав преступления.​
​
ч. 4 Организатор преступления и подстрекатель к преступлению не подлежат уголовной ответственности, если эти лица своевременным сообщением органам власти или иными предпринятыми мерами предотвратили доведение преступления исполнителем до конца. Пособник преступления не подлежит уголовной ответственности, если он предпринял все зависящие от него меры, чтобы предотвратить совершение преступления.​
​
ч. 5 Если действия организатора или подстрекателя, предусмотренные частью четвертой настоящей статьи, не привели к предотвращению совершения преступления исполнителем, то предпринятые ими меры могут быть признаны смягчающими обстоятельствами при назначении наказания.​

Статья 3.3 Понятие соучастия в преступлении

ч. 1 Соучастием в преступлении признается умышленное совместное участие двух или более лиц в совершении умышленного преступления.​

Статья 3.4 Виды соучастников преступления

ч. 1 Соучастниками преступления наряду с исполнителем признаются организатор, подстрекатель и пособник.​
​
ч. 2 Исполнителем признается лицо, непосредственно совершившее преступление либо непосредственно участвовавшее в его совершении совместно с другими лицами (соисполнителями), а также лицо, совершившее преступление посредством использования других лиц, не подлежащих уголовной ответственности в силу возраста, невменяемости или других обстоятельств, предусмотренных настоящим Кодексом.​
​
ч. 3 Организатором признается лицо, организовавшее совершение преступления или руководившее его исполнением, а равно лицо, создавшее организованную группу или преступное сообщество (преступную организацию) либо руководившее ими.​
​
ч. 4 Подстрекателем признается лицо, склонившее другое лицо к совершению преступления путем уговора, подкупа, угрозы или другим способом.​
​
ч. 5 Пособником признается лицо, содействовавшее совершению преступления советами, указаниями, предоставлением информации, средств или орудий совершения преступления либо устранением препятствий, а также лицо, заранее обещавшее скрыть преступника, средства или орудия совершения преступления, следы преступления либо предметы, добытые преступным путем, а равно лицо, заранее обещавшее приобрести или сбыть такие предметы.​

Статья 3.5 Ответственность соучастников преступления

ч. 1 Ответственность соучастников преступления определяется характером и степенью фактического участия каждого из них в совершении преступления.​
​
ч. 2 Соисполнители отвечают по статье Особенной части настоящего Кодекса за преступление, совершенное ими совместно, без ссылки на статью 3.4 настоящего Кодекса.​
​
ч. 3 Уголовная ответственность организатора, подстрекателя и пособника наступает по статье, предусматривающей наказание за совершенное преступление, со ссылкой на статью 3.4 настоящего Кодекса, за исключением случаев, когда они одновременно являлись соисполнителями преступления.​
​
ч. 4 Лицо, не являющееся субъектом преступления, специально указанным в соответствующей статье Особенной части настоящего Кодекса, участвовавшее в совершении преступления, предусмотренного этой статьей, несет уголовную ответственность за данное преступление в качестве его организатора, подстрекателя либо пособника.​
​
ч. 5 В случае недоведения исполнителем преступления до конца по не зависящим от него обстоятельствам остальные соучастники несут уголовную ответственность за приготовление к преступлению или покушение на преступление. За приготовление к преступлению несет уголовную ответственность также лицо, которому по не зависящим от него обстоятельствам не удалось склонить других лиц к совершению преступления.​

Статья 3.6 Совершение преступления группой лиц, группой лиц по предварительному сговору, организованной группой или преступным сообществом (преступной организацией)

ч. 1 Преступление признается совершенным группой лиц, если в его совершении совместно участвовали два или более исполнителя без предварительного сговора.​
​
ч. 2 Преступление признается совершенным группой лиц по предварительному сговору, если в нем участвовали лица, заранее договорившиеся о совместном совершении преступления.​
​
ч. 3 Преступление признается совершенным организованной группой, если оно совершено устойчивой группой лиц, заранее объединившихся для совершения одного или нескольких преступлений.​
​
ч. 4 Преступление признается совершенным преступным сообществом (преступной организацией), если оно совершено структурированной организованной группой или объединением организованных групп, действующих под единым руководством, члены которых объединены в целях совместного совершения одного или нескольких тяжких либо особо тяжких преступлений для получения прямо или косвенно финансовой или иной материальной выгоды.​
​
ч. 5 Лицо, создавшее организованную группу или преступное сообщество (преступную организацию) либо руководившее ими, подлежит уголовной ответственности за их организацию и руководство ими в случаях, предусмотренных статьями 12.12, 12.5 настоящего Кодекса, а также за все совершенные организованной группой или преступным сообществом (преступной организацией) преступления, если они охватывались его умыслом. Другие участники организованной группы или преступного сообщества (преступной организации) несут уголовную ответственность за участие в них в случаях, предусмотренных статьями 12.12, 12.5 настоящего Кодекса, а также за преступления, в подготовке или совершении которых они участвовали.​
​
ч. 6 Создание организованной группы в случаях, не предусмотренных статьями Особенной части настоящего Кодекса, влечет уголовную ответственность за приготовление к тем преступлениям, для совершения которых она создана.​
​
ч. 7 Совершение преступления группой лиц, группой лиц по предварительному сговору, организованной группой или преступным сообществом (преступной организацией) влечет более строгое наказание на основании и в пределах, предусмотренных настоящим Кодексом.​

Статья 3.7 Эксцесс исполнителя преступления

ч. 1 Эксцессом исполнителя признается совершение исполнителем преступления, не охватывающегося умыслом других соучастников. За эксцесс исполнителя другие соучастники преступления уголовной ответственности не подлежат.​


ГЛАВА IV. Обстоятельства, исключающие преступность деяния​


Статья 4. Необходимая оборона

ч. 1 Не является преступлением причинение вреда посягающему лицу в состоянии необходимой обороны, то есть при защите личности и прав обороняющегося или других лиц, охраняемых законом интересов общества или государства от общественно опасного посягательства, если это посягательство было сопряжено с насилием, опасным для жизни обороняющегося или другого лица, либо с непосредственной угрозой применения такого насилия.​
​
ч. 2 Защита от посягательства, не сопряженного с насилием, опасным для жизни обороняющегося или другого лица, либо с непосредственной угрозой применения такого насилия, является правомерной, если при этом не было допущено превышения пределов необходимой обороны, то есть умышленных действий, явно не соответствующих характеру и опасности посягательства.​
​
ч. 2.1 Не являются превышением пределов необходимой обороны действия обороняющегося лица, если это лицо вследствие неожиданности посягательства не могло объективно оценить степень и характер опасности нападения.​
​
ч. 2.2 Не являются превышением пределов необходимой обороны действия лица, направленные на защиту себя и своей семьи от насилия или угрозы применения насилия либо на защиту своего имущества против лица, незаконно проникшего в его жилище.​
​
ч. 3 Положения настоящей статьи в равной мере распространяются на всех лиц независимо от их профессиональной или иной специальной подготовки и служебного положения, а также независимо от возможности избежать общественно опасного посягательства или обратиться за помощью к другим лицам или органам власти.​

Статья 4.1 Причинение вреда при задержании лица, совершившего преступление

ч. 1 Не является преступлением причинение вреда лицу, совершившему преступление, при его задержании для доставления органам власти и пресечения возможности совершения им новых преступлений, если иными средствами задержать такое лицо не представлялось возможным и при этом не было допущено превышения необходимых для этого мер.​
​
ч. 2 Превышением мер, необходимых для задержания лица, совершившего преступление, признается их явное несоответствие характеру и степени общественной опасности совершенного задерживаемым лицом преступления и обстоятельствам задержания, когда лицу без необходимости причиняется явно чрезмерный, не вызываемый обстановкой вред. Такое превышение влечет за собой уголовную ответственность только в случаях умышленного причинения вреда.​

Статья 4.2 Крайняя необходимость

ч. 1 Не является преступлением причинение вреда охраняемым уголовным законом интересам в состоянии крайней необходимости, то есть для устранения опасности, непосредственно угрожающей личности и правам данного лица или иных лиц, охраняемым законом интересам общества или государства, если эта опасность не могла быть устранена иными средствами и при этом не было допущено превышения пределов крайней необходимости.​
​
ч. 2 Превышением пределов крайней необходимости признается причинение вреда, явно не соответствующего характеру и степени угрожавшей опасности и обстоятельствам, при которых опасность устранялась, когда указанным интересам был причинен вред равный или более значительный, чем предотвращенный. Такое превышение влечет за собой уголовную ответственность только в случаях умышленного причинения вреда.​

Статья 4.3 Обоснованный риск

ч. 1 Не является преступлением причинение вреда охраняемым уголовным законом интересам при обоснованном риске для достижения общественно полезной цели.​
​
ч. 2 Риск признается обоснованным, если указанная цель не могла быть достигнута не связанными с риском действиями (бездействием) и лицо, допустившее риск, предприняло достаточные меры для предотвращения вреда охраняемым уголовным законом интересам.​
​
ч. 3 Риск не признается обоснованным, если он заведомо был сопряжен с угрозой для жизни многих людей, с угрозой экологической катастрофы или общественного бедствия.​

Статья 4.4 Исполнение приказа или распоряжения

ч. 1. Не является преступлением причинение вреда охраняемым уголовным законом интересам лицом, действующим во исполнение обязательных для него приказа или распоряжения. Уголовную ответственность за причинение такого вреда несет лицо, отдавшее незаконные приказ или распоряжение.​
​
ч. 2. Лицо, совершившее умышленное преступление во исполнение заведомо незаконных приказа или распоряжения, несет уголовную ответственность на общих основаниях. Неисполнение заведомо незаконных приказа или распоряжения исключает уголовную ответственность.​

Статья 4.5 Физическое или психическое принуждение

ч 1. Не является преступлением причинение вреда охраняемым уголовным законом интересам в результате физического принуждения, если вследствие такого принуждения лицо не могло руководить своими действиями (бездействием).​
​
ч 2. Вопрос об уголовной ответственности за причинение вреда охраняемым уголовным законом интересам в результате психического принуждения, а также в результате физического принуждения, вследствие которого лицо сохранило возможность руководить своими действиями, решается с учетом положений статьи 4.2 настоящего Кодекса.​


РАЗДЕЛ III. Наказание
ГЛАВА V. Виды и назначение наказаний, освобождение от уголовной ответственности​


Статья 5. Виды наказаний

ч. 1 Видами наказаний являются:​
​
а) Судебный штраф;​
б) Уголовный штраф;​
в) Лишение права занимать определенные должности или заниматься определенной деятельностью;​
г) Увольнение с государственной или военной службы, в том числе с лишением всех званий, наград и привилегий;​
д) Лишение свободы на определенный срок;​
е) Исправительные работы;​
ё) Принудительные работы.​
​
ч. 2 В результате судебного процесса по уголовному делу могут быть назначены следующие виды наказаний:​
​
а) Судебный штраф;​
б) Уголовный штраф;​
в) Лишение права занимать определенные должности или заниматься определенной деятельностью;​
г) Увольнение с государственной или военной службы, в том числе с лишением всех званий, наград и привилегий;​
д) Лишение свободы на определенный срок;​
е) Исправительные работы;​
ё) Принудительные работы.​
​
ч. 3 Судебные штрафы, предусмотренные статьями настоящего Кодекса, применяются исключительно в судебном порядке. Уголовные штрафы, предусмотренные статьями настоящего Кодекса, применяются исключительно сотрудниками Департамента Полиции города Лос-Сантос, Департамента Шерифа округа Блэйн и Секретной Службы, Федеральное Расследовательское Бюро, а также Офисом Генерального Прокурора и судом.​
​
ч. 4 В результате расследования правоохранительными органами по уголовным статьям может быть назначено только лишение свободы на определенный срок и уголовный штраф.​

Статья 5.1 Исправительные работы

ч. 1 Исправительные работы назначаются осужденному, имеющему основное место работы, а равно не имеющему его. Осужденный, имеющий основное место работы, отбывает исправительные работы по основному месту работы. Осужденный, не имеющий основного места работы, отбывает исправительные работы в местах, определяемых Судом.​
​
ч. 2 Срок исправительных работ устанавливается приговором суда.​
​
ч. 3 В случае злостного уклонения осужденного от отбывания исправительных работ суд может заменить неотбытое наказание принудительными работами или лишением свободы.​

Статья 5.1.2 Принудительные работы

ч. 1 Принудительные работы применяются как альтернатива лишению свободы.​
​
ч. 2 Если, назначив наказание в виде лишения свободы, суд придет к выводу о возможности исправления осужденного без реального отбывания наказания в местах лишения свободы, он постановляет заменить осужденному наказание в виде лишения свободы принудительными работами.​
​
ч. 3 Принудительные работы заключаются в привлечении осужденного к труду в местах, определяемых судом.​
​
ч. 4 Срок принудительных работ устанавливается приговором суда.​
​
ч. 5 В случае уклонения осужденного от отбывания принудительных работ либо признания осужденного к принудительным работам злостным нарушителем порядка и условий отбывания принудительных работ неотбытая часть наказания заменяется лишением свободы.​
​
ч. 6 Места, порядок и иные условия отбывания принудительных работ определяется Судом.​

Статья 5.2 Общие начала назначения наказания

ч. 1 Лицу, признанному виновным в совершении преступления, назначается справедливое наказание в пределах, предусмотренных соответствующей статьей Особенной части настоящего Кодекса, и с учетом положений Общей части настоящего Кодекса.​
​
ч. 1.2 По решению суда или ордеру Офиса Генерального Прокурора лицу за совершение любого преступления, указанного в ч. 2 ст. 5.7 настоящего Кодекса, назначается справедливое наказание в пределах от минимальной санкции, предусмотренной применяемой нормой Особенной части настоящего Кодекса, и до 10 лет лишения свободы.​
​
ч. 2 При назначении наказания учитываются характер и степень общественной опасности преступления и личность виновного, в том числе обстоятельства, смягчающие и отягчающие наказание.​
​
ч. 3 При совокупности преступлений наказание назначается в пределах той статьи, которая предусматривает наиболее строгое наказание. При этом, суд и Офис Генерального Прокурора на основании ордера может назначить наказание отдельно за каждое совершенное преступление путем их полного или частичного сложения.​

Статья 5.2.1 Назначение наказания за неоконченное преступление

ч. 1 При назначении наказания за неоконченное преступление учитываются обстоятельства, в силу которых преступление не было доведено до конца.​
​
ч. 2 Срок или размер наказания за приготовление к преступлению не может превышать половины максимального срока или размера наиболее строгого вида наказания, предусмотренного соответствующей статьей Особенной части настоящего Кодекса за оконченное преступление.​
​
ч. 3 Срок или размер наказания за покушение на преступление не может превышать трех четвертей максимального срока или размера наиболее строгого вида наказания, предусмотренного соответствующей статьей Особенной части настоящего Кодекса за оконченное преступление.​

Статья 5.3 Обстоятельства, смягчающие наказание

ч. 1 Смягчающими обстоятельствами признаются:​
​
а) совершение преступления в результате физического или психического принуждения либо в силу материальной, служебной или иной зависимости;​
б) совершение преступления при нарушении условий правомерности необходимой обороны, задержания лица, совершившего преступление, крайней необходимости, обоснованного риска, исполнения приказа или распоряжения;​
в) противоправность или аморальность поведения потерпевшего, явившегося поводом для преступления;​
г) явка с повинной, активное способствование раскрытию и расследованию преступления, изобличению и уголовному преследованию других соучастников преступления;​
д) оказание медицинской и иной помощи потерпевшему после совершения преступления, добровольное возмещение имущественного ущерба и морального вреда, причиненных в результате преступления, иные действия, направленные на заглаживание вреда, причиненного потерпевшему;​
е) иные обстоятельства.​

Статья 5.4 Обстоятельства, отягчающие наказание
​
ч. 1 Отягчающими обстоятельствами признаются:​
​
а) совершение преступления в составе группы лиц;​
б) совершение преступления по мотивам политической, идеологической, расовой, национальной или религиозной ненависти, или вражды либо по мотивам ненависти или вражды в отношении какой-либо социальной группы;​
в) совершение преступления из мести за правомерные действия других лиц, а также с целью скрыть другое преступление или облегчить его совершение;​
г) совершение преступления в отношении лица или его близких в связи с осуществлением данным лицом служебной деятельности или выполнением общественного долга;​
д) совершение преступления с особой жестокостью, садизмом, издевательством, а также мучениями для потерпевшего;​
е) совершение преступления с использованием доверия, оказанного виновному в силу его служебного положения или договора;​
ё) совершение преступления с использованием форменной одежды или документов представителя власти;​
ж) совершение преступления в состоянии алкогольного или наркотического опьянения;​
з) совершение преступления с использованием психического давления на потерпевшего;​
и) рецидивизм;​
й) совершение преступления в отношении потерпевшего, находящегося в отношении виновного в заведомо беспомощном положении.​

Статья 5.5 Назначение более мягкого наказания, чем предусмотрено за данное преступление

ч. 1 При наличии исключительных обстоятельств, связанных с целями и мотивами преступления, ролью виновного, его поведением во время или после совершения преступления, и других обстоятельств, существенно уменьшающих степень общественной опасности преступления, а равно при активном содействии участника группового преступления раскрытию этого преступления наказание может быть назначено ниже низшего предела, предусмотренного статьей Особенной части настоящего Кодекса, или суд может назначить более мягкий вид наказания, чем предусмотрен этой статьей, или не применить дополнительный вид наказания, предусмотренный в качестве обязательного.​

Статья 5.6 Освобождение от уголовной ответственности в связи с назначением судебного штрафа и (или) исправительных работ. А также в связи с примирением сторон

ч. 1 Лицо, впервые совершившее преступление, предусмотренное статьями: предельный срок наказания, может быть освобождено судом от уголовной ответственности, если оно примирилось с потерпевшим и загладило причиненный потерпевшему вред.​
​
ч. 2 Лицо, впервые совершившее преступление может быть освобождено судом от уголовной ответственности с назначением судебного штрафа от 10.000$ и (или) исправительных работ за любые нарушения настоящего кодекса.​

Статья 5.7 Освобождение от уголовной ответственности в связи с истечением сроков давности

ч. 1 Лицо освобождается от уголовной ответственности, если со дня совершения преступления прошло 15 лет (( 15 дней ))​
​
ч. 2 К лицам, находящимся в Федеральном розыске как по решению суда, так и по ордеру Офиса Генерального Прокурора, сроки давности не применяются.​
​
ч. 3 Сотрудники LSPD/LSCSD/FIB/USSS могут установить уровень боло-розыска в диапазоне от ★-★★★★★ за нарушение Уголовного Кодекса.​
​
ч. 4 По решению суда/ордеру Офиса Генерального Прокурора гражданину может быть объявлен уровень боло-розыска в размере ★-★★★★★ за нарушение Уголовного Кодекса.​
​
ч. 5 Сроки давности исчисляются со дня совершения преступления и до момента вступления приговора/решения об аресте в законную силу. В случае совершения лицом нового преступления сроки давности по каждому преступлению исчисляются самостоятельно.​

Статья 5.8 Судимость
​
ч. 1 При аресте по статьям помеченными ★★★★ и более, в протоколе ареста ставится отметка о судимости.​
​
ч. 2 Погашение или снятие судимости аннулирует все правовые последствия, предусмотренные настоящим Кодексом, связанные с судимостью.​
​
ч. 3 При назначении в соответствии с частью 4, статьи 5 настоящего кодекса, меры наказания в виде уголовного штрафа за совершенное преступление, запрета к работе на государственной службе (судимости) не возникает.​

Статья 5.9 Лицо, добровольно сдавшее предметы, указанные в статьях 12.8, 12.8.1, 13.1, 13.2 настоящего Кодекса, освобождается от уголовной ответственности по соответствующей статье. Не может признаваться добровольной сдачей предметов их изъятие при задержании лица, а также при производстве любых оперативных и/или следственных действий.

Статья 5.10 Лицо, заключенное под стражу, может быть освобождено под залог по статьям уголовного кодекса, не влекущим судимость. Залог устанавливается пропорционально количеству лет, на которые был заключен гражданин, в соотношении 1 к $25.000.

Особенная часть

Раздел V. Преступление против личности

Глава VI. Преступление против жизни и здоровья. При наличии смешанной юрисдикции (региональная/федеральная) федеральные органы назначают наказание по федеральной.​


Статья 6.1 [Федеральная/Региональная] Нанесение особо тяжких телесных повреждений,

ч. 1 ★★★ Умышленное нанесение побоев или совершение иных насильственных действий, причинивших физическую боль либо телесные повреждения легкой или средней тяжести​
Наказание: 3 года лишения свободы или уголовный штраф в размере от 15.000$ до 90.000$.​
​
ч. 2 ★★★★ Умышленное нанесение особо тяжких телесных повреждений,​
Наказание: 4 года лишения свободы.​
​
ч. 3 ★★★ Нанесение особо тяжких телесных повреждений по неосторожности/в состоянии аффекта,​
Наказание: 3 года лишения свободы или уголовный штраф в размере от 20.000$ до 40.000$.​

Статья 6.2 [Федеральная/Региональная] Причинение смерти другому человеку,

ч. 1 ★★★★ Убийство, то есть умышленное причинение смерти другому человеку​
Наказание: 4 года лишения свободы.​
​
ч. 2 ★★★ Причинение смерти другому человеку по неосторожности/в состоянии аффекта​
Наказание: 3 года лишения свободы.​

Статья 6.3 ★★★★★ [Федеральная/Региональная] Тяжкое убийство, то есть убийство двух или более лиц, лица или его близких в связи с осуществлением данным лицом служебной деятельности; совершенное с особой жестокостью; совершенное общеопасным способом; совершенное группой лиц; из корыстных побуждений или по найму.
Наказание: 5 лет лишения свободы.

Статья 6.4 Утратила силу

Статья 6.5 Утратила силу.

Статья 6.6 ★★★ [Федеральная/Региональная] Угроза убийством или причинением тяжкого вреда здоровью, если имелись основания опасаться осуществления этой угрозы,
Наказание: 3 года лишения свободы, либо уголовный штраф в размере от $30.000 до $50.000.

Статья 6.7 ★★★ [Федеральная/Региональная] Воспрепятствование в какой бы то ни было форме законной деятельности медицинского работника по оказанию медицинской помощи,
Наказание: 3 года лишения свободы, либо уголовный штраф в размере от $5.000 до $20.000.


Глава VII. Преступление против свободы, чести и достоинства личности​


Статья 7.1 ★★★★★ [Федеральная] Похищение человека

ч. 1 Похищение человека, то есть его незаконный захват, перемещение и последующее удержание, в том числе совершенный в целях понуждения государства, организации или гражданина совершить какое-либо действие или воздержаться от совершения какого-либо действия как условия освобождения заложника,​
Наказание: 5 лет лишения свободы.​

Статья 7.1.1 ★★★★[Федеральная] Незаконное лишение свободы
​
ч. 1. Незаконное лишение человека свободы, не связанное с его похищением, ​
Наказание: 4 года лишения свободы.​

Статья 7.2 ★★★★ [Федеральная/Региональная] Использование рабского труда человека, в отношении которого осуществляются полномочия, присущие праву собственности, в случае, если лицо по не зависящим от него причинам не может отказаться от выполнения работ
Наказание: 4 года лишения свободы.

Статья 7.3 ★★★★ [Федеральная/Региональная] Любые сделки связанные с куплей-продажей человека, совершенные в целях его эксплуатации, вербовки, получения выгоды
Наказание: 4 года лишения свободы.

Статья 7.4 [Федеральная/Региональная] Клевета

ч. 1 ★★ / ★★★ Клевета, то есть распространение заведомо ложных сведений, порочащих честь и достоинство другого лица или подрывающих его репутацию,

Наказание: от 2 до 3 лет лишения свободы либо уголовный штраф от $40.000 до $50.000.

ч. 2 ★★ / ★★★ Клевета, содержащаяся в публичном выступлении, публично демонстрирующемся произведении, средствах массовой информации либо совершенная публично с использованием информационно-телекоммуникационных сетей, включая сеть "Интернет", либо в отношении нескольких лиц, в том числе индивидуально не определенных,

Наказание: от 2 до 3 лет лишения свободы либо уголовный штраф от $50.000 до $60.000.

ч. 3 ★★ / ★★★ Клевета, совершенная с использованием своего служебного положения,

Статья 12.12 ★★★★★ [Федеральная] Организация преступного сообщества (преступной организации) или участие в нем (ней),

​
ч. 1 Создание преступного сообщества (преступной организации) в целях совершения одного или нескольких преступлений либо руководство преступным сообществом (преступной организацией) или входящими в него (нее) структурными подразделениями, а равно координация действий организованных групп, создание устойчивых связей между ними, разработка планов и создание условий для совершения преступлений организованными группами, раздел сфер преступного влияния и (или) преступных доходов между такими группами.​
​
ч. 2 Участие в собрании организаторов, руководителей (лидеров) или иных представителей преступных сообществ (преступных организаций) и (или) организованных групп в целях совершения хотя бы одного из преступлений, предусмотренных частью первой настоящей статьи​
​
ч. 3 Участие в преступном сообществе (преступной организации)​
​
ч. 4 Деяния, предусмотренные частями первой, второй или третей настоящей статьи, совершенные лицом с использованием своего служебного положения​
​
ч. 5 Деяния, предусмотренные частями первой или второй настоящей статьи, совершенные лицом, занимающим высшее положение в преступной иерархии.​

Примечание 1. Учредители, участники, руководители, члены органов управления и работники организации, зарегистрированной в качестве юридического лица, и (или) руководители, работники ее структурного подразделения не подлежат уголовной ответственности по настоящей статье только в силу организационно-штатной структуры организации и (или) ее структурного подразделения и совершения какого-либо преступления в связи с осуществлением ими полномочий по управлению организацией либо в связи с осуществлением организацией предпринимательской или иной экономической деятельности, за исключением случая, когда эти организация и (или) ее структурное подразделение были заведомо созданы для совершения одного или нескольких тяжких или особо тяжких преступлений.​
​
Примечание 2. Лицо, совершившее хотя бы одно из преступлений, предусмотренных настоящей статьей, добровольно прекратившее участие в преступном сообществе (преступной организации) или входящем в него (нее) структурном подразделении либо сообщившее о готовящемся собрании организаторов, руководителей (лидеров) или иных представителей преступных сообществ (преступных организаций) и (или) организованных групп и активно способствовавшее раскрытию или пресечению деятельности преступного сообщества (преступной организации) или входящего в него (нее) структурного подразделения и (или) раскрытию и (или) пресечению преступлений, совершенных преступным сообществом (преступной организацией) или входящим в него (нее) структурным подразделением, освобождается от уголовной ответственности, если в его действиях не содержится иного состава преступления.​

КОММЕНТАРИИ К УГОЛОВНОМУ КОДЕКСУ ШТАТА San-Andreas


Комментарий I. Комментарий к статье 12.7 настоящего Кодекса: Приложение №1 к Уголовному Кодексу штата San-Andreas "О закрытых, охраняемых и особо охраняемых территориях"
Процессуальный кодекс штата San-Andreas

Раздел I. Основные положения

Глава I. Принципы Процессуального кодекса​

Статья 1. Цели Процессуального кодекса

ч. 1. Защита прав и законных интересов лиц и организаций, потерпевших от правонарушений.

ч. 2. Защита личности от незаконного и необоснованного обвинения, осуждения, ограничения ее прав и свобод.
​
Статья 2. Законность при производстве по уголовным, административным, гражданским и иным делам

ч. 1. Суд, прокурор, сотрудники правоохранительных органов, а также другие лица, наделенные определенными правами и обязанностями, предусмотренными настоящим Кодексом, не вправе применять закон, противоречащий настоящему Кодексу.

ч. 2. Суд, прокурор, сотрудники правоохранительных органов, а также другие лица, наделенные определенными правами и обязанностями, предусмотренными настоящим Кодексом, установив в ходе производства по делу несоответствие закона или иного нормативного правового акта настоящему Кодексу, принимают решение в соответствии с настоящим Кодексом.

ч. 3. Определения суда, постановления судьи, следователя, прокурора должны быть законными, обоснованными и мотивированными.

ч. 4. Суд, прокурор, следователь обязаны мотивировать свои доводы. Так официальные ответы об отказе в принятии жалоб, заявлений, ходатайств, обращений должны содержать причины отказа. Официальные ответы уведомительного характера о ходе производства также должны содержать мотивированную часть о дальнейшем ходе дела.
​
Статья 3. Уважение чести и достоинства личности

ч. 1. Запрещаются осуществление действий и принятие решений, унижающих честь человека, а также обращение, унижающее его человеческое достоинство либо создающее опасность для его жизни и здоровья.

ч. 2. Никто не может подвергаться насилию, пыткам, другому жестокому или унижающему человеческое достоинство обращению.

Статья 4. Неприкосновенность жилища

ч. 1. Осмотр жилища производится только с согласия проживающих в нем лиц или на основании судебного акта.

ч. 2. Обыск жилища производится также при наличии судебного решения, судебного ордера, ордера Генерального Прокурора и его Заместителей. В исключительных случаях, когда обыск жилища не терпит отлагательства, указанные следственные действия могут быть произведены на основании решения сотрудника правоохранительных органов без ордера Генерального Прокурора, решения суда или судебного ордера. В этом случае сотрудники правоохранительных органов не позднее 1 часа с момента начала производства следственного действия уведомляет прокурора о производстве следственного действия.

ч. 3. Выдача ордеров на обыск нежилого помещения, является исключительной компетенцией суда, генерального прокурора, заместителя генерального прокурора. Обыск нежилого помещения и находящегося в нем имущества может быть произведен на основании ордера.

Статья 5. Тайна переписки, телефонных и иных переговоров, почтовых, телеграфных и иных сообщений

ч. 1. Ограничение права гражданина на тайну переписки, телефонных и иных переговоров, почтовых, телеграфных и иных сообщений допускается только на основании судебного акта.

Статья 6. Презумпция невиновности

ч. 1. Обвиняемый считается невиновным, пока его виновность в совершении правонарушения не будет доказана в предусмотренном настоящим Кодексом.

ч. 2. Подозреваемый или обвиняемый не обязан доказывать свою невиновность. Бремя доказывания обвинения и опровержения доводов, приводимых в защиту подозреваемого или обвиняемого, лежит на стороне обвинения.

ч. 3. Все сомнения в виновности обвиняемого, которые не могут быть устранены в порядке, установленном настоящим Кодексом, толкуются в пользу обвиняемого.

ч. 4. Обвинительный приговор не может быть основан на предположениях.

Примечание: автоматически выданная запись в боло-розыске в полном объеме доказывает вину разыскиваемого. В данном случае обвиняемому необходимо будет доказать свою невиновность.

Статья 7. Свобода оценки доказательств

ч. 1. Судья, присяжные заседатели, прокурор, а также государственные служащие оценивают доказательства по своему внутреннему убеждению, основанному на совокупности имеющихся в деле доказательств, руководствуясь при этом законом и совестью.

ч. 2. Никакие доказательства не имеют заранее установленной силы.

Исключение: автоматически выданная запись в боло-розыске.

Статья 8. Охрана прав и свобод человека и гражданина

ч. 1. Суд, прокурор, государственные служащие обязаны разъяснять подозреваемому, обвиняемому, потерпевшему, а также другим участникам расследования или судопроизводства, обязанности и ответственность и обеспечивать возможность осуществления этих прав.

ч. 2. При наличии достаточных данных о том, что потерпевшему, свидетелю или иным участникам расследования или судопроизводства, а также их близким родственникам угрожают убийством, применением насилия, правоохранительные органы принимают в пределах своей компетенции в отношении указанных лиц все меры безопасности которые возможно.

ч. 3. Суд, прокурор, государственные служащие обязаны немедленно освободить всякого незаконно задержанного, или лишенного свободы человека.

ч. 4. Лицо, в отношении которого в качестве меры пресечения избрано заключение под стражу, а также лицо, которое задержано по подозрению в совершении правонарушения, должно содержаться в условиях, исключающих угрозу его жизни и здоровью.

ч. 5. Органы государственной власти, должностные лица обязаны обеспечить каждому возможность ознакомления с документами и материалами, непосредственно затрагивающими его права и свободы, если иное не предусмотрено законом

Статья 9. Право на обжалование процессуальных действий и решений

ч. 1. Действия (бездействие) и решения суда, прокурора могут быть обжалованы в порядке, установленном законодательством.

ч. 2. Каждый осужденный имеет право на пересмотр приговора вышестоящим судом.

ч. 3. Гражданин вправе обжаловать действия государственного служащего подав жалобу на сотрудника руководителю соответствующего ведомства. Руководитель вправе взыскать дисциплинарную, административную и уголовную ответственность со своего сотрудника и отменить решения вынесенные таким сотрудником.

ч. 4. Гражданин вправе обратиться с жалобой на государственного служащего в Офис Генерального прокурора, после чего инициируется прокурорская проверка в отношении сотрудника.

ч. 5. Гражданам дается 72 часа с момента задержания или вынесения наказания для обжалования действий государственного служащего, после чего решения вынесенные сотрудником правоохранительных органов вступают в законную силу.


Статья 10. Неприкосновенность личности.​
​
ч. 1. Никто не может быть задержан по подозрению в совершении правонарушения, арестован или заключен под стражу при отсутствии на то законных оснований, предусмотренных настоящим Кодексом.
​
Раздел II. Доказательства и доказывание​
​
Глава II. Доказательства​

Статья 11. Доказательства​
​
ч. 1. Доказательствами по делу являются любые сведения, на основе которых суд, прокурор в порядке, определенном настоящим Кодексом, устанавливает наличие или отсутствие обстоятельств, подлежащих доказыванию при производстве по делу, а также иных обстоятельств, имеющих значение для дела.

ч. 2 В качестве доказательств допускаются:​
​
а) показания подозреваемого, обвиняемого;
б) показания потерпевшего, свидетеля;
в) заключение и показания эксперта или специалиста;
г) вещественные доказательства;
д) протоколы следственных и судебных действий;
е) иные документы;
ж) автоматически выданная запись в боло-розыске.

Статья 12. Недопустимые доказательства​
​
ч. 1. Доказательства, полученные с нарушением требований настоящего Кодекса, являются недопустимыми. Недопустимые доказательства не имеют юридической силы и не могут быть положены в основу обвинения, а также использоваться для доказывания любого из обстоятельств.​
​
ч. 2. К недопустимым доказательствам относятся:​
​
а) любая информация, полученная от задержанного в ходе допроса до того, как ему были зачитаны его права, даже если есть звуко или видеозапись где обвиняемый дает показания против себя.
б) показания потерпевшего, свидетеля, основанные на догадке, предположении, слухе, а также показания свидетеля, который не может указать источник своей осведомленности;
в) улики добытые незаконным путем, когда были нарушены положения действующих нормативно-правовых актов (изъятие орудия без ордера на обыск личного транспорта, изъятие незаконных вещей у лица с неприкосновенностью без судебного решения или ордера Генерального Прокурора о снятии неприкосновенности и т.д.)

Статья 13. Доказывание​
​
ч. 1. Доказывание состоит в собирании, проверке и оценке доказательств в целях установления всех обстоятельств по делу.

Статья 13.1 Обстоятельства, подлежащие доказыванию​
​
ч. 1. В рамках расследования подлежат доказыванию:​
​
а) событие правонарушения (время, место, способ и другие обстоятельства совершения правонарушения);
б) виновность лица в совершении правонарушения, форма его вины и мотивы;
в) характер и размер вреда, причиненного правонарушением;
г) обстоятельства, исключающие противоправность и наказуемость деяния;
д) обстоятельства, смягчающие и отягчающие наказание;
е) обстоятельства, которые могут повлечь за собой освобождение от ответственности и наказания;​
​
ч. 2 Подлежат выявлению также обстоятельства, способствовавшие совершению правонарушения.

Статья 14. Правила оценки доказательств​
​
ч. 1. Каждое доказательство подлежит оценке с точки зрения относимости, допустимости, достоверности, а все собранные доказательства в совокупности - достаточности для разрешения дела.
​
Раздел III. Меры процессуального принуждения

Глава III. Процесс задержания​

Статья 15. Задержание​
​
ч. 1. Задержание - это мера кратковременного (на срок до 1 часа) лишения человека права на свободу, осуществляемая сотрудниками правоохранительных органов, сотрудниками специальных подразделений Национальной Гвардии, а также сотрудниками Weazel News в случаях, предусмотренных законом.
Примечание к ст. 15: Ограничение свободы сотрудниками Weazel News не может превышать 20 минут до момента передачи сотрудникам силовых структур.

Статья 16. Задержание подозреваемого​
​
ч. 1. Лицо может быть задержано по подозрению в совершении правонарушения, за которое может быть назначено наказание в виде лишения свободы или иных санкций, предусмотренных законом.​
​
ч. 2. Лицо может быть задержано при наличии хотя бы одного из следующих оснований:​
​
а) Когда лицо застигнуто в момент совершения правонарушения или непосредственно после его совершения, государственным служащим;
б) Когда на подозреваемом или его одежде, при нем или в его жилище будут обнаружены явные следы правонарушения;
в) Когда есть фото или видео фиксация совершенного правонарушения этим лицом;
г) Если имеется ордер, изданный в установленном законом порядке, указывающий на необходимость задержания этого лица;
д) В соответствии с требованием, отданным Губернатором, генеральным прокурором, его заместителями или прокурором-референтом;
е) Когда имеется ориентировка на транспортное средство или данное лицо;
ж) Если лицо находится в боло-розыске.​
​
ч. 3. Если лицо находится в маске, капюшоне, шлеме либо ином предмете, скрывающем лицо, то уполномоченное должностное лицо имеет право потребовать снятия такого предмета с целью визуального установления личности.
​
Отказ выполнить данное требование или отказ предъявить документы, удостоверяющие личность, влечёт за собой необходимость инициирования процедуры установления личности, порядок которой описан ниже:\​
а) Надеть наручники на задержанного​
б) Разъяснить задержанному основания для установления личности​
в) Предпринять все законные меры для оперативного установления личности задержанного, включая обращение к базам данных, а так же досмотреть документы задержанного.​
г) Сверить лицо задержанного с фотороботом.​
д) Провести личный обыск задержанного, в случае обнаружения нелегальных предметов - провести процесс задержания регламентированный статьей 17 настоящего Кодекса.​

Статья 17. Порядок задержания правомочным лицом.​
​
ч. 1. Задержание лица при ведении следствия производится в следующей последовательности: ​
​
а) Надеть наручники на подозреваемого;
б) Предъявить свой документ удостоверяющий служебное положение, нашивку, жетон, служебный бейджик или иной идентификационный знак, подтверждающий принадлежность к органам государственной власти;​
​
в) На усмотрение сотрудника, проводящего задержание, провести первичный обыск;
г) Разъяснить квалификацию правонарушения, инкриминируемой задержанному и зачитать правило Миранды для ознакомления задержанного со своими правами согласно ч. 3 ст. 17, ст. 22 настоящего Кодекса;
д) Провести идентификацию личности задержанного, проверку на предмет наличия его данных в базе федерального розыска и проверку на принадлежность задержанного к государственным органам;
е) Доставить подозреваемого в полицейский участок, департамент шерифа, штаб-квартиру FIB или иное место следствия при необходимости (для проведения допроса, экспертизы и пр.);
ж) Реализовать права задержанного. В случае, если задержанный является государственным служащим, сотрудником Weazel News, уведомить уполномоченные органы о задержании согласно ст. 19 настоящего Кодекса; При необходимости посмотреть видеофиксацию задержанного, опровергающую законность выданного в автоматическом режиме боло-розыска, согласно обязанностям и нормам настоящего Кодекса;
з) Произвести следственные действия (допрос, экспертиза и т.д.), если есть необходимость;
и) Доставить задержанного в полицейский участок, департамент шерифа, штаб-квартиру FIB;

ч. 2. Задержание лица на основании ордеров производится в следующей последовательности:​
​
а) Надеть наручники на подозреваемого;
б) Предъявить свой документ удостоверяющий служебное положение, нашивку, жетон, служебный бейджик или иной идентификационный знак, подтверждающий принадлежность к органам государственной власти;
в) На усмотрение сотрудника, проводящего задержание, провести первичный обыск;
г) Разъяснить основания задержания и зачитать правило Миранды для ознакомления задержанного со своими правами согласно ч. 3 ст. 17, ст. 22 настоящего Кодекса;
д) Разъяснить задержанному номер и название документа, являющегося основанием для задержания;
е) Доставить подозреваемого в полицейский участок, департамент шерифа или штаб-квартиру FIB;
ж) Провести идентификацию личности задержанного и проверку на принадлежность задержанного к государственным органам;
з) В случае, если задержанный является государственным служащим, сотрудником Weazel News или частным адвокатом с действительной лицензией частного адвоката, согласно ст. 19 вызвать его руководство, которое обязуется по первому требованию сотрудника, производящего задержание, прекратить с ним трудовые отношения.​
​
ч. 3. Правило Миранды: "Вы имеете право хранить молчание. Всё, что вы скажете, может и будет использовано против Вас в суде. Вы имеете право на один телефонный звонок. Также Вы имеете право на адвоката. Если вам необходим адвокат, он будет для Вас запрошен. Вы понимаете свои права?"​
​
ч. 4. В случае если задержанный требует государственного адвоката, сотрудник обязан вызвать такового с помощью звонка на горячую линию Правительства. В случае принятия вызова адвокатом, процессуальный час замораживается до приезда адвоката. Если адвокат не приехал в течение 10 минут, то процедура задержания продолжается и право на адвоката считается реализованным.
ч. 4.1. В случае, если задержанный требует самостоятельно вызвать частного адвоката, сотрудник обязан предоставить ему возможность самостоятельно воспользоваться телефоном для вызова частного адвоката через приложение "Адвокаты" или раздел "Контакты".
Примечание 1: В случае с частным адвокатом, процессуальный час замораживается до приезда адвоката. Если частный адвокат не приехал в течение 10 минут с момента окончания телефонного звонка, то процедура задержания продолжается и право на частного адвоката считается реализованным.
Примечание 2: Если в течение 3 минут с момента обращения, осуществленного путем телефонного звонка, заявки через приложение "Адвокаты" либо вызова на горячую линию Правительства, не последовало ответа от адвоката, процедура задержания продолжается, а право на адвоката считается реализованным. Данное правило распространяется как в отношении вызова государственных, так и частных адвокатов.​
​
ч. 5. Сотрудник обязан предоставить телефонный звонок длительностью не более 3-х минут, при этом сам сотрудник либо его напарник, обязан находится с человеком в непосредственной близости, дабы проконтролировать ход телефонного разговора и не допустить нежелательных последствий.​
​
Примечание: Первичный обыск производится с целью идентификации колющих, режущих орудий, огнестрельного оружия, наркотических веществ, взрывчатых элементов. Первичный обыск позволяет изымать огнестрельное оружие, колющие, режущие орудия, наркотические вещества, взрывчатые элементы, если это может представлять опасность для сотрудников или окружающих. При необходимости разрешается смотреть документы задержанного.​
​
Примечание: Телефонный звонок, предоставляемый задержанному в соответствии с положениями части 5 настоящей статьи, предназначен исключительно для связи с его частным адвокатом, с которым задержанный заключил действительный устный договор в приложении на оказание юридических услуг. Предоставление телефонного звонка для иных целей или звонок лицам, не обладающим статусом адвоката, не допускается. В случае если задержанный заявляет о необходимости связаться с адвокатом, сотрудник обязан дать задержанному возможность реализовать данное право, путем предоставления возможности воспользоваться телефоном для вызова Адвоката через приложение "Адвокаты". Запрос задержанного на использование телефонного звонка для иных целей, неописанных в данном примечании, является основанием для отказа в предоставлении телефонного звонка.​
​
Примечание: Правило Миранды зачитывается задержанному дважды, притом только в случае, если в первый раз он не понял своих прав. После зачитывания правила Миранды во второй раз задержанный должен быть уведомлен о том, что правило зачитываться более не будет.​
​
Примечание: В пунктах а) и б) ч. 1 и ч. 2 настоящей статьи, на усмотрение сотрудника, проводящего задержание, разрешено изменение последовательности.​
​
Примечание: В пунктах в) и г) ч. 1 и пунктах в), г) и д) ч. 2 настоящей статьи, на усмотрение сотрудника, проводящего задержание, разрешено изменение последовательности.
Статья 17.1. Порядок действий сотрудников Weazel News при задержании:
1. Ограничить свободу (наручники);
2. Вызвать сотрудника силовой структуры;
3. Передать задержанного и видеофиксацию нарушения.

Статья 17.2. Передача задержанного сотрудниками Weazel News. При вызове по факту задержания на территории WN, прибывшие сотрудники силовых структур обязаны принять задержанного, изучить доказательства и продолжить процедуру задержания согласно ст .17 ПК

Статья 18. Субъекты задержания
​
ч. 1. В процессе задержания участвуют:​
​
а) Сотрудник либо сотрудники правоохранительных органов при исполнении, которые осуществляют задержание и/или проявляют содействие задержанию при условии гласного волеизъявления инициатора задержания, подтверждающего согласие на участие каждого такого лица в качестве субъекта задержания;​
б) Задержанный, в отношении которого проводится задержание;​
в) Один прокурор - согласно принятому вызову или по собственной инициативе;​
г) Один адвокат - в случае необходимости оказания юридической помощи. Адвокат имеет право, на правах субъекта задержания, задать задержанному краткий вопрос о наличии такой необходимости;​
д) Руководство задержанного сотрудника государственных органов в соответствии со ст. 19 ч 1 настоящего Кодекса;​
е) До двух сотрудников USSS или FIB , если один из субъектов задержания обладает статусом неприкосновенности;​
ж) Один сотрудник IB для проведения надзора;​
з) Сотрудники следующих отделов: Detective Bureau (Los Santos Police Department, Los Santos County Sheriff Department) и Criminal Investigation Department (Federal Investigation Bureau), с согласия упомянутых в пункте а) лиц, имеют право провести допрос задержанному. Указанные сотрудники могут, на правах субъекта задержания, запросить информацию о статьях, по которым было задержано лицо, и получить разрешение на проведение допроса-передачи задержания от упомянутых в пункте а лиц. В случае отказа сотрудники обязаны покинуть место проведения процессуальных действий.​
и) Один представитель руководства сотрудника либо сотрудников правоохранительных органов при исполнении, которые осуществляют задержание. В положении настоящего пункта в качестве представителя руководства понимается руководитель организации, в которой трудоустроен сотрудник инициирующий процесс задержания, а так же его заместители.​
к) До трех юристов (стажеров) Коллегии адвокатов, находящихся в сопровождении государственного адвоката, исключительно в целях наблюдения за ходом процессуальных действий и прохождения профессиональной практики. ​
​
ч. 2. Государственные служащие, в лице сотрудника либо сотрудников, проводящих процесс задержания, прокурора, адвоката и руководства, вправе потребовать от граждан и должностных лиц покинуть и/или отойти от места проведения задержания в случаях, предусмотренных настоящим кодексом. Лицо, которому выдвинуто такое требование, обязано исполнить его.

Перечень ситуаций при которых сотрудник, проводящий задержание, может выдвинуть данное требование:
- Когда действия граждан или сотрудников государственных структур, не участвующих в задержании, могут воспрепятствовать ходу проведения процессуальных действий или отвлекать субъектов задержания;
- Когда в ходе нахождения граждан или сотрудников государственных структур может стать известна информация, составляющая государственную или иную охраняемую законом тайну;
- Когда разбирательства по задержанию проводятся в маленьком узком закрытом помещении.

Исключение: норма неприменима к сотрудникам Офиса Генерального Прокурора, осуществляющих надзорную деятельность.
Примечание: присутствие без совершения каких-либо активных действий не признается деянием, препятствующим производству расследования и задержанию.

ч. 3. В случае проведения государственным служащим задержания в закрытом помещении (комнате), именно то лицо которое изначально начало задержание в вышеуказанной комнате/помещении - имеет право распоряжаться ей до конца своего процесса задержания.

ч. 4. Юристы (стажеры), указанные в п. «к» ч. 1 настоящей статьи, не имеют права активно вмешиваться в процессуальные действия, подавать ходатайства или перебивать участников процесса. В случае нарушения порядка или создания помех следствию, сотрудник, проводящий задержание, вправе потребовать от юристов покинуть место проведения задержания.​
​
Примечание: к участию в процессе задержания допускают лишь один адвокат, а также при необходимости лишь один прокурор и один представитель руководства задержанного.​
​
Примечание: не допускается замена субъектов задержания, указанных в пункте (В) настоящей статьи, за исключением случаев, когда ввиду особых обстоятельств не является возможным продолжение их деятельности.​
​
Статья 19. Уведомление о задержании
​
ч. 1. В случае если в процессе задержания установлено, что задержанный является государственным служащим, сотрудником Weazel News или частным адвокатом с действительной лицензией частного адвоката, сотрудник, проводивший задержание, обязан вызвать руководство задержанного (в случае с частным адвокатом Главу Коллегии Адвокатов или его заместителей) и сотрудника Офиса Генерального прокурора Штата San-Andreas. На время ожидания ответа указанных лиц, время задержания замораживается, но не более, чем на 15 минут. В случае ответа прокурора, время задержания замораживается до его приезда.​
​
Примечание 1: в случае если сотрудник Офиса Генерального прокурора не ответил на вызов в течение 15 минут с момента его направления, равно как и в случае невозможности прибытия, задержанный государственный служащий или сотрудником Weazel News, или частный адвокат с действительной лицензией частного адвоката, подлежит освобождению, а сотрудники, проводящие задержание обязаны обратиться в Офис Генерального прокурора в отношении задержанного лица в течении часа. ​
​
Примечание 2: в случае невозможности прибытия руководителя задержанного, прокурор или лицо, производящее задержание, обязано в кратчайшее сроки уведомить руководство задержанного (в случае с частным адвокатом Главу Коллегии Адвокатов или его заместителей) о задержании подчинённого . В случае подтверждения вины подчинённого, руководство по первому требованию обязуется прекратить с ним трудовые отношения. ​
​
Примечание 3: признание факта принадлежности задержанного к государственным органам может быть только путем идентификация его отношения к государственным органам через наличие бейджика, удостоверения, иного идентификационного знака, подтверждающего принадлежность к государственным органам, или подтверждения его личности через базу данных штата San-Andreas. ​
​
Примечание 4: В случае, если у сотрудника, который проводит задержание нет доступа к рации департамента, он обязан запросить начальство, используя служебную рацию, и дождаться подтверждения запроса от сотрудников, имеющих доступ к рации департамента. На время ожидания ответа от сотрудников время ожидания замораживается, но не более, чем на 15 минут, включая время на ответ от сотрудника Офиса Генерального Прокурора.​
​
ч. 2. По приезде руководства задержанного и сотрудника Офиса Генерального прокурора Штата San-Andreas, сотрудником, осуществившим задержание, должны быть представлены доказательства совершения правонарушения задержанным сотруднику Офиса Генерального прокурора и руководству задержанного. Сотрудник Офиса Генерального прокурора дает оценку правомерности задержания, устанавливает наличие противоправного деяния в действии (или противоправного бездействия) задержанного, а также избирает меру наказания по отношению к действиям задержанного. В случае, если сотрудник Офиса Генерального прокурора не признает наличия противоправного деяния в действии (или противоправного бездействии) задержанного или не согласен с решением сотрудника, осуществляющего задержание, задержанный сотрудник подлежит освобождению. Сотрудник, проводивший задержание, имеет право подать обращение в Офис Генерального прокурора.​
​
ч. 3. В случае, если сотрудник Офиса Генерального прокурора признает наличие преступного деяния в действии (или преступном бездействии) задержанного и если в качестве наказания определено лишение свободы, руководство задержанного обязано прекратить с задержанным трудовые отношения. В случае назначения наказания в виде штрафа, прекращение трудовых отношений с задержанным не является обязательным, и решение об увольнении остается на усмотрение работодателя или сотрудника ОГП.

Статья 20. Основания освобождения подозреваемого​
​
ч. 1. Подозреваемый подлежит освобождению по решению сотрудника проводившего задержание, допрос и(или) иного уполномоченного в соответствии с настоящим Кодексом лица, если:​
​
а) не подтвердилось подозрение в совершении правонарушения;
б) за нарушение не предусмотрено меры наказания в виде лишения свободы;
в) задержание было произведено с нарушением ч. 2 ст. 16 настоящего Кодекса;
г) прошло больше 1 часа с момента задержания и не была избрана мера наказания.
д) подозреваемый обладает статусом неприкосновенности.​
​
Исключение: пункту д) - за исключением случаев, когда незаконные действия несут непосредственную угрозу жизни и здоровья окружающим людям.​
​
ч. 2. Течение срока, указанного в п. "г" приостанавливается в случаях:

а) проведения допроса и экспертизы;
б) вызова и разбирательства с адвокатом;
в) вызова и разбирательства с Офисом Генерального прокурора и/или руководством задержанного в случае, если задержанный является сотрудником государственного органа, сотрудником Weazel News или частным адвокатом;
г) при обыске имущества задержанного;
д) при просмотре видеофиксации от задержанного, в случае если лицо было задержано на основании пункта 3 ч.2 ст. 16 настоящего кодекса. Течение срока на просмотр таковой записи приостанавливается максимум на 10 минут.
​
Статья 21. Порядок исполнения штрафных санкций.
​
ч. 1. В случае назначения административного или уголовного штрафа, лицо обязано произвести его оплату в порядке, установленном законодательством штата.​
​
ч. 2. В случае если у лица, в отношении которого вынесено решение о мере наказания в виде штрафа, отсутствует при себе достаточная сумма денежных средств, сотрудник, вынесший решение о мере наказания в виде штрафа, обязан:​
​
а) сопроводить гражданина к ближайшему банкомату или банковскому отделению для снятия наличных средств с личного счета для оплаты штрафа;
б) удостовериться, что гражданин произвел оплату штрафа и зафиксировать факт оплаты в установленном порядке.

Статья 22. Права задерживаемого​
​
ч. 1. У подозреваемого имеются следующие права:​
​
а) Подозреваемый имеет право на один телефонный звонок в присутствии сотрудника до начала процесса ареста, сотрудник обязан предоставить телефонный звонок задержанному по его запросу. Длительность звонка не должна превышать 3-х минут;
б) Подозреваемый имеет право на адвоката;
в) Подозреваемый имеет право сохранять молчание;
г) Подозреваемый имеет право возбуждать ходатайства, а также заявлять отводы;
д) Подозреваемый вправе требовать конфиденциальной встречи с адвокатом, длительность которой не превышает 10 минут

Статья 23. Обязанности государственного служащего выполняющего задержание

ч. 1. Государственный служащий, выполняющий задержание обязан:

а) Вести видеозапись задержания;
б) Разъяснить адвокату, прокурору причины задержания;
в) Разъяснить адвокату и, в случае, предусмотренном ст. 19 настоящего Кодекса, руководству причины задержания, а также по требованию - предоставить доказательства совершенного правоанарушения;
г) В случае задержания лица по автоматически созданной записи в боло-розыске, сотрудник обязан приобщить к делу доказательства задержанного, если последний заявляет о наличии материалов, которые, по его утверждению, подтверждают невиновность в совершении преступления, зафиксированного в базе.​
​
Исключение: В случаях, если видеофиксация хранится на удаленных серверах и в связи с этим нет возможности ее незамедлительного предоставления, процесс предоставления видеофиксации может занимать до 1 часа.
​

ГЛАВА IV. Меры административного принуждения​

Статья 24. Меры процессуального принуждения при административных правонарушениях

ч. 1. К мерам процессуального принуждения, применяемым в отношении лица и (или) его имущества при производстве по делу об административном правонарушении, относятся:​
​
а) доставление лица;
б) задержание;
в) изъятие вещей и документов;
г) помещение транспортного средства на специализированную стоянку (эвакуация);
д) административный арест;
е) иные меры, предусмотренные настоящим Кодексом и Административным кодексом штата San-Andreas;

ч. 2. Административный арест – это разновидность административного наказания, заключающаяся в содержании лица, совершившего административное правонарушение, которое предусматривает лишение свободы не более 20 суток (20 минут), в условиях изоляции от общества. Административному аресту подвергаются лица, совершившие правонарушения, предусмотренные Административным кодексом, если в качестве меры наказания избрано ограничение свободы.


Статья 25. Порядок взаимодействия с лицом при привлечении к административной ответственности

ч. 1. При взаимодействии с лицом, привлекаемым к административной ответственности, сотрудник правоохранительных органов обязан:​
​
а) Представиться;
б) Объяснить причину кратковременного ограничения свободы действий;
в) Потребовать любой документ, удостоверяющий личность, а также иные необходимые документы.
Примечание: За отказ предоставить документы или отсутствие реакции на их требование лицо подвергается процессу установки личности.
г) При необходимости доставить лицо до ближайшего банкомата;
д) Применить штрафные санкции и (или) иные меры, предусмотренные действующим законодательством.

ч. 2. Если в ходе следственных действий будет доказана вина задержанного, то сотрудником правоохранительных органов после задержания должен быть произведен арест лица в следующей последовательности:​
​
а) Совершить вторичный обыск;
б) Изъять все нелегальные предметы у гражданина, подвергнутого аресту;
в) Установить соответствующий уровень боло-розыска в соотношении 10 суток к 1 уровню;
г) Разъяснить задержанному причину ареста;
д) Поместить его в КПЗ на срок, установленный кодексом об административных правонарушениях.

ч. 3. Сотрудники правоохранительных органов, находящиеся под прикрытием (оперативное внедрение), после задержания подозреваемого обязаны передать его уполномоченным лицам.

ч. 4. Лицо, в отношении которого применяются меры процессуального принуждения, обязано подчиняться законным требованиям сотрудника. В случае оказания сопротивления допускается применение мер, предусмотренных настоящим Кодексом.​


Глава V. Процесс ареста​

Статья 26. Арест​
​
ч. 1. Арест – это разновидность уголовного наказания, при котором лицо лишается права на свободу на срок от 1 года. Аресту подвергаются лица, совершившие преступление, предусмотренное особенной частью Уголовного Кодекса - статьями региональной, федеральной, финансовой или военной юрисдикции.​
​
ч. 2. В случае, если гражданину вменяется несколько преступлений, наказание в виде лишения свободы избирается из наиболее тяжкой санкции. Полное или частичное сложение наказания возможно только на основании приговора суда.

Статья 27. Порядок ареста​
​
ч. 1. Порядок ареста проводится строго в следующем порядке:​
​
а) Совершить вторичный обыск;
б) Изъять все нелегальные предметы у гражданина, подвергнутого аресту;
в) Установить соответствующий уровень боло-розыска в соотношении 1 год к 1 уровню;
г) Разъяснить задержанному причину ареста;
д) Поместить его в КПЗ на срок, установленный уголовным кодексом ​
​
ч. 2. Сотрудники правоохранительных органов, находящиеся под прикрытием (оперативное внедрение), после задержания подозреваемого, обязаны передать его уполномоченным лицам.
​
Глава VI. Обыск
​
Статья 29. Личный обыск и личный досмотр​
​
ч. 1. Подозреваемый может быть подвергнут личному обыску только во время задержания и (или) ареста, либо в случае, если у уполномоченного лица имеется подозрение о наличии у гражданина запрещенных предметов, веществ, опасных для окружающих при нахождении на территории государственного органа.​
​
ч. 2. Граждане могут быть подвергнуты личному досмотру при пересечении границы (контрольно-пропускных пунктов) мест дислокации войск национальной гвардии.​
​
ч. 3. Граждане могут быть подвергнуты личному досмотру по требованию сотрудников Секретной Службы при посещении здания Капитолия и зала Суда г.Лос-Сантос, а также в случае нахождения в непосредственной близости к охраняемому сотрудниками Секретной Службы лицу.​
​
Примечание: Сотрудники Секретной Службы не вправе требовать у государственных служащих при исполнении ими должностных обязанностей, а также неприкосновенных лиц прохождения личного досмотра при посещении здания здания Капитолия и зала Суда г.Лос-Сантос.​
​
ч. 4. Подозреваемый может быть подвергнут личному обыску сотрудниками правоохранительных и военных органов в случае, если он находится в боло-розыске.​
​
ч. 5. Требования прохождения личного досмотра в иных случаях, чем предусмотрены настоящей статьёй, являются незаконными.

ч. 6. Вторичный обыск - это урегулированное уголовно-процессуальным правом, обеспеченное государственным принуждением действие, заключающееся в непосредственном обследовании тела обыскиваемого, в том числе находящейся на нем одежды и при нем — ручной поклажи в целях нахождения и изъятия предметов, имеющих значение для уголовного дела, а также свидетельств их принадлежности конкретному лицу. В процессе ареста при вторичном обыске должны быть изъяты все нелегальные предметы, нелегальные биоресурсы, найденные в ходе вторичного обыска у задержанного, а также колющие, режущие предметы, огнестрельное оружие, спец. средства, боеприпасы, независимо от законности хранения данных предметов.

Исключение: не допускается изъятие у задержанного дефибриллятора и эпинефрина без государственного серийного номера, если у задержанного на момент ареста имеется действующая лицензия парамедика.

ч. 7. Если служебная собака среагировала на гражданина, указав на возможное наличие при нём запрещённых веществ или предметов (в том числе посредством поведенческой реакции на запах), это является самостоятельным законным основанием для проведения личного обыска.

Статья 30. Обыск и осмотр транспортного средства​

​
ч. 1. Обыск транспортного средства может производится в следующих случаях:​
а) В случае выявления нарушения УК СА подозреваемым;​
​
ч. 2. Осмотр транспортного средства — это визуальное обследование автомобиля или перевозимого груза.​
​
ч. 2.1. Осмотр транспортного средства производится при наличии следующих оснований:​
​
а) когда имеется ориентировка, иная информация об использовании транспорта или груза в противоправных целях, в том числе, если в транспортном средстве находятся без разрешения предметы или вещи, изъятые из оборота или ограниченные в обороте, предметы правонарушения.​
​
ч. 2.2. Для реализации мер, указанных в ч. 2.1 настоящей статьи, сотрудники правоохранительных органов вправе осуществлять вскрытие ТС, в том числе проникновение в него, требовать предоставления беспрепятственного доступа к обследованию автомобиля и перевозимого груза.​
​
Глава VII. Иные меры процессуального принуждения​

Статья 31. Основания применения иных мер процессуального принуждения​
​
ч. 1. В целях обеспечения установленного настоящим Кодексом порядка судопроизводства, надлежащего исполнения приговора прокурор или суд вправе применить к подозреваемому или обвиняемому следующие меры процессуального принуждения:​
​
а) обязательство о явке;
б) привод;
в) временное отстранение от должности;​
​
ч. 2. В случаях, предусмотренных настоящим Кодексом, прокурор или суд вправе применить к потерпевшему, свидетелю, гражданскому истцу, гражданскому ответчику, эксперту, специалисту, переводчику и (или) понятому следующие меры процессуального принуждения:​
​
а) обязательство о явке;
б) привод;
в) денежное взыскание.
​
Раздел IV. Иные положения​
​
Глава VIII. Фото и видео фиксация​

Статья 32. Ведение фото- и видеофиксации при пресечении правонарушений и производстве процессуальных действий​
​
​
ч. 1. При пресечении правонарушений, а равно при производстве процессуальных действий по фактам таких правонарушений, уполномоченный государственный служащий и его напарник обязаны осуществлять непрерывную видеозапись действий участников, фактических обстоятельств происходящего и иных сведений, имеющих значение для производства по делу или любых других процессуальных действий.​

​
​
ч. 2. Видеозапись осуществляется техническими средствами, обеспечивающими возможность последующего воспроизведения изображения и звука, а также установления последовательности действий и лиц, участвующих в событии.​

​
