<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MAJESTIC · AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --neon-red: #cc0033;
            --dark-bg: #0a0a0a;
            --dark-card: #111111;
            --dark-border: #1a1a1a;
            --text-primary: #ffffff;
            --text-dim: #888888;
            --sidebar-width: 280px;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 4px;
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 2px;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark-card);
            border-right: 1px solid var(--dark-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            overflow: hidden;
            z-index: 10;
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .sidebar-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            transition: color 0.3s;
        }
        .sidebar-close:hover {
            color: var(--neon-red);
        }

        .sidebar-user {
            padding: 12px 18px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--neon-red);
        }

        .sidebar-user span {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user .logout-small {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.7rem;
            transition: color 0.3s;
        }
        .sidebar-user .logout-small:hover {
            color: var(--neon-red);
        }

        .conv-list-sidebar {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .conv-item-side {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            margin-bottom: 4px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .conv-item-side:hover {
            background: rgba(204, 0, 51, 0.05);
            border-color: var(--dark-border);
        }

        .conv-item-side.active {
            border-color: var(--neon-red);
            background: rgba(204, 0, 51, 0.08);
            color: var(--text-primary);
        }

        .conv-item-side .conv-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .conv-item-side .conv-del {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .conv-item-side .conv-del:hover {
            color: var(--neon-red);
            background: rgba(204, 0, 51, 0.1);
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--dark-border);
            flex-shrink: 0;
        }

        .btn-side-new {
            width: 100%;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-side-new:hover:not(:disabled) {
            background: var(--neon-red);
        }
        .btn-side-new:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--dark-bg);
            min-width: 0;
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--dark-border);
            background: var(--dark-card);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .menu-toggle {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 4px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .menu-toggle:hover {
            border-color: var(--neon-red);
        }

        .chat-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neon-red);
            flex: 1;
        }

        .chat-header .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .chat-header .user-badge img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--neon-red);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', sans-serif;
        }

        .message.user {
            background: var(--neon-red);
            color: var(--text-primary);
            align-self: flex-end;
        }

        .message.bot {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            align-self: flex-start;
            color: var(--text-dim);
        }

        .message .create-new-btn {
            margin-top: 12px;
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--text-primary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .message .create-new-btn:hover {
            background: var(--neon-red);
        }

        .input-area {
            padding: 12px 20px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            gap: 10px;
            background: var(--dark-card);
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-border);
            border-radius: 4px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            min-height: 48px;
        }

        .input-area input:focus {
            border-color: var(--neon-red);
        }
        .input-area input:disabled {
            opacity: 0.3;
        }

        .input-area button {
            background: transparent;
            border: 1px solid var(--neon-red);
            border-radius: 4px;
            padding: 0 24px;
            color: var(--text-primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 48px;
        }
        .input-area button:hover:not(:disabled) {
            background: var(--neon-red);
        }
        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .limit-bar {
            background: rgba(204, 0, 51, 0.05);
            padding: 6px 20px;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid var(--dark-border);
            color: var(--text-dim);
            flex-shrink: 0;
            font-family: 'Inter', sans-serif;
        }
        .limit-bar strong {
            color: var(--neon-red);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 5;
            display: none;
        }
        .overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 280px;
                z-index: 20;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar.closed {
                transform: translateX(-100%);
            }
            .overlay.show {
                display: block;
            }
            .chat-header h1 {
                font-size: 1rem;
            }
            .message {
                max-width: 92%;
                font-size: 0.85rem;
                padding: 10px 14px;
            }
            .input-area {
                padding: 10px 12px;
            }
            .input-area input {
                font-size: 0.85rem;
                padding: 10px 12px;
                min-height: 44px;
            }
            .input-area button {
                font-size: 0.6rem;
                padding: 0 16px;
                min-height: 44px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 240px;
            }
            .chat-header {
                padding: 10px 12px;
            }
            .chat-messages {
                padding: 12px;
            }
            .conv-item-side .conv-title {
                max-width: 120px;
            }
            .message {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📂 Диалоги</h2>
            <button class="sidebar-close" id="sidebarCloseBtn">✕</button>
        </div>

        <div class="sidebar-user" id="sideUserInfo" style="display:none;">
            <img id="sideAvatar" src="" alt="">
            <span id="sideUserName">User</span>
            <button class="logout-small" id="sideLogoutBtn">Выйти</button>
        </div>
        <div id="sideUnauth" style="padding:12px 18px; border-bottom:1px solid var(--dark-border);">
            <button class="btn btn-login" id="sideLoginBtn" style="width:100%; background:transparent; border:1px solid var(--neon-red); color:var(--text-primary); padding:10px; border-radius:4px; cursor:pointer; font-family: 'Inter', sans-serif; font-size:0.9rem; font-weight:600;">Войти через Discord</button>
        </div>

        <div class="conv-list-sidebar" id="convListSide"></div>

        <div class="sidebar-footer">
            <button class="btn-side-new" id="sideNewChatBtn" disabled>+ Новый диалог</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="main-chat">
        <div class="chat-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1>⚡ MAJESTIC · AI</h1>
            <div class="user-badge" id="headerUserInfo" style="display:none;">
                <img id="headerAvatar" src="" alt="">
                <span id="headerUserName"></span>
                <button class="btn btn-logout" id="headerLogoutBtn" style="border-color:var(--text-dim); margin-left:10px;">Выйти</button>
            </div>
            <button class="btn btn-login" id="headerLoginBtn" style="background:transparent; border:1px solid var(--neon-red); color:var(--text-primary); padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Inter',sans-serif; font-size:0.9rem; font-weight:600;">Войти через Discord</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">🔐 Авторизуйтесь через Discord, чтобы начать диалог.</div>
        </div>

        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Ваш вопрос..." disabled>
            <button id="sendBtn" disabled>Отправить</button>
        </div>

        <div class="limit-bar" id="limitBar">📨 0 / 100 сегодня</div>
    </div>

    <script>
        window.onbeforeunload = null;
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
        });
        window.onbeforeunload = function() {};

        const DISCORD_CLIENT_ID = '1516071810477592707';
        const GROQ_API_KEY = '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';
        const GROQ_URL = 'https://goss.ghostikks.workers.dev/v1/chat/completions';
        const MODEL = 'llama-3.3-70b-versatile';
        const DAILY_LIMIT = 100;
        const MAX_MESSAGES_PER_CONV = 15;

        const VIP_LIMITS = {
            '1516071810477592707': 999999,
        };

        const SYSTEM_PROMPT = `Ты — юридический ассистент. Ты ОТВЕЧАЕШЬ ТОЛЬКО на вопросы, связанные с законами, правами, обязанностями, судебными процессами, адвокатурой и юридическими процедурами.

        Ты НЕ должен отвечать на:
        - Любые вопросы, не связанные с юриспруденцией (даже если они без мата)
        - Вопросы о погоде, еде, цветах, технике, играх, музыке, фильмах, спорте, отношениях, здоровье (кроме юридических аспектов)
        - Бессмысленные вопросы типа "Огурец зеленый?", "Солнце белое?", "Ты ебанат?" и т.п.

        Если вопрос не связан с законами или юриспруденцией — ВСЕГДА отвечай строго: "Извините, я помогаю только с юридическими вопросами. Пожалуйста, спросите о законах, правах или адвокатуре."

        Законы SA, на которые ты опираешься:
        • УК SA Статья 6.2 ч1 Убийство — 4 года тюрьмы
        • ДК SA Статья 2 Отказ остановиться — штраф 5000$
        • АдмКодекс SA Статья 11.1 Оскорбление — штраф 5000-20000$
        • ПК SA Статья 16 Основания задержания: следы, видео, ордер
        • Конституция SA Статья 1.5 Презумпция невиновности

        Также ты знаешь общие юридические понятия: адвокат, прокурор, суд, права человека, задержание, судебный процесс.

        Отвечай на русском языке, чётко, по делу. НЕ используй мат и оскорбления в ответах.`;

        let currentUser = null;
        let messages = [];
        let waiting = false;
        let dailyCount = 0;
        let currentConversationId = null;
        let isSidebarOpen = false;

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');

        const convListSide = document.getElementById('convListSide');
        const sideNewChatBtn = document.getElementById('sideNewChatBtn');
        const sideUserInfo = document.getElementById('sideUserInfo');
        const sideUnauth = document.getElementById('sideUnauth');
        const sideAvatar = document.getElementById('sideAvatar');
        const sideUserName = document.getElementById('sideUserName');
        const sideLogoutBtn = document.getElementById('sideLogoutBtn');
        const sideLoginBtn = document.getElementById('sideLoginBtn');

        const headerUserInfo = document.getElementById('headerUserInfo');
        const headerAvatar = document.getElementById('headerAvatar');
        const headerUserName = document.getElementById('headerUserName');
        const headerLogoutBtn = document.getElementById('headerLogoutBtn');
        const headerLoginBtn = document.getElementById('headerLoginBtn');

        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const limitBar = document.getElementById('limitBar');

        function toggleSidebar(open) {
            isSidebarOpen = open !== undefined ? open : !isSidebarOpen;
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open', isSidebarOpen);
                overlay.classList.toggle('show', isSidebarOpen);
            } else {
                sidebar.classList.toggle('closed', !isSidebarOpen);
            }
        }

        menuToggle.addEventListener('click', () => toggleSidebar());
        sidebarCloseBtn.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                overlay.classList.remove('show');
                sidebar.classList.remove('open');
                sidebar.classList.toggle('closed', !isSidebarOpen);
            }
        });

        function getTodayKey() {
            const today = new Date().toISOString().split('T')[0];
            return `hyuga_daily_${today}`;
        }

        function getUserLimit() {
            if (!currentUser) return DAILY_LIMIT;
            if (VIP_LIMITS[currentUser.id]) {
                return VIP_LIMITS[currentUser.id];
            }
            return DAILY_LIMIT;
        }

        function loadDailyCount() {
            const key = getTodayKey();
            const stored = localStorage.getItem(key);
            const used = stored ? parseInt(stored, 10) : 0;
            const limit = getUserLimit();
            return { used, limit };
        }

        function incrementDailyCount() {
            const key = getTodayKey();
            const { used } = loadDailyCount();
            const next = used + 1;
            localStorage.setItem(key, String(next));
            dailyCount = next;
            updateLimitBar();
        }

        function updateLimitBar() {
            const { used, limit } = loadDailyCount();
            const remaining = Math.max(0, limit - used);
            
            if (limit >= 999999) {
                limitBar.innerHTML = `📨 ${used} / ∞ (VIP)`;
            } else {
                limitBar.innerHTML = `📨 ${used} / ${limit} сегодня (осталось ${remaining})`;
            }
            
            if (used >= limit) {
                limitBar.innerHTML += ' ⚠️ Лимит!';
                questionInput.disabled = true;
                sendBtn.disabled = true;
            } else {
                if (currentUser) {
                    questionInput.disabled = false;
                    sendBtn.disabled = false;
                }
            }
        }

        function isVIP() {
            if (!currentUser) return false;
            return !!VIP_LIMITS[currentUser.id];
        }

        function getConversationsKey() {
            return `hyuga_conv_${currentUser ? currentUser.id : 'guest'}`;
        }

        function loadConversations() {
            if (!currentUser) return [];
            try {
                const data = localStorage.getItem(getConversationsKey());
                return data ? JSON.parse(data) : [];
            } catch { return []; }
        }

        function saveConversations(convs) {
            if (!currentUser) return;
            localStorage.setItem(getConversationsKey(), JSON.stringify(convs));
        }

        function getCurrentConversation() {
            const convs = loadConversations();
            if (convs.length === 0) {
                const newConv = { id: Date.now().toString(), title: 'Новый диалог', messages: [] };
                convs.push(newConv);
                saveConversations(convs);
                return newConv;
            }
            if (currentConversationId) {
                const found = convs.find(c => c.id === currentConversationId);
                if (found) return found;
            }
            return convs[convs.length - 1];
        }

        function saveCurrentConversation(messagesList) {
            const convs = loadConversations();
            const conv = getCurrentConversation();
            conv.messages = messagesList;
            if (messagesList.length > 0 && messagesList[0].role === 'user' && conv.title === 'Новый диалог') {
                const title = messagesList[0].content.substring(0, 30);
                conv.title = title + (messagesList[0].content.length > 30 ? '...' : '');
            }
            const index = convs.findIndex(c => c.id === conv.id);
            if (index !== -1) {
                convs[index] = conv;
            } else {
                convs.push(conv);
            }
            saveConversations(convs);
            renderConvList();
        }

        function deleteConversation(id) {
            if (!confirm('Удалить этот диалог?')) return;
            let convs = loadConversations();
            convs = convs.filter(c => c.id !== id);
            saveConversations(convs);
            if (currentConversationId === id) {
                if (convs.length > 0) {
                    currentConversationId = convs[convs.length - 1].id;
                    const conv = convs[convs.length - 1];
                    messages = conv.messages || [];
                } else {
                    currentConversationId = null;
                    messages = [];
                }
                renderMessages();
            }
            renderConvList();
            updateLimitBar();
        }

        function renderConvList() {
            const convs = loadConversations();
            convListSide.innerHTML = '';
            if (convs.length === 0) {
                convListSide.innerHTML = '<div style="padding:16px 12px; color:var(--text-dim); font-size:0.8rem; text-align:center;">Нет диалогов<br>Создайте новый</div>';
                return;
            }
            convs.forEach(c => {
                const isActive = c.id === currentConversationId;
                const div = document.createElement('div');
                div.className = `conv-item-side ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="conv-title">${c.title}</span>
                    <button class="conv-del" data-id="${c.id}">✕</button>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        switchConversation(c.id);
                    }
                });
                const delBtn = div.querySelector('.conv-del');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(c.id);
                });
                convListSide.appendChild(div);
            });
        }

        function switchConversation(id) {
            const convs = loadConversations();
            const found = convs.find(c => c.id === id);
            if (found) {
                currentConversationId = id;
                messages = found.messages || [];
                renderMessages();
                renderConvList();
                updateLimitBar();
                if (window.innerWidth <= 768) toggleSidebar(false);
            }
        }

        function createNewConversation() {
            if (!currentUser) return;
            
            if (!isVIP()) {
                const convs = loadConversations();
                const activeConvs = convs.filter(c => c.messages && c.messages.length > 0);
                if (activeConvs.length >= 1) {
                    alert('❌ У вас уже есть активный диалог. Закончите его (15 вопросов), чтобы создать новый.');
                    return;
                }
            }
            
            const convs = loadConversations();
            const newConv = { id: Date.now().toString(), title: 'Новый диалог', messages: [] };
            convs.push(newConv);
            saveConversations(convs);
            currentConversationId = newConv.id;
            messages = [];
            renderMessages();
            renderConvList();
            updateLimitBar();
            if (window.innerWidth <= 768) toggleSidebar(false);
        }

        function loginWithDiscord() {
            const redirectUri = window.location.href.split('#')[0];
            const url =
                `https://discord.com/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('hyuga_user');
            messages = [];
            currentConversationId = null;
            renderMessages();
            updateUIForUnauth();
            updateLimitBar();
            renderConvList();
        }

        function updateUIForAuth() {
            sideUserInfo.style.display = 'flex';
            sideUnauth.style.display = 'none';
            sideAvatar.src = currentUser.avatar;
            sideUserName.textContent = currentUser.username;
            sideNewChatBtn.disabled = false;

            headerUserInfo.style.display = 'flex';
            headerLoginBtn.style.display = 'none';
            headerLogoutBtn.style.display = 'block';
            headerAvatar.src = currentUser.avatar;
            headerUserName.textContent = currentUser.username;

            questionInput.disabled = false;
            sendBtn.disabled = false;

            const convs = loadConversations();
            if (convs.length > 0) {
                const last = convs[convs.length - 1];
                currentConversationId = last.id;
                messages = last.messages || [];
                renderMessages();
            } else {
                messages = [];
                renderMessages();
            }
            renderConvList();
            updateLimitBar();
        }

        function updateUIForUnauth() {
            sideUserInfo.style.display = 'none';
            sideUnauth.style.display = 'block';
            sideNewChatBtn.disabled = true;

            headerUserInfo.style.display = 'none';
            headerLoginBtn.style.display = 'block';
            headerLogoutBtn.style.display = 'none';

            questionInput.disabled = true;
            sendBtn.disabled = true;
            messages = [];
            currentConversationId = null;
            renderMessages();
            renderConvList();
            updateLimitBar();
        }

        function fetchDiscordUser(token) {
            fetch('https://discord.com/api/users/@me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                if (user.id) {
                    currentUser = {
                        id: user.id,
                        username: user.username,
                        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` :
                            'https://cdn.discordapp.com/embed/avatars/0.png'
                    };
                    localStorage.setItem('hyuga_user', JSON.stringify(currentUser));
                    dailyCount = loadDailyCount().used;
                    updateUIForAuth();
                }
            })
            .catch(() => updateUIForUnauth());
        }

        function checkAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                fetchDiscordUser(token);
                window.history.replaceState({}, document.title, window.location.pathname);
                return;
            }
            const saved = localStorage.getItem('hyuga_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                dailyCount = loadDailyCount().used;
                updateUIForAuth();
            } else {
                updateUIForUnauth();
                updateLimitBar();
            }
        }

        function renderMessages() {
            if (messages.length === 0) {
                chatMessages.innerHTML = currentUser ?
                    '<div class="message bot">⚖️ Задайте вопрос по законам, правам или адвокатуре.</div>' :
                    '<div class="message bot">🔐 Авторизуйтесь через Discord, чтобы начать диалог.</div>';
                return;
            }
            chatMessages.innerHTML = messages.map(msg => {
                let content = msg.content.replace(/\n/g, '<br>');
                if (msg.role === 'bot' && msg.showCreateBtn) {
                    content += `<br><button class="create-new-btn" onclick="createNewConversation()">➕ Создать новый диалог</button>`;
                }
                return `<div class="message ${msg.role === 'user' ? 'user' : 'bot'}">${content}</div>`;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function isLegalQuestion(question) {
            const lower = question.toLowerCase();
            const legalKeywords = [
                'закон', 'право', 'адвокат', 'суд', 'судья', 'прокурор',
                'задержание', 'арест', 'тюрьма', 'штраф', 'наказание',
                'преступление', 'убийство', 'кража', 'мошенничество',
                'конституция', 'статья', 'кодекс', 'юрист', 'судебный',
                'виновен', 'невиновен', 'свидетель', 'доказательство',
                'ордер', 'обыск', 'допрос', 'адвокатура', 'юриспруденция',
                'иск', 'жалоба', 'апелляция', 'приговор', 'оправдание',
                'гражданский', 'уголовный', 'административный', 'налоговый'
            ];
            for (const word of legalKeywords) {
                if (lower.includes(word)) {
                    return true;
                }
            }
            return false;
        }

        async function askGroq(question) {
            if (!isLegalQuestion(question)) {
                return 'Извините, я помогаю только с юридическими вопросами. Пожалуйста, спросите о законах, правах или адвокатуре.';
            }

            const history = messages.map(m => ({ role: m.role, content: m.content }));

            const payload = {
                model: MODEL,
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...history,
                    { role: 'user', content: question }
                ],
                temperature: 0.5,
                max_tokens: 1000
            };

            const response = await fetch(GROQ_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function sendMessage() {
            if (!currentUser) return;
            if (waiting) return;
            const { used, limit } = loadDailyCount();
            if (used >= limit) {
                updateLimitBar();
                return;
            }

            const userMessages = messages.filter(m => m.role === 'user').length;
            if (userMessages >= MAX_MESSAGES_PER_CONV) {
                const reply = '⚠️ В этом диалоге достигнут лимит в 15 вопросов. Создайте новый диалог, чтобы продолжить.';
                const msgObj = { role: 'assistant', content: reply, showCreateBtn: true };
                messages.push(msgObj);
                renderMessages();
                saveCurrentConversation(messages);
                return;
            }

            const question = questionInput.value.trim();
            if (!question) return;
            questionInput.value = '';
            questionInput.disabled = true;
            sendBtn.disabled = true;

            messages.push({ role: 'user', content: question });
            renderMessages();
            saveCurrentConversation(messages);
            incrementDailyCount();
            updateLimitBar();

            waiting = true;
            const thinkingIndex = messages.length;
            messages.push({ role: 'assistant', content: '🤔 Думаю...' });
            renderMessages();

            try {
                const reply = await askGroq(question);
                messages[thinkingIndex] = { role: 'assistant', content: reply };
                renderMessages();
                saveCurrentConversation(messages);
                renderConvList();
            } catch (err) {
                messages[thinkingIndex] = { role: 'assistant', content: `❌ Ошибка: ${err.message}` };
                renderMessages();
            } finally {
                waiting = false;
                questionInput.disabled = false;
                sendBtn.disabled = false;
                questionInput.focus();
                updateLimitBar();
            }
        }

        sideLogoutBtn.addEventListener('click', logout);
        headerLogoutBtn.addEventListener('click', logout);
        sideLoginBtn.addEventListener('click', loginWithDiscord);
        headerLoginBtn.addEventListener('click', loginWithDiscord);
        sideNewChatBtn.addEventListener('click', createNewConversation);
        sendBtn.addEventListener('click', sendMessage);
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        setInterval(() => {
            const newCount = loadDailyCount().used;
            if (newCount !== dailyCount) {
                dailyCount = newCount;
                updateLimitBar();
            }
        }, 60000);

        checkAuth();

        if (window.innerWidth > 768) {
            isSidebarOpen = false;
            sidebar.classList.add('closed');
        } else {
            isSidebarOpen = false;
            sidebar.classList.add('open');
        }
    </script>
</body>
</html>
