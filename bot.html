ч. 3. Сотрудник Офиса Генерального прокурора ведет видеозапись процессуальных действий, совершаемых при рассмотрении материалов дела при задержании государственного служащего.

​
​
ч. 4. Ведение видеозаписи может быть приостановлено в случаях, когда:​

задержанное лицо реализует право на получение юридической помощи защитника, и защитнику предоставляются материалы фиксации для ознакомления;​
проводится разбирательство с участием сотрудника Офиса Генерального прокурора и руководства задержанного государственного служащего, если характер такого разбирательства исключает возможность ведения видеозаписи.​

Статья 33. Хранение материалов фото- и видеофиксации​
​
​
ч. 1. Материалы фото- и видеофиксации, полученные при пресечении правонарушений либо в ходе процессуальных действий, подлежат хранению на защищенных серверах государственного органа, в котором служит уполномоченный сотрудник, либо на ином носителе информации в течение 72 часов с момента окончания записи, если иные сроки хранения не установлены настоящим Кодексом.​

​
​
ч. 2. В случае поступления искового заявления в суд, обращения в Офис Генерального прокурора, заявления о преступлении или о правонарушении государственный служащий не вправе уничтожать, изменять, удалять или иным способом ограничивать сохранность или доступ к материалам фото- и видеофиксации, относящимся к проверяемому событию, на весь период производства по обращению в Офис Генерального прокурора, проведения проверки сообщения о правонарушении, предварительного расследования либо судебного разбирательства.​

​
​
ч. 3. После принятия обращения к производству, начала проверки сообщения о правонарушении, либо возбуждения уголовного дела, дела об административном правонарушении уполномоченный сотрудник правоохранительного органа уведомляет об этом государственного служащего, в отношении которого подано такое обращение, сообщение или возбуждено дело, любыми предусмотренными законом способами.​

​
ч. 4. После принятия искового заявления в отношении государственного служащего к производству, суд уведомляет об этом государственного служащего любыми предусмотренными законом способами.


​
Глава IX. Выпуск граждан под залог​

Статья 34. Выпуск под залог​
​
​
ч. 1. Граждане имеют право выйти под залог, сумма которого регулируется сотрудниками правоохранительных органов, но не менее 25.000$.​

​
​
ч. 2. За каждый уровень розыска стоимость выхода под залог увеличивается на 25.000$ ((+25.000$ за каждую ★))

​
Глава X. Подследственность и Компетенция​

​
Статья 35. Компетенция
​
Компетенция — это установленный законом, нормативным актом или внутренним регламентом объём прав, обязанностей и полномочий, предоставленных конкретному органу, должностному лицу или организации в рамках определённых правоотношений.​
​
ч. 1 Компетенция определяет:​
- Место органа или должностного лица в системе государственной и административной власти;​
- Круг вопросов, по которым орган или должностное лицо вправе действовать;​
- Пределы полномочий в рамках допустимых процедур и задач.​
ч. 2 Процессуальные действия, совершаемые органами или должностными лицами вне их установленной компетенции, запрещаются, если иное не предусмотрено настоящим Кодексом.​
​
Исключение: Одобрен запрос на предоставление компетенции от уполномоченного органа и уполномоченного лица на проведение предварительное следствия, следствия и иных процессуальных действий.​
ч.3 Получение доступа к полномочиям, выходящим за пределы установленной компетенции:​
​
Сотрудники региональных правоохранительных органов вправе на отработку статей, относящихся к федеральной компетенции, только по одобрению запроса старшим составом Федерального Расследовательского Бюро.​
Сотрудники федеральных ведомств вправе на отработку статей региональной компетенции только по одобрению запроса старшим составом регионального органа.​
Сотрудники федеральных и региональных ведомств вправе вправе на отработку статей военной компетен​
ции только по одобрению запроса старшим составом военного органа.​
Сотрудники федеральных и региональных ведомств вправе вправе на отработку статей финансовой компетенции только по одобрению запроса старшим составом Секретной Службы Соединенных Штатов Америки.​
​
ч. 4 Сотрудники ведомств, не обладающих установленной компетенцией по конкретным статьям, обязаны направить запрос на проведение процессуальных действий в уполномоченный орган либо уполномоченному должностному лицу, обладающему правом делегирования компетенции.​
​
ч. 5 Такой запрос может быть направлен до начала предварительного следствия, следствия и иных процессуальных действий или в процессе их осуществления, при условии обязательного уведомления и последующего получения разрешения в установленном порядке.​
​
Примечание: отсутствие предварительного либо последующего разрешения исключает возможность проведения процессуальных действий по статье, находящейся вне компетенции запрашивающего ведомства. Такие действия являются недопустимыми.​
​
ч. 6 Сотрудники Офиса Генерального Прокурора имеют право на проведение предварительного следствия, следственных и иных процессуальных действий на территории всего штата San-Andreas, вне зависимости от категории уголовной или административной статьи в рамках своих полномочий. ​
​
Примечание: Сотрудникам Офиса Генерального Прокурора недопустимо использование наручников и иных специальных средств при проведении процессуальных действий, а равно самостоятельно инициировать задержание с использованием силы или специальных средств.​
​
ч. 7 Генеральный прокурор или его Заместители вправе своим распоряжением (как устным, так и письменным) расширить компетенцию на проведение предварительного следствия, следственных и процессуальных действий в отношении определенной правоохранительной структуры или должностного лица.​
​
Статья 36. Компетенция ведомств
​
ч. 1. Предварительное следствие, следствие и иные процессуальные действия органов исполнительной власти осуществляются в зависимости от категории статьи, установленной уголовным кодексом, и разделяются по ведомственной компетенции:​
​
[Региональная] — осуществляется региональными правоохранительными органами штата San-Andreas при расследовании преступлений, не затрагивающих интересы федерального уровня.​
​
[Федеральная] — осуществляется Федеральным Расследовательским Бюро и Секретной Службой США по делам, отнесённым к юрисдикции федеральных органов.​
​
[Финансовая] — осуществляется Секретной Службой США по делам, связанным с финансовыми преступлениями, нарушениями в банковской сфере, подделкой валюты и операциями, представляющими угрозу финансовой стабильности штата.​
​
[Военная] — осуществляется Национальной Гвардией штата San-Andreas по делам, связанным с военнослужащими, военными объектами либо в пределах территории военного значения.​
​
Примечание: В случае наличия смешанной компетенции, сотрудники соответствующих ведомств вправе осуществлять совместное предварительное следствие, следствие и иные процессуальные действия в пределах предоставленных полномочий.​
​
Исключение: Секретная Служба Соединённых Штатов Америки обладает исключительным правом доступа к компетенции любого ведомства.​
​
Исключение: При отсутствии лица на должности действующего Директора Федерального Расследовательского Бюро, сотрудники региональных правоохранительных органов вправе самостоятельно осуществлять предварительное следствие, следствие и процессуальные действия по статье 7.1 Уголовного Кодекс без необходимости получения разрешения от федеральных органов.​

Глава XI. Утратила силу​
​
Глава XII. Стадии применения силы​

Статья 37. Стадии применения силы​
​
ч. 1. Стадии применения силы - стандарты, классифицирующие допустимый уровень применения силы в отношении нарушителей законодательства штата SA, со стороны государственного служащего.​
​
Примечание: Каждый государственный служащий обязан опираться на стадии применения силы и на процессуальный кодекс при прямом взаимодействии с лицом. Каждый сотрудник, применяющий определённую стадию силы должен отдавать отчётность своим действиям, а также быть готовым к тому, что ненадлежащее исполнение своих обязанностей приведёт к уголовной ответственности. Все стадии применения силы должны соблюдаться в строгом иерархическом порядке от первой до пятой.​
​
Исключение: В случае когда государственный служащий стал свидетелем правонарушения, сотруднику разрешается игнорировать первую, вторую и третью стадии применения силы и перейти сразу к четвертой; если сотрудникам гос. структур или гражданским лицам угрожает опасность, большое скопление вооруженных людей, в таком случае можно предпринять пятую стадию без предшествующих стадий.​
​
ч. 2. Законодательство предусматривает пять стадий применения силы:​
​
а) Первая стадия - Присутствие;
б) Вторая стадия - Приказ;
в) Третья стадия - Применение физической силы;
г) Четвертая стадия - Применение специальных средств;
д) Пятая стадия - Применение огнестрельного оружия.​
​
Примечание: Присутствие государственного служащего при исполнении своих служебных обязанностей. В некоторых ситуациях, одного присутствия будет достаточно для выполнения законных требований и прекращения мелких правонарушений. В зависимости от обстановки и количества лиц в определенном месте, этот уровень применения силы может потребовать присутствия нескольких государственных служащих для полного контроля ситуации. В некоторых ситуациях расстегивание сотрудником силовой структуры кобуры и даже извлечение им оружия или спецсредств подпадают под этот уровень применения силы. При стадии присутствия, а также при последующих стадиях, сотрудник должен иметь идентификационные знаки и предъявлять их при первом гласном обращении к лицу и если его идентификация помогает делу в котором он несёт непосредственное участие. Если первой стадии недостаточно, опираясь на ситуацию, сотрудник может применять вторую стадию.

Примечание: Требования либо распоряжения, исходящие от государственных служащих, должны быть исполнимыми и законными, то есть их возможность должна быть предусмотрена существующими законодательными актами. Кроме того, требования государственных служащих должны иметь в качестве цели - охрану общественного порядка и обеспечение общественной безопасности. Государственный служащий имеет право дополнять свои распоряжения предупреждениями о последствиях за неисполнение законных требований. Если второй стадии недостаточно, опираясь на ситуацию, сотрудник может применять третью стадию.​
​
Примечание: применение физической силы считается стадией, при которой государственный служащий использует физическое воздействие в сторону лица. К этой стадии относятся заламывание рук, удержание гражданина на месте с применением силы. Также сюда же может относиться применение дубинок и слезоточивых аэрозолей. Если третьей стадии недостаточно, опираясь на ситуацию, сотрудник может применять четвертую стадию.

Примечание: применение специальных средств считается стадией, при которой государственный служащий использует спец. средства в сторону лица. К этой стадии относится применение наручников, электрошоковых устройств, резиновых пуль. В некоторых ситуациях к этой стадии может относиться применение дубинок и слезоточивых аэрозолей. Запрещено использовать спец. средство, как меру предупреждения (предупредительные выстрелы/удары запрещены). Государственный служащий может применить специальные средства в отношении лица, способные нанести ущерб его здоровью, лишь в том случае, когда применение иных специальных средств невозможно. Если четвёртой стадии недостаточно, опираясь на ситуацию, сотрудник может применять пятую стадию.

Примечание: применение огнестрельного оружия считается стадией, при которой государственный служащий использует оружие в сторону лица. Под этой стадией воздействия применяется огнестрельное оружие, автомобиль или любое подручное оружие, обладающее необходимыми свойствами. На этой стадии очень вероятно причинение смерти или нанесение тяжкого вреда здоровью лица. Если сотрудник применяет огнестрельное оружие, он обязан использовать его строго по назначению, предупредительные выстрелы запрещены. Запрещено применять огнестрельное оружие при значительном скоплении граждан, если в результате его применения могут пострадать случайные лица. Не запрещено использовать оружие для остановки транспортного средства путем его повреждения, если управляющее им лицо отказывается выполнить неоднократные требования сотрудника, а также для разрушения запирающих устройств, элементов и конструкций препятствующих проникновению в жилые и иные помещения.​

​
Глава XIII. Федеральный розыск и боло-розыск​

​
Статья 38. Федеральный розыск.​
​
ч. 1. Федеральный розыск - комплекс мер, направленный на установление местонахождения определенного человека, скрывающегося от правоохранительных органов, следствия, суда, а также без вести пропавших граждан на территории Штата San-Andreas.​
​
ч. 2. Объявлять лицо в федеральный розыск разрешено за нарушение Уголовного кодекса Штата San-Andreas.​
​
ч. 3. Лица объявляются в федеральный розыск на основании выданного ордера или решения суда.​
​
ч. 4. Объявлять в федеральный розыск за нарушение УК СА имеют права следующие лица:​
​
а) Генеральный прокурор, Заместитель Генерального прокурора
б) Судьи.​
​
ч. 5. Объявлять лицо, пропавшее без вести, в федеральный розыск имеют право все лица, перечисленные в ч.4 настоящей статьи.​
​
Примечание: при необходимости объявить кого-либо в Федеральный розыск государственный служащий направляет соответствующее ходатайство на имя Генерального прокурора или его заместителя.

ч. 6. Сотрудник государственных силовых органов при проведения ареста граждан, находящихся в федеральном розыске, обязаны после проведения процессуальных действий незамедлительно, в срок до 3 часов, оставить отчет об аресте лица, находившегося в фед. розыске в специализированном канале связи сотрудников государственных органов.

Статья 39. Боло-розыск​
​
ч. 1. Боло-розыск - комплекс мер, направленный на установление местонахождения определенного человека, скрывающегося от правоохранительных органов, следствия, суда на территории штата San-Andreas. ​
​
ч. 2. Выделяются 5 уровней (звезд) боло-розыска. Уровень боло-розыска устаналивается в зависимости от тяжести совершенного правонарушения или по подозрению в совершении такового, пропорционально возможной мере наказания в виде лишения свободы в соотношени 1 год к 1 звезде.​
​
ч. 3. Для эффективности поиска лиц находящихся в федеральном розыске разрешается объявлять таковых в боло-розыск. При объявлении лица в боло-розыск находящегося в федеральном розыске,разрешается сразу устанавливать 5 уровень общественной опасности

ч. 4. Объявлять в боло-розыск за нарушение действующего законодательства могут сотрудники Полицейского Департамента г.Лос-Сантоса, Департамента Шерифа о.Блейн, Федерального Расследовательского Бюро, Секретной Службы США, Офиса Генерального Прокурора, а также Судьи всех категорий.​
​
ч. 5. Государственным служащим уполномоченным объявлять в федеральный розыск разрешается вносить таковых в боло-розыск. ​
​
ч. 6. В случае внесения в боло-розыск лиц по ордеру/решению суда разрешается установить сразу последний уровень общественной опасности​
​
ч. 7. Лицо может быть вынесено из боло-розыска сотрудниками Офиса Генерального Прокурора путем предоставления видеофиксации своей невиновности, сотрудниками LSPD/LSCSD/FIB/USSS в случае когда в результате проведения расследования сотрудниками государственных органов была установлена невиновность лица, а также государственным адвокатом в случае когда в результате защиты была установлена его невиновность и процессуальные действия были прекращены.
​
Глава XIV. Юридическая реабилитация​

Статья 40. Юридическая реабилитация​
​
ч. 1. Граждане имеют право на юридическую реабилитацию, обратившись в судебные или другие уполномоченные инстанции.​
​
ч. 2. Губернатор устанавливает перечень лиц, уполномоченных на проведение юридических реабилитаций.​
​
ч. 3. Стоимость юридической реабилитации составляет: 125.000$ (сто двадцать пять тысяч )​
​
ч. 4. 25.000$ от суммы юридической реабилитации направляется на финансирование работы сотрудника, который снимает судимость.​
​
ч. 5. 100.000$ от суммы судебной пошлины за юридическую реабилитацию направляется в казну штата San-Andreas.
​
Глава XV. Ходатайства и жалобы​

Статья 41. Лица, имеющие право заявить ходатайство​
​
ч. 1. Подозреваемый, обвиняемый, его защитник, потерпевший, его законный представитель и представитель, частный обвинитель, эксперт, гражданский истец, гражданский ответчик, их представители, представитель администрации организации и иное лицо, права и законные интересы которых затронуты в ходе досудебного или судебного производства, вправе заявить ходатайство о производстве процессуальных действий или принятии процессуальных решений для установления обстоятельств, имеющих значение для дела, обеспечения прав и законных интересов лица, заявившего ходатайство, либо представляемых им лица или организации.​
​
ч. 2. Ходатайство заявляется в орган-(ы), осуществляющий следствие, либо в суд.​
​
ч. 3. Правом заявлять ходатайство в ходе судебного разбирательства обладает также государственный обвинитель.

Статья 42. Заявление ходатайства​
​
ч. 1. Ходатайство может быть заявлено в любой момент производства по делу. ​
​
ч. 2. Отклонение ходатайства не лишает заявителя права вновь заявить ходатайство

Статья 43. Сроки рассмотрения и разрешение ходатайства​
​
ч. 1. Ходатайство подлежит рассмотрению и разрешению непосредственно после его заявления. В случаях, когда немедленное принятие решения по ходатайству, заявленному в ходе предварительного расследования, невозможно, оно должно быть разрешено не позднее 3 суток со дня его заявления.​
​
ч. 2. Об удовлетворении ходатайства либо о полном или частичном отказе в его удовлетворении уполномоченный сотрудник органа, осуществляющего следствие, судья выносят постановление. Решение по ходатайству может быть обжаловано в вышестоящую инстанцию суда или вышестоящему уполномоченному сотруднику органа, осуществляющего следствие или в Офисе Генерального Прокурора

Статья 44. Право обжалования​
​
ч. 1. Действия (бездействие) и решения следователя, прокурора и суда могут быть обжалованы в установленном настоящим Кодексом порядке участниками судопроизводства, а также иными лицами в той части, в которой производимые процессуальные действия и принимаемые процессуальные решения затрагивают их интересы.

Статья 45. Порядок рассмотрения обращения прокурором или следователем​
​
ч. 1. В случае, если обжалуется действие (бездействие) и/или решения служащих, осуществляющих следствие, служащего офиса генерального прокурора, то участник судопроизводства вправе подать обращение вышестоящему сотруднику органа следствия и(или) Офиса Генерального Прокурора (во время досудебного или судебного производства) или в суд (во время судебного производства).

ч. 2. В случае подачи обращения в Офис Генерального Прокурора и(или) иной орган следствия в соответствии с ч.1 ст.45 текущего Кодекса, сотрудник Офиса Генерального Прокурора и(или) следователь, назначенный на рассмотрение обращения, обязан рассмотреть обращение в течение 1 дня с момента начала рассмотрения такового. В исключительных случаях, когда для проверки обращения необходимо истребовать дополнительные материалы либо принять иные меры, допускается рассмотрение обращения в срок до 3 суток. По результатам рассмотрения обращения, служащий Офиса Генерального Прокурора и(или) следователь выносит постановление о полном или частичном удовлетворении требований обращения либо об отказе в его удовлетворении.​
​
ч. 3. Если жалоба подана в суд во время судебного производства, то суд в течении 3 суток рассматривает жалобу и выносит мотивированное постановление или определение о полном или частичном удовлетворении жалобы либо об отказе в ее удовлетворении.
​
Глава XVI. Следствие​

Статья 46. Следствие

ч. 1. Следствие - это комплекс мер по выяснению обстоятельств, связанных с правонарушением, для установления обстановки и характера правонарушения, а также лиц, виновных в совершении правонарушения.

Статья 47. Начало производства следствия​
​
ч. 1. Если иное не оговорено, то следственные действия производятся только с момента возбуждения дела.​
​
ч. 2. До возбуждения дела возможно проведение любого следственного действия, промедление с производством которого может привести к утрате доказательств, затруднить их обнаружение и закрепление, дать возможность лицу, совершившему правонарушение, скрыться или осложнить возмещение причиненного материального ущерба.

ч. 3. Сотрудник правоохранительных органов или иное уполномоченное лицо, установив, что дело ему не подследственно, производит следственные действия, описанные в ч. 2 настоящей статьи, после чего передает дело лицу, подследственному вести производство по делу в порядке ч. 1 ст. 49 настоящей главы.

Статья 48. Принципы ведения расследования​
​
ч. 1. Настоящим Кодексом предусмотрено два принципа ведения расследования, которые должны соблюдаться правоприменителем:​
​
а) Адекватность — сотрудник обязан действовать профессионально, не превышая свои должностные полномочия, и максимально точно разобраться в деле прежде чем делать умозаключения;
б) Безотлагательность — сотрудник обязан отреагировать на правонарушение и начать действовать без необоснованных промедлений.

Статья 49. Передача дела​
​
ч. 1. В случае если сотрудник по объективным причинам не может или не уполномочен продолжать расследование, он обязан передать его уполномоченному сотруднику с подробным изложением всех известных ему обстоятельств дела. А также передать подозреваемого если он был задержан.

Статья 50. Письменная отчетность​
​
ч. 1. Дело должно вестись с письменной отчетностью в случаях предусмотренными внутренним регламентом, или в случае необходимости передачи дела в суд.​
​
ч. 2. Процессуальные документы могут быть выполнены типографским, электронным способами. В случае отсутствия бланков процессуальных документов, выполненных типографским, электронным, они могут быть написаны от руки.

Статья 51. Следственные действия

ч. 1. Перечень следственных действий:​
​
а) Допрос;
б) Осмотр;
в) Обыск;
г) Выемка;
д) Очная ставка;
е) Опознание;
ё) Освидетельствование;
ж) Проверка показаний;
з) Производство судебной экспертизы;
и) Контроль и запись переговоров;
й) Следственный эксперимент;
к) Возбуждение дела (принятие заявления или фиксация нарушения);
л) Оперативно-розыскные мероприятия;
м) Задержание.

Статья 52. Осмотр​
​
ч. 1. Осмотр места происшествия, местности, жилища, иного помещения, предметов и документов производится в целях обнаружения следов правонарушения, выяснения других обстоятельств, имеющих значение для дела.

ч. 2. Осмотр места происшествия, документов и предметов может быть произведен до возбуждения дела.

Статья 53. Следственный эксперимент​
​
ч. 1. В целях проверки и уточнения данных, имеющих значение для дела, прокурор вправе произвести следственный эксперимент путем воспроизведения действий, а также обстановки или иных обстоятельств определенного события. При этом проверяется возможность восприятия каких-либо фактов, совершения определенных действий, наступления какого-либо события, а также выявляются последовательность происшедшего события и механизм образования следов. Производство следственного эксперимента допускается, если не создается опасность для здоровья участвующих в нем лиц.
​

Статья 54. Обыск​
​
ч. 1. Основания и порядок производства обыска, предусмотрены главой VI настоящего Кодекса.

Статья 55. Выемка​
​
ч. 1. При необходимости изъятия определенных предметов и документов, имеющих значение для дела, и если точно известно, где и у кого они находятся, производится их выемка.​
​
ч. 2. Выемка производится на основании постановления прокурора, следователя или решения суда.

Статья 56. Контроль и запись переговоров​
​
ч. 1. При наличии достаточных оснований полагать, что телефонные и иные переговоры (в том числе сообщения) подозреваемого, обвиняемого и других лиц могут содержать сведения, имеющие значение для уголовного дела, их контроль и запись допускаются при производстве по уголовным делам. ​
​
ч. 2. Контроль и запись переговоров допускается только на основании судебного решения.

Статья 57. Допрос

ч. 1. Свидетель, потерпевший, обвиняемый, подозреваемый вызывается на допрос повесткой, в которой указываются, кто и в каком качестве вызывается, к кому и по какому адресу, дата и время явки на допрос, а также последствия неявки без уважительных причин или может быть подвергнут процедуре допроса в ходе задержания.​
​
ч. 2. Повестка вручается лицу, вызываемому на допрос, под расписку либо передается с помощью электронных средств связи. В случае временного отсутствия лица, вызываемого на допрос, повестка вручается совершеннолетнему члену его семьи либо передается руководителю по месту его работы или по поручению следователя или прокурора иным лицам и организациям, которые обязаны передать повестку лицу, вызываемому на допрос.​
​
ч. 3. Лицо, вызываемое на допрос, обязано явиться в назначенный срок либо заранее уведомить следователя или прокурора о причинах неявки. В случае неявки без уважительных причин лицо, вызываемое на допрос, может быть подвергнуто приводу либо к нему могут быть применены иные меры процессуального принуждения.​
​
ч. 4. Следователь и/или прокурор, привлекая к участию в допросе истца, заявителя, свидетеля, потерпевшего, подозреваемого, обвиняемого, представителя таких лиц, удостоверяется в их личности, разъясняет им права, ответственность, а также порядок производства соответствующего следственного действия. Если в производстве следственного действия участвует специалист, эксперт или переводчик, то он также предупреждается об ответственности, предусмотренной законодательством.​
​
ч. 5. Должностное лицо, осуществляющее допрос, обязано уведомить допрашиваемое лицо о месте и времени проведения допроса, но не позднее 12-ти часов до его проведения.

Примечание: Допрос может быть произведен с отступлением обязательных временных рамок от настоящей части при обоюдном согласии сторон (должностного лица, осуществляющего допрос, допрашиваемого лица).​
​
ч. 6. Если допрашиваемое лицо явилось на допрос с адвокатом, приглашенным им для оказания юридической помощи, то адвокат присутствует при допросе и пользуется правами, предусмотренными . По окончании допроса адвокат вправе делать заявления о нарушениях прав и законных интересов клиента.​
​
ч. 7. Следователь или прокурор, в ходе допроса обязаны обеспечить проведение аудио- и (или) видеозаписи, материалы которых хранятся при уголовном деле.​
​
ч. 8. Допрос не может длится более 1 часа. Допрос проводимый по повестке, также не может проводиться в ночное время.
​

Статья 58. Очная ставка​
​
ч. 1. Если в показаниях ранее допрошенных лиц имеются существенные противоречия, то прокурор или следователь вправе провести очную ставку. ​
​
ч. 2. Прокурор или следователь выясняет у лиц, между которыми проводится очная ставка, знают ли они друг друга и в каких отношениях находятся между собой. Допрашиваемым лицам поочередно предлагается дать показания по тем обстоятельствам, для выяснения которых проводится очная ставка. После дачи показаний прокурор или следователь может задавать вопросы каждому из допрашиваемых лиц. Лица, между которыми проводится очная ставка, могут с разрешения прокурора или следователя задавать вопросы друг другу.​
​
ч. 3. В ходе очной ставки следователь или прокурор вправе предъявить вещественные доказательства и документы.​
​
ч. 4. Во время производства очной ставки должен проводится аудио и (или) видео протокол.

Статья 59. Предъявление для опознания​
​
ч. 1. Следователь может предъявить для опознания лицо или предмет свидетелю, потерпевшему, подозреваемому или обвиняемому.​
​
ч. 2. Опознающие предварительно допрашиваются об обстоятельствах, при которых они видели предъявленные для опознания лицо или предмет, а также о приметах и особенностях, по которым они могут его опознать.​
​
ч. 3. Не может проводиться повторное опознание лица или предмета тем же опознающим и по тем же признакам.​
​
ч. 4. Лицо предъявляется для опознания вместе с другими лицами, по возможности внешне сходными с ним. Общее число лиц, предъявляемых для опознания, должно быть не менее трех. Перед началом опознания опознаваемому предлагается занять любое место среди предъявляемых лиц, о чем в протоколе опознания делается соответствующая запись.​
​
ч. 5. При невозможности предъявления лица опознание может быть проведено по его фотографии, предъявляемой одновременно с фотографиями других лиц, внешне сходных с опознаваемым лицом. Количество фотографий должно быть не менее трех.​
​
ч. 6. Предмет предъявляется для опознания в группе однородных предметов в количестве не менее трех. При невозможности предъявления предмета его опознание проводится в порядке, установленном ч. 5 настоящей статьи.​
​
ч. 7. Если опознающий указал на одно из предъявленных ему лиц или один из предметов, то опознающему предлагается объяснить, по каким приметам или особенностям он опознал данные лицо или предмет. Наводящие вопросы недопустимы.​
​
ч. 8. В целях обеспечения безопасности опознающего предъявление лица для опознания по решению следователя может быть проведено в условиях, исключающих визуальное наблюдение опознающего опознаваемым. В этом случае понятые находятся в месте нахождения опознающего.​
​
ч. 9. Опознание лица также производится следователем на основе имеющихся фотоматериалов в совокупности с документами гражданина.
​

Статья 60. Проверка показаний на месте​
​
ч. 1. В целях установления новых обстоятельств, имеющих значение для дела, показания, ранее данные подозреваемым или обвиняемым, а также потерпевшим или свидетелем, могут быть проверены или уточнены на месте, связанном с исследуемым событием.​
​
ч. 2. Проверка показаний на месте заключается в том, что ранее допрошенное лицо воспроизводит на месте обстановку и обстоятельства исследуемого события, указывает на предметы, документы, следы, имеющие значение для дела, демонстрирует определенные действия. Какое-либо постороннее вмешательство в ход проверки и наводящие вопросы недопустимы.​
​
ч. 3. Не допускается одновременная проверка на месте показаний нескольких лиц.​
​
ч. 4. Проверка показаний начинается с предложения лицу указать место, где его показания будут проверяться. Лицу, показания которого проверяются, после свободного рассказа и демонстрации действий могут быть заданы вопросы.

Статья 61. Освидетельствование​
​
ч. 1. Для обнаружения на теле человека особых примет, следов правонарушения, телесных повреждений, выявления состояния опьянения или иных свойств и признаков, имеющих значение для дела, если для этого не требуется производство судебной экспертизы, может быть произведено освидетельствование подозреваемого, обвиняемого, потерпевшего, а также свидетеля с его согласия, за исключением случаев, когда освидетельствование необходимо для оценки достоверности его показаний. В случаях, не терпящих отлагательства, освидетельствование может быть произведено до возбуждения дела.​
​
ч. 2. О производстве освидетельствования следователь может вынести постановление, которое является обязательным для освидетельствуемого лица.​
​
ч. 3. Освидетельствование производится следователем. При необходимости следователь привлекает к участию в производстве освидетельствования врача или другого специалиста.​
​
ч. 4. При освидетельствовании лица другого пола следователь не присутствует, если освидетельствование сопровождается обнажением данного лица. В этом случае освидетельствование производится врачом.
​

Статья 62. Задержание​
​
ч. 1. Основания и порядок задержания, а также основания освобождения подозреваемого установлены в главе 4 Настоящего Кодекса.

Статья 63. Оперативно-розыскные мероприятия​
​
ч. 1. Оперативно-розыскные мероприятия регулируются отдельным законом “Об оперативно-розыскной деятельности”.

Статья 64. Возбуждение дела​
​
ч. 1. Возбуждение дела и производство по нему регулируются гл. 17 настоящего кодекса.​
​
ч. 2. Порядок производства следственных действий в отношении лиц, имеющих статус неприкосновенности, осуществляется с учетом закона "Об обеспечении неприкосновенности государственных служащих".

Статья 65. Окончание следствия​
​
ч. 1 По окончании следствия сотрудник правоохранительных органов или иное уполномоченное лицо выносит решение:​
​
1) о прекращении дела - по основаниям, предусмотренным статьей ст. 73 настоящего Кодекса, а равно о признании лица не виновным в совершении правонарушения;
2) о признании лица виновным в совершении правонарушения.
3) о возвращении дела для производства дополнительного следствия, изменения объема обвинения либо квалификации действий обвиняемых или пересоставления обвинительного заключения и устранения выявленных недостатков со своими письменными указаниями. Задержанный подлежит освобождению.
​
ГЛАВА XVII. Уголовное производство и Уголовное преследование.
​
Статья 66. Назначение уголовного производства.​
​
ч. 1 Уголовное производство имеет своим назначением:​
​
1) защиту прав и законных интересов лиц и организаций, потерпевших от преступлений;
2) защиту личности от незаконного и необоснованного обвинения, осуждения, ограничения ее прав и свобод.
3) Уголовное преследование и назначение виновным справедливого наказания в той же мере отвечают назначению уголовного производства, что и отказ от уголовного преследования невиновных, освобождение их от наказания, реабилитация каждого, кто необоснованно подвергся уголовному преследованию.

Статья 67. Назначение наказания в рамках уголовного дела​
​
ч. 1. Наказания по уголовному делу в штате San-Andreas осуществляется уполномоченными государственными служащими, а также судом.​
​
ч. 2. Никто не может быть признан виновным в совершении преступления и подвергнут уголовному наказанию иначе как в порядке, установленном действующим законодательством.​
​
ч. 3. Лицо, которому было назначено наказание за совершенное преступление, не может быть лишено права на рассмотрение его уголовного дела в судебных органах и в праве обжаловать решения лиц, назначивших ему лицу наказание.

Статья 68. Независимость судей​
​
ч. 1. При осуществлении правосудия по уголовным делам судьи независимы и подчиняются только Конституции и законам штата San-Andreas.​
​
ч. 2. Судьи рассматривают и разрешают уголовные дела в условиях, исключающих противоправное воздействие на них. Вмешательство государственных органов, органов местного самоуправления, иных органов, организаций, должностных лиц или граждан в деятельность судей по осуществлению правосудия запрещается и влечет за собой установленную законом ответственность.​
​
ч. 3. Информация о внепроцессуальных обращениях государственных органов, органов местного самоуправления, иных органов, организаций, должностных лиц или граждан, поступивших судьям по уголовным делам, находящимся в их производстве, подлежит преданию гласности и доведению до сведения участников судебного разбирательства путем размещения данной информации и не является основанием для проведения процессуальных действий или принятия процессуальных решений по уголовным делам.

Статья 69. Состязательность сторон​
​
ч. 1. Уголовное судопроизводство осуществляется на основе состязательности сторон.​
​
ч. 2. Суд не является органом уголовного преследования, не выступает на стороне обвинения или стороне защиты. Суд создает необходимые условия для исполнения сторонами их процессуальных обязанностей и осуществления предоставленных им прав.​
​
ч. 3. Стороны обвинения и защиты равноправны перед судом.
​

Статья 70. Обязанность осуществления уголовного преследования​
​
ч. 1. Уголовное преследование от имени государства по уголовным делам публичного и частно-публичного обвинения осуществляют прокурор, а также следователь.

Примечание: Прокурор осуществляя расследования по уголовным делам, в порядке предусмотренном настоящим кодексом, осуществляет функции следователя​
​
ч. 2. В каждом случае обнаружения признаков преступления прокурор и следователь принимают предусмотренные настоящим Кодексом меры по установлению события преступления, изобличению лица или лиц, виновных в совершении преступления​
​
ч. 3. Следователь, а также прокурор в случаях, предусмотренных ч. 4 ст. 75 настоящего кодекса, вправе осуществлять уголовное преследование по уголовным делам независимо от волеизъявления потерпевшего.​
​
ч. 4. Требования, поручения и запросы прокурора и/или следователя, предъявленные в рамках уголовного преследования и в пределах их компетенции, обязательны для исполнения всеми учреждениями, предприятиями, организациями, должностными лицами и гражданами.

Статья 71. Право потерпевшего на участие в уголовном преследовании.​
​
ч. 1. Потерпевший и представитель вправе участвовать в уголовном преследовании обвиняемого.

Статья 72. Поводы и основание для возбуждения дела.​
​
ч. 1. Поводами для возбуждения дела служат:​
​
1) заявление о правонарушении;
2) явка с повинной;
3) сообщение о совершенном или готовящемся правонарушении, полученное из иных источников;
4) непосредственное обнаружение должностными лицами, уполномоченными для проведения проверки и расследования, данных, указывающих на наличие события правонарушения.​
​
ч. 2. Основанием для возбуждения дела является наличие достаточных данных, указывающих на признаки правонарушения.​
​
ч. 3. Сотрудники правоохранительных органов обязаны принять, проверить сообщение либо собственную информацию, полученную в ходе осуществления своей служебной деятельности, о любом совершенном, совершаемом или готовящемся правонарушении. При проверке вышеуказанные сотрудники вправе получать объяснения, образцы для сравнительного исследования, истребовать документы, вещественные доказательства и предметы, изымать их в порядке, установленном настоящим Кодексом, назначать судебную экспертизу, принимать участие в ее производстве и получать заключение эксперта в разумный срок, производить осмотр места происшествия, документов, предметов, трупов, освидетельствование, требовать производства документальных проверок, ревизий, исследований документов, предметов, трупов, привлекать к участию в этих действиях специалистов, давать правоохранительным органам обязательное для исполнения письменное поручение о проведении оперативно-розыскных мероприятий.​
​
ч. 4. Дело считается возбужденным с момента:​
​
1) фиксации правонарушения сотрудником силовых государственных структур или правоохранительных органов, в том числе сотрудником прокуратуры;
2) вынесения постановления о возбуждении дела.

ч. 4.1. При ведении дела с письменной отчетностью в порядке ст. 50 настоящего Кодекса, его возбуждение производится в соответствии с п. 2 ч. 4 настоящей статьи.​
​
ч. 5. Принятие и проверка сообщений либо информации о любом совершенном, совершаемом или готовящемся правонарушении производится как до возбуждения дела, так и в рамках возбужденного дела, в зависимости от отсутствия либо наличия признаков состава правонарушения соответственно.

Статья 73. Основания отказа в возбуждении дела или прекращения дела​
​
ч. 1. Дело не может быть возбуждено, а возбужденное дело подлежит прекращению по следующим основаниям:​
​
1) отсутствие события правонарушения;
2) отсутствие в деянии состава правонарушения;
3) истечение сроков давности уголовного или административного преследования;
4) отсутствие заявления потерпевшего, если дело может быть возбуждено не иначе как по его заявлению;​
​
ч. 2. Дело подлежит прекращению по основанию, предусмотренному пунктом 2 части первой настоящей статьи, в случае, когда до вступления приговора в законную силу противоправность и наказуемость этого деяния были устранены новым законом.​
​
ч. 3. Прекращение дела влечет за собой одновременно прекращение уголовного или административного преследования.

Статья 74. Решения, принимаемые по результатам рассмотрения (проверки) сообщения либо собственной информации, полученной в ходе осуществления служебной деятельности, о правонарушении​
​
ч. 1. По результатам рассмотрения (проверки) сообщения либо собственной информации, полученной в ходе осуществления служебной деятельности, о любом совершенном, совершаемом или готовящемся правонарушении сотрудник правоохранительных органов или иное уполномоченное лицо принимает одно из следующих решений:​
​
1) о возбуждении дела при наличии поводов и оснований, предусмотренных ст. 72 настоящего Кодекса;
2) об отказе в возбуждении дела по основаниям, предусмотренным ст. 73 настоящего Кодекса;
3) о передаче сообщения или иных данных по подследственности в порядке, предусмотренном законодательством.​
​
ч. 2. О принятом решении в кратчайшие сроки (не более 24-х часов) сотрудник правоохранительных органов сообщает заявителю. При этом заявителю разъясняются его право обжаловать данное решение и порядок обжалования.​
​

Статья 75. Виды уголовного преследования​
​
ч. 1. В зависимости от характера и тяжести совершенного преступления уголовное преследование, включая обвинение в суде, осуществляется в публичном, частно-публичном и частном порядке.

ч. 2. Уголовные дела о преступлениях, предусмотренных статьей 6.6 Уголовного кодекса штата San-Andreas, считаются уголовными делами частного обвинения, возбуждаются не иначе как по заявлению потерпевшего, его законного представителя, за исключением случаев, преду смотренных частью четвертой настоящей статьи, и подлежат прекращению в связи с примирением потерпевшего с обвиняемым. Примирение сторон допускается до направления уголовного дела в суд.​
​
ч. 3. Уголовные дела частно-публичного обвинения возбуждаются не иначе как по заявлению потерпевшего или его законного представителя, но прекращению в связи с примирением потерпевшего с обвиняемым не подлежат. К уголовным делам частно-публичного обвинения относятся уголовные дела о преступлениях, предусмотренных ст. ст. 6.1 ч.1 8.1 ч. 1, 8.2, 8.3, 10.1 ч. 1, 10.2, 10.2.1, 10.3, 10.5, 10.6, 10.7 Уголовного кодекса штата San-Andreas.​
​
ч. 4. Следователь, прокурор возбуждают уголовное дело о любом преступлении, указанном в частях второй и третьей настоящей статьи, в том числе при отсутствии заявления потерпевшего или его законного представителя, если данное преступление совершено в отношении лица, которое в силу зависимого или беспомощного состояния либо по иным причинам не может защищать свои права и законные интересы. К иным причинам относится также случай совершения преступления лицом, данные о котором не известны.​
​
ч. 5. Уголовные дела, за исключением уголовных дел, указанных в частях второй и третьей настоящей статьи, считаются уголовными делами публичного обвинения.

Статья. 76 Обвинительное заключение​
​
ч. 1. В обвинительном заключении следователь указывает:​
​
а) фамилии, имена обвиняемого или обвиняемых;
б) данные о личности каждого из них;
в) существо обвинения, место и время совершения преступления, его способы, мотивы, цели, последствия и другие обстоятельства, имеющие значение для данного уголовного дела;
г) формулировку предъявленного обвинения с указанием пункта, части, статьи Уголовного кодекса штата San-Andreas, предусматривающих ответственность за данное преступление;
д) перечень доказательств, подтверждающих обвинение, и краткое изложение их содержания;
е) обстоятельства, смягчающие и отягчающие наказание;
л) данные о потерпевшем, характере и размере вреда, причиненного ему преступлением;​
​
ч. 2. Обвинительное заключение подписывается следователем с указанием места и даты его составления.​
​
ч. 3. К обвинительному заключению прилагается список подлежащих вызову в судебное заседание лиц со стороны обвинения с указанием их места жительства.​
​
ч. 4. После подписания следователем обвинительного заключения уголовное дело немедленно направляется Генеральному Прокурору штата San-Andreas или его заместителям или прокурорам-референтам/
​

Статья 77. Решение прокурора по уголовному делу​
​
ч. 1 Генеральный Прокурор и(или) его заместители или прокуроры-референты рассматривают поступившее от следователя, прокурора уголовное дело с обвинительным заключением и в течение суток принимает по нему одно из следующих решений:​
​
а) об утверждении обвинительного заключения и о направлении уголовного дела в суд;
б) о возвращении уголовного дела следователю для производства дополнительного следствия, изменения объема обвинения либо квалификации действий обвиняемых или пересоставления обвинительного заключения и устранения выявленных недостатков со своими письменными указаниями;
в) об утверждении обвинительного заключения и авторизации ордера на арест.​
​
ч. 2 В случае сложности или большого объема уголовного дела срок, установленный ч. 1 настоящей статьи, может быть продлен до 3 суток.​
​
ч. 3 В случае, предусмотренного пунктом б части первой, настоящей статьи, прокурор рассматривающий уголовное дело выносит мотивированное постановление.
​
Глава XVII. Направление уголовного дела в суд​

Статья 78. Направление уголовного дела в суд​
ч. 1. После утверждения обвинительного заключения, если не авторизован ордер на арест, прокурор направляет уголовное дело в суд, о чем уведомляет обвиняемого, его защитника, потерпевшего, и (или) представителей.​
ч. 2. Копия обвинительного заключения с приложениями вручается прокурором обвиняемому. Копии обвинительного заключения вручаются также защитнику и потерпевшему, если они ходатайствуют об этом.​

Статья 78.1. Обстоятельства, исключающие участие в производстве по уголовному делу
​
ч. 1. Прокурор, следователь не может участвовать в производстве по уголовному делу, если он:​
1) является потерпевшим по делам частного и частно-публичного обвинения, гражданским истцом, гражданским ответчиком по данному уголовному делу;​
2) участвовал в качестве присяжного заседателя, эксперта, специалиста, переводчика, понятого, помощника судьи, секретаря судебного заседания, защитника, законного представителя подозреваемого, обвиняемого, представителя потерпевшего, гражданского истца или гражданского ответчика;​
3) является близким родственником или родственником любого из участников производства по данному уголовному делу.​
​
ч. 2. Лица, указанные в части первой настоящей статьи, не могут участвовать в производстве по уголовному делу также в случаях, если имеются иные обстоятельства, дающие основание полагать, что они лично, прямо или косвенно, заинтересованы в исходе данного уголовного дела.​
​
ч. 3. Наличие информации о внепроцессуальном обращении, поступившем прокурору или следователю по уголовному делу, находящемуся в его производстве, само по себе не может рассматриваться в качестве основания для отвода.​

Статья 78.2. Недопустимость участия в производстве по уголовному делу лиц, подлежащих отводу​
ч. 1. При наличии оснований для отвода, предусмотренных настоящей главой, прокурор, следователь обязаны устраниться от участия в производстве по уголовному делу.​
​
ч. 2. В случае, если лица, указанные в части первой настоящей статьи, не устранились от участия в производстве по уголовному делу, отвод им может быть заявлен подозреваемым, обвиняемым, его законным представителем, защитником, а также государственным обвинителем, потерпевшим, гражданским истцом, гражданским ответчиком или их представителями.​
​
ч. 3. В случае отказа в удовлетворении заявления об отводе подача повторного заявления об отводе тем же лицом и по тем же основаниям не допускается.​
​
ч. 4. Решение об отказе в удовлетворении заявления об отводе, принятое в ходе досудебного производства по уголовному делу, не является препятствием для последующей подачи заявления об отводе тем же лицом в отношении того же лица и по тем же основаниям в ходе судебного производства по уголовному делу.​
​
ч. 5. Вопрос об отводе следователя, прокурора разрешается ими же немедленно после поступления соответствующего заявления. В случае несогласия сторон с решением об отказе в удовлетворении отвода, заявитель вправе обратиться с жалобой в суд либо в Офис Генерального Прокурора для проверки законности и обоснованности принятого решения.​
​

Глава XVIII. Досудебное соглашение о сотрудничестве​

​
Статья 79. Досудебное соглашение о сотрудничестве

ч. 1. Досудебное соглашение о сотрудничестве — соглашение между стороной обвинения и подозреваемым либо обвиняемым, в соответствии с которым указанное лицо принимает обязательство содействовать раскрытию и расследованию преступления.

ч. 2. Содействие может выражаться в:​
​
а) даче правдивых показаний;
б) изобличении соучастников преступления;
в) сообщении сведений, имеющих значение для уголовного дела;
г) содействии розыску имущества, добытого преступным путём.

ч. 3. Досудебное соглашение заключается в письменной форме и приобщается к материалам уголовного дела.


Статья 80. Условия заключения досудебного соглашения

ч. 1. Досудебное соглашение заключается при наличии одновременно следующих условий:​
​
а) добровольного волеизъявления подозреваемого либо обвиняемого;
б) согласия лица с предъявленным обвинением полностью либо частично;
в) готовности лица оказать содействие следствию;
г) наличия сведений, имеющих значение для уголовного дела.

ч. 2. Заключение соглашения не допускается:​
​
а) при отсутствии фактической возможности оказания содействия;
б) если заключение соглашения противоречит задачам уголовного судопроизводства;
в) если соглашение направлено исключительно на формальное снижение ответственности без фактического содействия расследованию.


Статья 81. Ходатайство о заключении досудебного соглашения

ч. 1. Подозреваемый либо обвиняемый вправе заявить ходатайство о заключении досудебного соглашения.

ч. 2. Ходатайство подается прокурору в письменной форме.

ч. 3. Ходатайство приобщается к материалам уголовного дела.

ч. 4. Ходатайство подается с обязательным участием защитника.


Статья 82. Рассмотрение ходатайства прокурором

ч. 1. Прокурор рассматривает ходатайство и принимает одно из следующих решений:​
​
а) о заключении соглашения;
б) об отказе в заключении соглашения.

ч. 2. Решение оформляется постановлением прокурора.

ч. 3. Постановление приобщается к материалам уголовного дела.


Статья 83. Содержание досудебного соглашения

ч. 1. В досудебном соглашении указываются:​
​
а) сведения о сторонах соглашения;
б) существо подозрения либо обвинения;
в) обязательства подозреваемого либо обвиняемого;
г) обязательства стороны обвинения;
д) порядок исполнения соглашения;
е) сроки исполнения соглашения;
ж) последствия неисполнения соглашения.


Статья 84. Обязательства подозреваемого либо обвиняемого

ч. 1. Подозреваемый либо обвиняемый обязан:​
​
а) давать правдивые показания;
б) способствовать раскрытию преступления;
в) содействовать изобличению соучастников преступления;
г) предоставлять имеющиеся доказательства и сведения.


Статья 85. Обязательства стороны обвинения

ч. 1. При выполнении условий соглашения прокурор:​
​
а) учитывает содействие лица при формировании обвинения;
б) вправе ходатайствовать перед судом о назначении более мягкого наказания;
в) вправе учитывать исполнение соглашения при вынесении процессуального ордера;
г) отражает факт заключения соглашения в обвинительном заключении либо процессуальном ордере.


Статья 86. Гарантии прав подозреваемого либо обвиняемого

ч. 1. Досудебное соглашение заключается с обязательным участием защитника.

ч. 2. Подозреваемому либо обвиняемому разъясняются правовые последствия заключения соглашения.

ч. 3. Подозреваемый либо обвиняемый вправе отказаться от заключения соглашения до момента его подписания сторонами.


Статья 87. Проверка исполнения соглашения

ч. 1. Контроль исполнения условий соглашения осуществляется прокурором.

ч. 2. Результаты исполнения соглашения отражаются в материалах уголовного дела.


Статья 88. Последствия исполнения соглашения

ч. 1. В случае исполнения условий досудебного соглашения суд либо прокурор учитывает содействие подозреваемого либо обвиняемого при принятии процессуального решения по уголовному делу.

ч. 2. Содействие расследованию преступления признаётся обстоятельством, смягчающим наказание.

ч. 3. Прокурор при вынесении процессуального ордера вправе:​
​
а) ходатайствовать о назначении более мягкого наказания;
б) изменить объём обвинения в пределах фактических обстоятельств дела;
в) отказаться от поддержания части обвинения при наличии достаточных оснований;
г) указать исполнение соглашения как основание применения смягчающих процессуальных последствий.


Статья 89. Последствия неисполнения соглашения

ч. 1. В случае неисполнения либо ненадлежащего исполнения условий соглашения прокурор вправе принять решение о прекращении соглашения.

ч. 2. Решение о прекращении соглашения оформляется постановлением прокурора и приобщается к материалам уголовного дела.

ч. 3. Сведения, сообщённые лицом в рамках соглашения, могут использоваться в качестве доказательств по уголовному делу.


Статья 90. Прокурорский надзор за заключением и исполнением соглашения

ч. 1. Прокурор осуществляет надзор за законностью заключения и исполнения досудебного соглашения.

ч. 2. Начальник следственного органа либо начальник следственного подразделения вправе истребовать материалы уголовного дела, связанные с соглашением, в пределах своей компетенции.

ч. 3. Сотрудники Офиса Генерального прокурора вправе истребовать материалы уголовного дела, связанные с соглашением, на любом этапе производства.

ч. 4. Разглашение сведений досудебного соглашения не допускается, за исключением случаев их предоставления:​
​
а) суду;
б) начальнику следственного органа либо начальнику следственного подразделения;
в) сотрудникам Офиса Генерального прокурора.​

​
​
Глава XIX. Ознакомление с материалами уголовного дела​

​
Статья 91. Основания начала ознакомления с материалами уголовного дела

ч. 1. Ознакомление участников уголовного судопроизводства с материалами уголовного дела, оформленного в форме письменной отчётности, осуществляется после принятия уполномоченным должностным лицом следующего процессуального решения:​
​
а) об утверждении обвинительного заключения и направлении уголовного дела в суд.


ч. 2. Ознакомление участников уголовного судопроизводства с материалами уголовного дела также осуществляется в случае подачи участником уголовного судопроизводства административного искового заявления об обжаловании процессуального решения, предусмотренного пунктом «в» статьи 77 Процессуального кодекса штата San-Andreas.

ч. 3. После наступления одного из оснований, предусмотренных частями 1 и 2 настоящей статьи, следователь, ведущий уголовное дело, обязан:​
​
а) уведомить участников уголовного судопроизводства в письменной форме;
б) разъяснить им право на ознакомление с материалами уголовного дела;
в) обеспечить доступ к материалам уголовного дела, оформленным в виде письменных документов.

ч. 4. Ознакомление с материалами уголовного дела осуществляется в порядке, установленном настоящей главой, с обязательным документированием всех процессуальных действий.


Статья 92. Общие положения об ознакомлении с материалами уголовного дела

ч. 1. Ознакомление с материалами уголовного дела осуществляется в целях обеспечения права на защиту и реализации принципа состязательности сторон.

ч. 2. Материалы уголовного дела представляют собой совокупность письменных документов, процессуальных актов, доказательств и иных сведений, оформленных в установленном порядке.

ч. 3. Все материалы уголовного дела подлежат систематизации, нумерации и ведению в форме письменной отчётности.

ч. 4. Должностное лицо обязано обеспечить условия, исключающие утрату, повреждение, искажение либо несанкционированное изменение письменных материалов уголовного дела.


Статья 93. Ознакомление обвиняемого и его защитника

ч. 1. Обвиняемому и его защитнику предоставляется право ознакомиться со всеми письменными материалами уголовного дела без ограничения их объёма.

ч. 2. Ознакомление осуществляется:​
​
а) совместно обвиняемым и защитником;
б) раздельно по их инициативе.

ч. 3. В процессе ознакомления обвиняемый и его защитник вправе:​
​
а) делать письменные выписки из материалов уголовного дела;
б) изготавливать копии документов, в том числе с использованием технических средств;
в) заявлять письменные ходатайства;
г) представлять письменные доказательства;
д) заявлять отводы.


Статья 94. Ознакомление потерпевшего и его представителя

ч. 1. Потерпевшему и его представителю предоставляется право ознакомиться с письменными материалами уголовного дела.

ч. 2. Потерпевший вправе ознакомиться со всеми материалами уголовного дела, за исключением случаев, предусмотренных законом.

ч. 3. Представитель потерпевшего пользуется теми же правами, что и представляемое лицо.

ч. 4. Потерпевший и его представитель вправе:​
​
а) делать письменные выписки из материалов уголовного дела;
б) изготавливать копии документов;
в) подавать письменные ходатайства;
г) заявлять отводы;
д) подавать письменные жалобы на действия (бездействие) должностных лиц.


Статья 95. Ознакомление иных участников уголовного судопроизводства

ч. 1. Гражданский истец, гражданский ответчик и их представители вправе ознакомиться с письменными материалами уголовного дела в части, относящейся к заявленным требованиям.

ч. 2. Указанные лица вправе:​
​
а) делать письменные выписки из материалов дела;
б) изготавливать копии документов;
в) подавать письменные ходатайства;
г) заявлять отводы.


Статья 96. Сроки ознакомления с материалами уголовного дела

ч. 1. Срок ознакомления с письменными материалами уголовного дела не ограничивается, за исключением случаев злоупотребления данным правом.

ч. 2. В случае необоснованного затягивания ознакомления следователь либо прокурор вправе обратиться в суд с письменным ходатайством об установлении разумного срока ознакомления.

ч. 3. Суд, рассмотрев ходатайство, вправе установить конкретный срок ознакомления с материалами уголовного дела.


Статья 97. Ходатайства и заявления после ознакомления

ч. 1. После завершения ознакомления участники уголовного судопроизводства вправе подать письменные ходатайства в суд либо прокурору в пределах их компетенции.

ч. 2. Ходатайства могут касаться:​
​
а) проведения дополнительных следственных действий;
б) исключения доказательств;
в) изменения объёма обвинения или квалификации деяния;
г) иных обстоятельств, имеющих значение для уголовного дела.


Статья 98. Гарантии реализации права на ознакомление

ч. 1. Отказ в предоставлении письменных материалов уголовного дела либо создание препятствий к ознакомлению не допускается.

ч. 2. Нарушение права на ознакомление является существенным нарушением процессуального законодательства.

ч. 3. Действия (бездействие) должностных лиц могут быть обжалованы в порядке, установленном законодательством штата San-Andreas.


Статья 99. Исключения и ограничения доступа к материалам уголовного дела

ч. 1. Сотрудники Офиса Генерального прокурора вправе затребовать материалы уголовного дела либо их копии в письменной форме на любой стадии уголовного судопроизводства независимо от этапа расследования или рассмотрения дела.

ч. 2. Прокурор и следователь не вправе разглашать материалы уголовного дела, оформленные в письменной форме, а равно предоставлять их для ознакомления третьим лицам до предъявления обвинения.

ч. 3. Исключение составляют случаи предоставления материалов уголовного дела:​
​
а) начальнику следственного органа либо начальнику следственного подразделения;
б) сотрудникам Офиса Генерального прокурора;
в) суду;
г) иным лицам в случаях, прямо предусмотренных законами штата San-Andreas.
​

Глава XX. Терминология​

​
Статья 100. Основные понятия, используемые в настоящем Кодексе

ч. 1. Если не оговорено иное, основные понятия, используемые в настоящем Кодексе, имеют следующие значения:​
​
Алиби — нахождение подозреваемого или обвиняемого в момент совершения правонарушения в другом месте;
Апелляционная инстанция — суд второй инстанции, рассматривающий в апелляционном порядке дела по жалобам, приговорам, определениям и постановлениям суда;
Близкие лица — иные, за исключением близких родственников и родственников, лица, состоящие в свойстве с потерпевшим, свидетелем, а также лица, жизнь, здоровье и благополучие которых дороги потерпевшему, свидетелю в силу сложившихся личных отношений;
Близкие родственники — супруг, супруга, родители, дети, усыновители, усыновленные, родные братья и родные сестры, дедушка, бабушка, внуки;
Вердикт — решение о виновности или невиновности подсудимого, вынесенное коллегией присяжных заседателей;
Государственный обвинитель — поддерживающее от имени государства обвинение в суде по делу должностное лицо Офиса Генерального прокурора;
Досудебное производство — судопроизводство с момента получения сообщения о правонарушении до направления прокурором дела в суд для рассмотрения его по существу;
Жилище — индивидуальный жилой дом с входящими в него жилыми и нежилыми помещениями, жилое помещение независимо от формы собственности, входящее в жилищный фонд и используемое для постоянного или временного проживания, а равно иное помещение или строение, не входящее в жилищный фонд, но используемое для временного проживания;
Законная сила — обязательность и непреложность решения, акта или нормы права. Оно подразумевает, что данное решение или акт должны исполняться и признаются действительными до тех пор, пока не будут отменены или изменены в установленном законом порядке. Решение, вступившее в законную силу, не может быть обжаловано;
Задержание — мера процессуального принуждения, применяемая сотрудниками силовых структур на срок не более 1 часа с момента фактического задержания лица по подозрению в совершении правонарушения;
Осмотр — это процесс визуального изучения места происшествия, местности, лиц, жилища, иных помещений, предметов и документов уполномоченным на то лицом, с целью обнаружения следов правонарушения или выяснения других обстоятельств, имеющих значение для дела. При осмотре не допускается применение физического воздействия к осматриваемым объектам и лицам;
Досмотр — обследование вещей уполномоченным на то лицом, проводимое без нарушения их конструктивной целостности. Досмотр осуществляется в целях обнаружения потенциально опасных предметов (огнестрельного и иного оружия, специальных средств, колюще-режущих предметов и иных предметов, которые могут быть использованы в качестве оружия), а также в иных случаях, предусмотренных законом. При этом лицо, подвергаемое досмотру может отказаться от прохождения досмотра с условием, что оно будет выдворено с территории или не будет допущено на территорию, а в отдельно предусмотренных случаях — не будет выпущено с территории, для нахождения на которой или при пересечении границы которого прохождение досмотра является обязательным;
Обыск — это следственное действие, состоящее в обследовании уполномоченным на то лицом, помещений либо лиц (личный обыск) в целях обнаружения предметов, имеющих какое-либо значение для уголовного или административного производства;
Кассационная инстанция — суд третьей инстанции, рассматривающий в кассационном порядке дела по жалобам, приговорам, определениям и постановлениям апелляционного суда;
Момент фактического задержания — момент производимого в порядке, установленном настоящим Кодексом, фактического лишения свободы передвижения лица, подозреваемого в совершении правонарушения;
Непричастность — неустановленная причастность либо установленная непричастность лица к совершению правонарушения;
Ночное время — промежуток времени с 22 до 6 часов по местному времени;
Обвинение — утверждение о совершении определенным лицом деяния, запрещенного Уголовным кодексом или Кодексом об административных правонарушениях, выдвинутое в порядке, установленном настоящим Кодексом;
Определение — любое решение, вынесенное судами первой и апелляционной инстанций, за исключением приговора.
Постановление — любое решение, за исключением приговора, вынесенное судьей; решение прокурора, следователя;
Председательствующий — судья, который руководит судебным заседанием при коллегиальном рассмотрении дела, а также судья, рассматривающий дело единолично;
Приговор — решение о невиновности или виновности подсудимого и назначении ему наказания либо об освобождении его от наказания, вынесенное судом первой или апелляционной инстанции;
Присяжный заседатель — лицо, привлеченное в установленном законом порядке для участия в судебном разбирательстве и вынесения вердикта;
Процессуальное действие — следственное, судебное или иное действие, предусмотренное настоящим Кодексом;
Промежуточное судебное решение — все определения и постановления суда, за исключением итогового судебного решения;
Свидетельский иммунитет — право лица не давать показания против себя и своих близких родственников, а также в иных случаях, предусмотренных настоящим Кодексом;
Следователь — служащий правоохранительных органов, уполномоченный в пределах компетенции, предусмотренной действующим законодательством, осуществлять следствие по уголовному делу или делу об административном правонарушении;
Судебное заседание — процессуальная форма осуществления правосудия в ходе досудебного и судебного производства по делу;
Судебное разбирательство — судебное заседание судов первой и второй инстанций;
Суд первой инстанции — суд, рассматривающий дело по существу и правомочный выносить приговор, а также принимать решения в ходе досудебного производства по делу;
Суд второй инстанции — суд апелляционной инстанции (апелляция);
Суд третьей инстанции — суд кассационной инстанции (кассация);
Судебное решение — приговор, определение, постановление, вынесенные при производстве по делу в судах первой и второй инстанций;
Итоговое судебное решение — приговор, иное решение суда, вынесенное в ходе судебного разбирательства, которым дело разрешается по существу;
Внепроцессуальное обращение — поступившее обращение в письменной или устной форме не являющихся участниками судебного разбирательства государственного органа, органа местного самоуправления, иного органа, организации, должностного лица или гражданина, либо обращение в не предусмотренной процессуальным законодательством форме участников судебного и досудебного разбирательства;
Приказ — вид акта управления, волевое властное официальное распоряжение руководителя, командира или начальника, отданное в пределах его должностных полномочий и обязательное для исполнения подчиненными;
Прокурор — Генеральный прокурор, его заместители, прокуроры, а также иные должностные лица Офиса Генерального Прокурора, прямо наделённые процессуальными полномочиями прокурора согласно закону "О деятельности Офиса Генерального Прокурора штата San-Andreas" и Процессуальному Кодексу.
АДМИНИСТРАТИВНЫЙ КОДЕКС ШТАТА SAN-ANDREAS

ОБЩАЯ ЧАСТЬ

ГЛАВА 1. ОБЩИЕ ПОЛОЖЕНИЯ
​


Статья 1.1. Законодательство об административных правонарушениях

ч. 1 Законодательство об административных правонарушениях состоит из настоящего Кодекса, Этического Кодекса штата San-Andreas и Дорожного Кодекса штата San-Andreas.​

ч. 2 Настоящий Кодекс основывается на Конституции штата San-Andreas, общепризнанных принципах и нормах права.​


Статья 1.2. Задачи законодательства об административных правонарушениях

ч. 1 Задачами законодательства об административных правонарушениях являются защита личности, охрана прав и свобод человека и гражданина, охрана здоровья граждан, санитарно-эпидемиологического благополучия населения, защита общественной нравственности, охрана окружающей среды, установленного порядка осуществления государственной власти, общественного порядка и общественной безопасности, собственности, защита законных экономических интересов физических и юридических лиц, общества и государства от административных правонарушений, а также предупреждение административных правонарушений.​


Статья 1.3. Административный Кодекс штата San-Andreas

ч. 1 Административный Кодекс штата San-Andreas - кодифицированный нормативный акт, регулирующий общественные отношения по привлечению к административной ответственности, а также устанавливающий общие начала, перечень всех административных правонарушений (который может быть дополнен на региональном уровне), органы, рассматривающие дела, порядок привлечения к административной ответственности и порядок исполнения решений по административным делам.​


Статья 1.4. Принцип равенства перед законом

ч. 1 Лица, совершившие административные правонарушения, равны перед законом. Физические лица подлежат административной ответственности независимо от пола, расы, национальности, языка, происхождения, имущественного и должностного положения, места жительства, отношения к религии, убеждений, принадлежности к общественным объединениям, а также других обстоятельств. Юридические лица подлежат административной ответственности независимо от места нахождения, организационно-правовых форм, подчиненности, а также других обстоятельств.​

ч. 2 Особые условия применения мер обеспечения производства по делу об административном правонарушении и привлечения к административной ответственности должностных лиц, выполняющих определенные государственные функции, устанавливаются Конституцией и иным законодательством штата San-Andreas.​

ч. 3 Особые условия применения мер административной ответственности в отношении некоммерческих организаций, а также являющихся субъектами малого и среднего предпринимательства лиц, осуществляющих предпринимательскую деятельность без образования юридического лица, и юридических лиц, а также руководителей и иных работников указанных юридических лиц, совершивших административные правонарушения в связи с выполнением организационно-распорядительных или административно-хозяйственных функций (далее - их работники), устанавливаются настоящим Кодексом.​


Статья 1.5. Презумпция невиновности

ч. 1 Лицо подлежит административной ответственности только за те административные правонарушения, в отношении которых установлена его вина.​

ч. 2 Лицо, в отношении которого ведется производство по делу об административном правонарушении, считается невиновным, пока его вина не будет доказана в порядке, предусмотренном настоящим Кодексом, и установлена вступившим в законную силу постановлением судьи, органа, должностного лица, рассмотревших дело.​

ч. 3 Лицо, привлекаемое к административной ответственности, не обязано доказывать свою невиновность, за исключением случаев, когда обратное установлено нормой Особенной части настоящего Кодекса.​

ч. 4 Неустранимые сомнения в виновности лица, привлекаемого к административной ответственности, толкуются в пользу этого лица.​


Статья 1.6. Обеспечение законности при применении мер административного принуждения

ч. 1 Лицо, привлекаемое к административной ответственности, не может быть подвергнуто административному наказанию и мерам обеспечения производства по делу об административном правонарушении иначе как на основаниях и в порядке, установленных законом.​

ч. 2 Применение уполномоченными на то органом или должностным лицом административного наказания и мер обеспечения производства по делу об административном правонарушении осуществляется в пределах компетенции указанных органа или должностного лица в соответствии с законом.​

ч. 3 При применении мер административного принуждения не допускаются решения и действия (бездействие), унижающие человеческое достоинство.​


Статья 1.7. Действие законодательства об административных правонарушениях во времени

ч. 1 Лицо, совершившее административное правонарушение, подлежит ответственности на основании закона, действовавшего во время совершения административного правонарушения.​

ч. 2 Закон, смягчающий или отменяющий административную ответственность за административное правонарушение либо иным образом улучшающий положение лица, имеет обратную силу. Закон, устанавливающий или отягчающий административную ответственность, обратной силы не имеет.​

ч. 2.1 В случае одновременного вступления в силу положений закона, отменяющих административную ответственность и устанавливающих уголовную ответственность, лицо подлежит административной ответственности на основании закона, действовавшего во время совершения административного правонарушения.​

ч. 3 Производство по делу об административном правонарушении осуществляется на основании закона, действующего во время производства по делу.​


Статья 1.8. Действие законодательства об административных правонарушениях в пространстве

ч. 1 Лицо, совершившее административное правонарушение на территории штата San-Andreas, подлежит административной ответственности в соответствии с настоящим Кодексом.​


ГЛАВА 2. АДМИНИСТРАТИВНОЕ ПРАВОНАРУШЕНИЕ И АДМИНИСТРАТИВНАЯ ОТВЕТСТВЕННОСТЬ
​

Статья 2.1. Административное правонарушение

ч. 1 Административным правонарушением признается противоправное действие (бездействие) физического или юридического лица, за которое настоящим Кодексом или законами штата об административных правонарушениях установлена административная ответственность.​

ч. 2 Юридическое лицо признается виновным в совершении административного правонарушения, если будет установлено, что у него имелась возможность для соблюдения правил и норм, за нарушение которых настоящим Кодексом предусмотрена административная ответственность, но данным лицом не были приняты все зависящие от него меры по их соблюдению.​

ч. 3 Назначение административного наказания юридическому лицу не освобождает от административной ответственности за данное правонарушение виновное физическое лицо, равно как и привлечение к административной или уголовной ответственности физического лица не освобождает от административной ответственности за данное правонарушение юридическое лицо, за исключением случаев, предусмотренных частью 4 настоящей статьи.​

ч. 4 Юридическое лицо не подлежит административной ответственности за совершение административного правонарушения, за которое должностное лицо или иной работник данного юридического лица привлечены к административной ответственности либо его единоличный исполнительный орган, имеющий статус юридического лица, привлечен к административной ответственности, если таким юридическим лицом были приняты все предусмотренные законодательством штата San-Andreas меры для соблюдения правил и норм, за нарушение которых предусмотрена административная ответственность.​


Статья 2.2. Подведомственность по административным делам и делам об административных правонарушениях. Порядок и условия привлечения лиц к ответственности по делам об административных правонарушениях

ч. 1 Привлечение к административной ответственности возможно только сотрудниками LSPD, Sheriff Department, судебными органами и Офисом Генерального прокурора штата, главами правительственных департаментов и их заместителями, а также Спикером Сената в рамках проведения заседания и в соответствии с Законом «О Сенате штата San-Andreas».​


Статья 2.3. Формы вины

ч. 1 Административное правонарушение признается совершенным умышленно, если лицо, его совершившее, осознавало противоправный характер своего действия (бездействия), предвидело его вредные последствия и желало наступления таких последствий или сознательно их допускало либо относилось к ним безразлично.​

ч. 2 Административное правонарушение признается совершенным по неосторожности, если лицо, его совершившее, предвидело возможность наступления вредных последствий своего действия (бездействия), но без достаточных к тому оснований самонадеянно рассчитывало на предотвращение таких последствий либо не предвидело возможности наступления таких последствий, хотя должно было и могло их предвидеть.​


Статья 2.4. Крайняя необходимость

ч. 1 Не является административным правонарушением причинение лицом вреда охраняемым законом интересам в состоянии крайней необходимости, то есть для устранения опасности, непосредственно угрожающей личности и правам данного лица или других лиц, а также охраняемым законом интересам общества или государства, если эта опасность не могла быть устранена иными средствами и если причиненный вред является менее значительным, чем предотвращенный вред.​


Статья 2.5. Возможность освобождения от административной ответственности при малозначительности административного правонарушения

ч. 1 При малозначительности совершенного административного правонарушения судья, орган, должностное лицо, уполномоченные решить дело об административном правонарушении, могут освободить лицо, совершившее административное правонарушение, от административной ответственности и ограничиться устным замечанием.​


ГЛАВА 3. АДМИНИСТРАТИВНОЕ НАКАЗАНИЕ​


Статья 3.1. Цели административного наказания

ч. 1 Административное наказание является установленной государством мерой ответственности за совершение административного правонарушения и применяется в целях предупреждения совершения новых правонарушений как самим правонарушителем, так и другими лицами.​

ч. 2 Административное наказание не может иметь своей целью унижение человеческого достоинства физического лица, совершившего административное правонарушение, или причинение ему физических страданий, а также нанесение вреда деловой репутации юридического лица.​


Статья 3.2. Виды административных наказаний

ч. 1 Для целей настоящего Кодекса административными наказаниями признаются:​

а) предупреждение - мера административного наказания, выраженная в официальном порицании физического или юридического лица. Предупреждение выносится в устной форме;​
б) административный штраф - денежное взыскание в отношении лица, выраженное в определенной сумме;​
в) лишение специального права;​
г) конфискация орудия совершения или предмета административного правонарушения.​


Статья 3.3. Исполнение штрафа

ч. 1 Административный штраф должен быть уплачен лицом, привлеченным к административной ответственности, незамедлительно либо в указанный (оглашенный) срок.​


Статья 3.4. Предупреждение

ч. 1 Предупреждение - мера административного наказания, выраженная в официальном порицании лица. Предупреждение выносится в письменной или устной форме.​

ч. 2 Предупреждение устанавливается за впервые совершенные административные правонарушения при отсутствии причинения вреда либо возникновения угрозы причинения вреда жизни и здоровью людей, объектам животного и растительного мира, окружающей среде, безопасности государства, угрозы чрезвычайных ситуаций природного и техногенного характера, а также при отсутствии имущественного ущерба.​


Статья 3.5. Административный штраф

ч. 1 Административный штраф является денежным взысканием и выражается в долларах.​

ч. 2 Если настоящим Кодексом не установлено иное, под штрафом понимается административный штраф.​


Статья 3.6. Конфискация орудия совершения или предмета административного правонарушения, а также изъятие вещей и документов

ч. 1 Конфискацией орудия совершения или предмета административного правонарушения является принудительное безвозмездное обращение в собственность штата San-Andreas не изъятых из оборота вещей. Конфискация назначается сотрудником, осуществляющим административное преследование.​

ч. 2 Не является конфискацией изъятие из незаконного владения лица:​

а) подлежащих возврату их законному собственнику;​

б) изъятых из оборота либо находившихся в противоправном владении и подлежащих обращению в собственность государства или уничтожению.​

Примечание 1: Изъятие вещей и документов осуществляется уполномоченными лицами с применением видеозаписи.​

Примечание 2: Изъятие признается конфискацией только в случаях, прямо предусмотренных законом.​

ч. 3 Конфискация не применяется к имуществу лица, не привлеченного к административной ответственности и не признанного виновным.​


Статья 3.7. Лишение специального права

ч. 1 Лишение специального права устанавливается за грубое или систематическое нарушение порядка пользования данным правом либо за уклонение от исполнения административного наказания и назначается судьей.​

ч. 2 Срок лишения специального права не может быть менее двух лет и не может превышать тридцати лет.​


ГЛАВА 4. НАЗНАЧЕНИЕ АДМИНИСТРАТИВНОГО НАКАЗАНИЯ
​

Статья 4.1. Общие правила назначения административного наказания

ч. 1 Административное наказание за совершение административного правонарушения назначается в пределах, установленных настоящим Кодексом.​

ч. 2 При назначении административного наказания физическому лицу учитываются характер совершенного административного правонарушения, личность виновного, его имущественное положение, обстоятельства, смягчающие и отягчающие административную ответственность.​

ч. 3 Назначение административного наказания не освобождает лицо от исполнения обязанности, за неисполнение которой административное наказание было назначено.​
