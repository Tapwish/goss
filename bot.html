<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MAJESTIC • AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --neon-red: #cc0033;
            --neon-red-dim: #991a2e;
            --neon-blue: #00a0cc;
            --dark-bg: #0a0a0a;
            --dark-card: #111111;
            --dark-border: #1a1a1a;
            --text-primary: #ffffff;
            --text-dim: #888888;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 9999;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(204, 0, 51, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204, 0, 51, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .neon-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .neon-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            opacity: 0.08;
            animation: lineMove linear infinite;
        }

        @keyframes lineMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }

        ::-webkit-scrollbar {
            width: 4px;
            background: var(--dark-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--neon-red);
            border-radius: 2px;
        }

        .app-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--dark-card);
            border-right: 1px solid var(--dark-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar.closed {
            transform: translateX(-100%);
            position: absolute;
            z-index: 100;
            height: 100%;
        }

        .user-info {
            padding: 20px;
            border-bottom: 1px solid var(--dark-border);
            text-align: center;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid var(--neon-red);
        }

        .user-name {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 10px;
            word-break: break-word;
            color: var(--text-primary);
        }

        .login-btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--neon-red);
            padding: 10px 20px;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: var(--neon-red);
            color: var(--text-primary);
        }

        .logout-btn {
            margin-top: 10px;
            border-color: var(--text-dim);
        }

        .logout-btn:hover {
            background: var(--neon-red);
            border-color: var(--neon-red);
        }

        .conversations-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--dark-border);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--neon-red);
            padding: 6px 12px;
            border-radius: 2px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            background: var(--neon-red);
            color: var(--text-primary);
        }

        .new-chat-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 12px;
            border-radius: 2px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .conv-item:hover {
            border-color: var(--neon-red);
        }

        .conv-item.active {
            border-color: var(--neon-red);
            background: rgba(204, 0, 51, 0.05);
        }

        .conv-title {
            font-weight: 500;
            margin-bottom: 4px;
            padding-right: 30px;
            word-break: break-word;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .conv-meta {
            font-size: 10px;
            color: var(--text-dim);
        }

        .delete-conv {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-dim);
            width: 26px;
            height: 26px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-conv:hover {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .user-stats {
            padding: 10px;
            font-size: 10px;
            color: var(--text-dim);
            border-top: 1px solid var(--dark-border);
            background: rgba(0,0,0,0.2);
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--dark-bg);
        }

        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--dark-border);
            background: var(--dark-card);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 2px;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            border-color: var(--neon-red);
        }

        .chat-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--neon-red);
            flex: 1;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 2px;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Inter', sans-serif;
        }

        .user {
            background: var(--neon-red);
            color: var(--text-primary);
            align-self: flex-end;
        }

        .bot {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            align-self: flex-start;
            color: var(--text-dim);
        }

        .input-area {
            padding: 12px 20px;
            border-top: 1px solid var(--dark-border);
            display: flex;
            gap: 10px;
            background: var(--dark-card);
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--dark-border);
            border-radius: 2px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            border-color: var(--neon-red);
        }

        .input-area input:disabled {
            opacity: 0.3;
        }

        .input-area button {
            background: transparent;
            border: 1px solid var(--neon-red);
            border-radius: 2px;
            padding: 0 24px;
            color: var(--text-primary);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-area button:hover:not(:disabled) {
            background: var(--neon-red);
            color: var(--text-primary);
        }

        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .limit-warning {
            background: rgba(204, 0, 51, 0.05);
            padding: 6px 16px;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid var(--dark-border);
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
        }

        .limit-warning strong {
            color: var(--neon-red);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 99;
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                z-index: 100;
                height: 100%;
                width: 280px;
            }
            .menu-btn {
                display: block;
            }
            .sidebar.closed {
                transform: translateX(-100%);
            }
            .message {
                max-width: 90%;
                font-size: 0.85rem;
            }
            .conv-item {
                padding: 14px;
            }
            .delete-conv {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            button {
                min-height: 44px;
            }
            .chat-header h1 {
                font-size: 1rem;
            }
            .user-info {
                padding: 15px;
            }
            .login-btn {
                font-size: 0.6rem;
                padding: 8px 16px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 240px;
            }
            .chat-header {
                padding: 10px 12px;
            }
            .chat-messages {
                padding: 12px;
            }
            .input-area {
                padding: 10px 12px;
            }
            .input-area input {
                font-size: 0.8rem;
                padding: 10px 12px;
            }
            .input-area button {
                font-size: 0.6rem;
                padding: 0 16px;
            }
            .message {
                font-size: 0.8rem;
                padding: 10px 14px;
            }
            .conv-title {
                font-size: 0.75rem;
            }
            .user-name {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="neon-lines">
        <div class="neon-line" style="top: 15%; animation-duration: 10s; width: 60%;"></div>
        <div class="neon-line" style="top: 45%; animation-duration: 14s; width: 40%; animation-delay: 3s;"></div>
        <div class="neon-line" style="top: 75%; animation-duration: 12s; width: 50%; animation-delay: 5s;"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="app-layout">
        <div class="sidebar" id="sidebar">
            <div class="user-info" id="userInfo">
                <div id="unauthBlock">
                    <button class="login-btn" id="loginBtn">Войти через Discord</button>
                </div>
                <div id="authBlock" style="display:none">
                    <img id="userAvatar" class="user-avatar" src="" alt="">
                    <div id="userName" class="user-name"></div>
                    <button class="login-btn logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div class="conversations-header">
                <span>Диалоги</span>
                <button class="new-chat-btn" id="newChatBtn" disabled>Новый</button>
            </div>
            <div class="conversation-list" id="conversationList">
                <div style="text-align:center; padding:20px; color:var(--text-dim); font-size:0.85rem;">Авторизуйтесь для доступа</div>
            </div>
            <div class="user-stats" id="userStats" style="display:none;">
                <span id="statsText">Загрузка...</span>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <h1>AI</h1>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">Авторизуйтесь через Discord, чтобы начать диалог</div>
            </div>
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="Ваш вопрос..." disabled>
                <button id="sendBtn" disabled>Отправить</button>
            </div>
            <div class="limit-warning" id="limitWarning"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // НАСТРОЙКИ
        // ============================================================
        const DISCORD_CLIENT_ID = '1516071810477592707';
        const API_KEY = "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";
        const MODEL = "llama-3.3-70b-versatile";
        const DAILY_LIMIT = 100;

        // VIP-пользователи: Discord ID → лимит
        const VIP_LIMITS = {
            '1516071810477592707': 999999,
        };

        // ПУБЛИЧНЫЙ ПРОКСИ (ничего регистрировать не нужно!)
        const PROXY_URL = "https://claude-proxy.yinxulai.com/https/api.groq.com/openai/v1/chat/completions";

        const LAWS_FULL_TEXT = `УК SA Статья 6.2 ч1 Убийство 4 года тюрьмы
        ДК SA Статья 2 Отказ остановиться штраф 5000$
        АдмКодекс SA Статья 11.1 Оскорбление штраф 5000-20000$
        ПК SA Статья 16 Основания задержания: следы, видео, ордер
        Конституция SA Статья 1.5 Презумпция невиновности`;

        const DB_NAME = 'HyugaAI_DB';
        const DB_VERSION = 3;
        let db = null;
        let currentUser = null;
        let currentConversation = null;
        let conversations = [];
        let waiting = false;

        // ============================================================
        // ЛИМИТЫ
        // ============================================================
        async function getUserLimit() {
            if (!currentUser) return DAILY_LIMIT;
            if (VIP_LIMITS[currentUser.id]) {
                return VIP_LIMITS[currentUser.id];
            }
            return DAILY_LIMIT;
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ
        // ============================================================
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve();
                };
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('users')) {
                        db.createObjectStore('users', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('conversations')) {
                        const convStore = db.createObjectStore('conversations', { keyPath: 'id', autoIncrement: true });
                        convStore.createIndex('userId', 'userId');
                    }
                    if (!db.objectStoreNames.contains('messages')) {
                        db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('dailyStats')) {
                        db.createObjectStore('dailyStats', { keyPath: 'id' });
                    }
                };
            });
        }

        // ============================================================
        // РАБОТА С ДАННЫМИ
        // ============================================================
        async function getTodayUserMessagesCount() {
            if (!currentUser) return 0;
            const today = new Date().toISOString().split('T')[0];
            const tx = db.transaction('dailyStats', 'readonly');
            const store = tx.objectStore('dailyStats');
            return new Promise((resolve) => {
                const req = store.get(`${currentUser.id}_${today}`);
                req.onsuccess = () => resolve(req.result ? req.result.count : 0);
                req.onerror = () => resolve(0);
            });
        }

        async function incrementTodayUserMessages() {
            if (!currentUser) return;
            const today = new Date().toISOString().split('T')[0];
            const tx = db.transaction('dailyStats', 'readwrite');
            const store = tx.objectStore('dailyStats');
            const key = `${currentUser.id}_${today}`;
            const req = store.get(key);
            req.onsuccess = async () => {
                if (req.result) {
                    req.result.count++;
                    await store.put(req.result);
                } else {
                    await store.put({ id: key, count: 1 });
                }
            };
        }

        async function saveConversation(conv) {
            const tx = db.transaction('conversations', 'readwrite');
            const store = tx.objectStore('conversations');
            if (conv.id) {
                await store.put(conv);
            } else {
                conv.createdAt = Date.now();
                conv.lastActive = Date.now();
                conv.isActive = true;
                conv.userId = currentUser.id;
                conv.title = 'Новый диалог';
                const id = await store.add(conv);
                conv.id = id;
            }
            return conv;
        }

        async function loadUserConversations() {
            if (!currentUser) return [];
            const tx = db.transaction('conversations', 'readonly');
            const store = tx.objectStore('conversations');
            const index = store.index('userId');
            return new Promise((resolve) => {
                const result = [];
                const request = index.openCursor(IDBKeyRange.only(currentUser.id));
                request.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) {
                        result.push(cursor.value);
                        cursor.continue();
                    } else {
                        resolve(result.sort((a,b) => b.lastActive - a.lastActive));
                    }
                };
            });
        }

        async function saveMessage(convId, role, content) {
            const tx = db.transaction(['messages', 'conversations'], 'readwrite');
            const msgStore = tx.objectStore('messages');
            await msgStore.add({ conversationId: convId, role, content, createdAt: Date.now() });
            const convStore = tx.objectStore('conversations');
            const conv = await new Promise((resolve) => {
                const req = convStore.get(convId);
                req.onsuccess = () => resolve(req.result);
            });
            if (conv) {
                conv.lastActive = Date.now();
                await convStore.put(conv);
            }
            if (role === 'user') {
                await incrementTodayUserMessages();
            }
        }

        async function loadMessages(convId) {
            const tx = db.transaction('messages', 'readonly');
            const store = tx.objectStore('messages');
            return new Promise((resolve) => {
                const result = [];
                const request = store.openCursor();
                request.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) {
                        if (cursor.value.conversationId === convId) {
                            result.push(cursor.value);
                        }
                        cursor.continue();
                    } else {
                        resolve(result.sort((a,b) => a.createdAt - b.createdAt));
                    }
                };
            });
        }

        async function updateConversationTitle(convId) {
            const messages = await loadMessages(convId);
            const firstUserMsg = messages.find(m => m.role === 'user');
            if (firstUserMsg) {
                let title = firstUserMsg.content.substring(0, 30);
                if (firstUserMsg.content.length > 30) title += '...';
                const tx = db.transaction('conversations', 'readwrite');
                const store = tx.objectStore('conversations');
                const conv = await new Promise((resolve) => {
                    const req = store.get(convId);
                    req.onsuccess = () => resolve(req.result);
                });
                if (conv && conv.title === 'Новый диалог') {
                    conv.title = title;
                    await store.put(conv);
                }
            }
        }

        async function deleteConversation(convId) {
            const messages = await loadMessages(convId);
            const tx = db.transaction(['messages', 'conversations'], 'readwrite');
            const msgStore = tx.objectStore('messages');
            for (const msg of messages) {
                await msgStore.delete(msg.id);
            }
            await tx.objectStore('conversations').delete(convId);
            if (currentConversation?.id === convId) {
                currentConversation = null;
                const remaining = await loadUserConversations();
                if (remaining.length > 0) {
                    await selectConversation(remaining[0].id);
                } else {
                    document.getElementById('chatMessages').innerHTML = '<div class="message bot">Создайте новый диалог</div>';
                    document.getElementById('questionInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }
            }
            await loadConversationsAndRender();
        }

        // ============================================================
        // DISCORD AUTH
        // ============================================================
        function checkDiscordAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            if (token) {
                fetchDiscordUser(token);
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                const saved = localStorage.getItem('hyuga_user');
                if (saved) {
                    currentUser = JSON.parse(saved);
                    updateUIForAuth();
                    loadConversationsAndRender();
                } else {
                    updateUIForUnauth();
                }
            }
        }

        async function fetchDiscordUser(token) {
            try {
                const res = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const user = await res.json();
                if (user.id) {
                    currentUser = {
                        id: user.id,
                        username: user.username,
                        avatar: user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png'
                    };
                    localStorage.setItem('hyuga_user', JSON.stringify(currentUser));
                    await initDB();
                    updateUIForAuth();
                    await loadConversationsAndRender();
                }
            } catch(e) {
                updateUIForUnauth();
            }
        }

        function loginWithDiscord() {
            const url = `https://discord.com/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.href.split('#')[0])}&response_type=token&scope=identify`;
            window.location.href = url;
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('hyuga_user');
            currentConversation = null;
            updateUIForUnauth();
            renderConversationList([]);
            document.getElementById('chatMessages').innerHTML = '<div class="message bot">Авторизуйтесь через Discord</div>';
        }

        // ============================================================
        // UI ОБНОВЛЕНИЯ
        // ============================================================
        function updateUIForAuth() {
            document.getElementById('unauthBlock').style.display = 'none';
            document.getElementById('authBlock').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userAvatar').src = currentUser.avatar;
            document.getElementById('newChatBtn').disabled = false;
            document.getElementById('userStats').style.display = 'block';
            document.getElementById('questionInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            updateStats();
        }

        function updateUIForUnauth() {
            document.getElementById('unauthBlock').style.display = 'block';
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('newChatBtn').disabled = true;
            document.getElementById('questionInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('userStats').style.display = 'none';
            document.getElementById('limitWarning').innerHTML = '';
        }

        async function updateStats() {
            if (!currentUser) return;
            const daily = await getTodayUserMessagesCount();
            const limit = await getUserLimit();
            document.getElementById('statsText').innerHTML = `📨 ${daily}/${limit} сегодня`;
            if (daily >= limit) {
                document.getElementById('limitWarning').innerHTML = '⚠️ Дневной лимит исчерпан';
                document.getElementById('questionInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
            } else {
                document.getElementById('questionInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        async function loadConversationsAndRender() {
            conversations = await loadUserConversations();
            renderConversationList(conversations);
            if (conversations.length > 0 && !currentConversation) {
                await selectConversation(conversations[0].id);
            }
        }

        function renderConversationList(convs) {
            const container = document.getElementById('conversationList');
            if (!convs.length) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-dim);">Нет диалогов<br>Нажмите "Новый"</div>';
                return;
            }
            container.innerHTML = convs.map(conv => `
                <div class="conv-item ${currentConversation?.id === conv.id ? 'active' : ''}" data-id="${conv.id}">
                    <div class="conv-title">📝 ${conv.title}</div>
                    <button class="delete-conv" data-id="${conv.id}">🗑</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.conv-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-conv')) {
                        selectConversation(parseInt(el.dataset.id));
                    }
                });
            });
            document.querySelectorAll('.delete-conv').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (confirm('Удалить этот диалог?')) {
                        await deleteConversation(parseInt(btn.dataset.id));
                    }
                });
            });
        }

        async function selectConversation(id) {
            const conv = conversations.find(c => c.id === id);
            if (!conv) return;
            currentConversation = conv;
            await updateConversationTitle(id);
            await loadConversationsAndRender();
            const messages = await loadMessages(id);
            const container = document.getElementById('chatMessages');
            if (messages.length === 0) {
                container.innerHTML = '<div class="message bot">✨ Новый диалог. Задайте вопрос по законам SA.</div>';
            } else {
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.role === 'user' ? 'user' : 'bot'}">${msg.content.replace(/\n/g, '<br>')}</div>
                `).join('');
            }
            await updateStats();
        }

        async function createNewConversation() {
            if (!currentUser) return;
            const daily = await getTodayUserMessagesCount();
            const limit = await getUserLimit();
            if (daily >= limit) {
                document.getElementById('limitWarning').innerHTML = '⚠️ Лимит сообщений на сегодня исчерпан';
                return;
            }
            const newConv = await saveConversation({});
            conversations.unshift(newConv);
            await selectConversation(newConv.id);
            renderConversationList(conversations);
        }

        // ============================================================
        // AI ЛОГИКА — ЧЕРЕЗ ПУБЛИЧНЫЙ ПРОКСИ
        // ============================================================
        async function askAI(question, history) {
            const messages = [
                { role: "system", content: `Ты юрист. Отвечай только на основе законов SA: ${LAWS_FULL_TEXT}. На русском.` },
                ...history,
                { role: "user", content: question }
            ];

            // Отправляем запрос через публичный прокси
            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-api-key": `${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messages,
                    temperature: 0.3,
                    max_tokens: 800
                })
            });

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errorText}`);
            }

            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function sendMessage() {
            if (!currentUser || !currentConversation || waiting) return;
            const daily = await getTodayUserMessagesCount();
            const limit = await getUserLimit();
            if (daily >= limit) {
                document.getElementById('limitWarning').innerHTML = '⚠️ Лимит сообщений на сегодня исчерпан';
                return;
            }
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;
            input.value = '';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.textContent = question;
            document.getElementById('chatMessages').appendChild(msgDiv);
            await saveMessage(currentConversation.id, 'user', question);
            await updateConversationTitle(currentConversation.id);
            
            waiting = true;
            const thinking = document.createElement('div');
            thinking.className = 'message bot';
            thinking.textContent = '🤔 Думаю...';
            document.getElementById('chatMessages').appendChild(thinking);
            thinking.scrollIntoView({ behavior: 'smooth' });
            
            try {
                const all = await loadMessages(currentConversation.id);
                const history = all.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }));
                const reply = await askAI(question, history.slice(0, -1));
                thinking.remove();
                const replyDiv = document.createElement('div');
                replyDiv.className = 'message bot';
                replyDiv.textContent = reply;
                document.getElementById('chatMessages').appendChild(replyDiv);
                await saveMessage(currentConversation.id, 'assistant', reply);
                await loadConversationsAndRender();
                await updateStats();
            } catch(err) {
                thinking.textContent = `❌ Ошибка: ${err.message}`;
            } finally {
                waiting = false;
            }
        }

        // ============================================================
        // ЗАПУСК
        // ============================================================
        window.onload = async () => {
            document.getElementById('loginBtn').onclick = loginWithDiscord;
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('newChatBtn').onclick = () => createNewConversation();
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('questionInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            
            const menuBtn = document.getElementById('menuBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            menuBtn.onclick = () => {
                sidebar.classList.toggle('closed');
                overlay.style.display = sidebar.classList.contains('closed') ? 'none' : 'block';
            };
            overlay.onclick = () => {
                sidebar.classList.add('closed');
                overlay.style.display = 'none';
            };
            
            await initDB();
            checkDiscordAuth();
        };
    </script>
</body>
</html>
