<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MAJESTIC • Памятка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-red: #cc0033;
            --neon-red-dim: #991a2e;
            --neon-blue: #00a0cc;
            --dark-bg: #0a0a0a;
            --dark-card: #111111;
            --dark-border: #1a1a1a;
            --text-primary: #ffffff;
            --text-dim: #888888;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 9999;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(204, 0, 51, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204, 0, 51, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .neon-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .neon-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            opacity: 0.08;
            animation: lineMove linear infinite;
        }

        @keyframes lineMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100vw); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 30px;
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.6rem;
            font-weight: 900;
            text-decoration: none;
            color: var(--neon-red);
            letter-spacing: 4px;
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .logo:hover {
            color: #ff0044;
            transform: scale(1.02);
        }

        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            padding: 50px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .card:hover {
            border-color: var(--neon-red-dim);
            transform: translateY(-3px);
            box-shadow: 0 5px 30px rgba(204, 0, 51, 0.05);
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-primary), var(--neon-red));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            line-height: 1.9;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 300;
            font-family: 'Inter', sans-serif;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text-primary);
            background: transparent;
            border: 1px solid var(--neon-red);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--neon-red);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .alert {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--dark-border);
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 2px;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .alert strong {
            color: var(--neon-red);
        }

        footer {
            background: rgba(0, 0, 0, 0.6);
            border-top: 1px solid var(--dark-border);
            padding: 25px 0;
            text-align: center;
            width: 100%;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            max-width: 60%;
            height: 1px;
            background: var(--neon-red);
        }

        .copyright {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 300;
            font-family: 'Inter', sans-serif;
        }

        .copyright span {
            color: var(--neon-red);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .logo { font-size: 1.8rem; letter-spacing: 2px; }
            h1 { font-size: 1.6rem; }
            .card { padding: 30px 20px; }
            .btn { padding: 12px 24px; font-size: 0.65rem; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.3rem; }
            h1 { font-size: 1.3rem; }
            .card { padding: 20px 15px; }
            .btn { padding: 10px 18px; font-size: 0.55rem; }
            .alert { font-size: 0.8rem; padding: 12px 15px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="neon-lines">
        <div class="neon-line" style="top: 20%; animation-duration: 10s; width: 50%;"></div>
        <div class="neon-line" style="top: 60%; animation-duration: 14s; width: 40%; animation-delay: 3s;"></div>
    </div>

    <div class="container">
        <a href="index.html" class="logo fade-in">MAJESTIC</a>

        <div class="card fade-in">
            <h1>Актуальная памятка</h1>
            <p>Самый лучший помощник начинающим госсникам, обновляется каждую пятницу.</p>
            <a href="https://docs.google.com/spreadsheets/d/1fRgEv9E3cBREkhJRfMa3N9jelmWNUKYCAdreKQ97Vlk/edit?usp=sharing" class="btn" target="_blank">Открыть памятку</a>
            <div class="alert">
                <strong>📌 Памятка</strong> — содержит всю актуальную информацию для сотрудников государственных структур.
            </div>
        </div>
    </div>

    <footer>
        <div class="copyright">© 2025 <span>MAJESTIC</span>. Все права защищены.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    el.style.transition = 'all 0.6s ease';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + i * 150);
            });
        });
    </script>
</body>
</html>
